<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="TadocsAsset"/>
  <meta name="application-name" content="TadocsAsset"/>
  <meta name="theme-color" content="#0a0f1a"/>
  <meta name="description" content="Hospital Asset Management — Taytay Doctors Multispecialty Hospital"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <title>TadocsAsset — Hospital Asset Management</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0f1a;--bg2:#0f1623;--bg3:#141d2e;--bg4:#1a2438;
      --bd:#1e2d45;--bd2:#243552;
      --tx:#e8f0fe;--tx2:#8fa3c8;--tx3:#526280;
      --ac:#00d4aa;--ac2:#0099ff;--ac3:#7c5cfc;
      --red:#ff4d6a;--orange:#ff9f43;--yellow:#ffd32a;
      --r:12px;--r2:8px;
      --sh:0 2px 16px rgba(0,0,0,.4);
      --sl:0 8px 40px rgba(0,0,0,.6);
    }
    html{font-size:14px}
    html,body{min-height:100vh;background:var(--bg);color:var(--tx);font-family:'Outfit',sans-serif}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:var(--bg2)}
    ::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:10px}

    /* SPLASH */
    #splash{position:fixed;inset:0;background:linear-gradient(135deg,#0a0f1a,#0d1829,#071420);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .6s}
    .splash-icon{font-size:56px;margin-bottom:18px;animation:pulse-icon 2s infinite}
    .splash-title{font-family:'DM Serif Display',serif;font-size:28px;color:var(--tx);margin-bottom:6px}
    .splash-sub{font-size:15px;color:var(--tx3);margin-bottom:32px}
    .splash-bar{width:200px;height:3px;background:var(--bd);border-radius:10px;overflow:hidden}
    .splash-fill{height:100%;background:linear-gradient(90deg,var(--ac),var(--ac2));border-radius:10px;animation:load-bar 2s ease forwards}
    .splash-status{font-size:15px;color:var(--tx3);margin-top:12px;font-family:'DM Mono',monospace}
    @keyframes pulse-icon{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
    @keyframes load-bar{from{width:0}to{width:100%}}

    /* LOGIN */
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 50% 0%,rgba(0,212,170,.08) 0%,transparent 60%)}
    .login-box{width:100%;max-width:380px;background:var(--bg2);border:1px solid var(--bd);border-radius:20px;padding:36px;box-shadow:var(--sl)}
    .login-logo{width:52px;height:52px;background:linear-gradient(135deg,var(--ac),var(--ac2));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 16px;box-shadow:0 6px 24px rgba(0,212,170,.3)}
    .login-title{text-align:center;margin-bottom:28px}
    .login-title h1{font-family:'DM Serif Display',serif;font-size:22px;color:var(--tx);margin-bottom:4px}
    .login-title p{font-size:14px;color:var(--tx3)}
    .form-group{margin-bottom:14px}
    .form-label{display:block;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--tx3);margin-bottom:6px}
    .form-input{width:100%;padding:10px 13px;background:var(--bg3);border:1.5px solid var(--bd);border-radius:var(--r2);font-size:15px;font-family:'Outfit',sans-serif;color:var(--tx);outline:none;transition:border-color .15s}
    .form-input:focus{border-color:var(--ac);background:var(--bg4)}
    .form-input::placeholder{color:var(--tx3)}
    .btn-primary{width:100%;padding:11px;border-radius:var(--r2);border:none;background:linear-gradient(135deg,var(--ac),#00b894);color:#0a0f1a;font-size:15px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s;margin-top:4px}
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,212,170,.35)}
    .btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .login-err{background:rgba(255,77,106,.1);border:1px solid rgba(255,77,106,.3);color:#ff8099;border-radius:var(--r2);padding:8px 12px;font-size:14px;margin-bottom:12px}

    /* LAYOUT */
    .app{display:grid;grid-template-rows:auto 1fr;min-height:100vh}
    .header{background:var(--bg2);border-bottom:1px solid var(--bd);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .header-left{display:flex;align-items:center;gap:12px}
    .header-center{position:absolute;left:50%;transform:translateX(-50%);pointer-events:none}
    .header-greeting{font-size:14px;color:var(--tx2);pointer-events:all}
    .header-greeting strong{color:var(--tx);font-weight:700}
    .header-logo{width:34px;height:34px;background:linear-gradient(135deg,var(--ac),var(--ac2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
    .header-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--tx)}
    .header-sub{font-size:14px;color:var(--tx3);margin-top:1px}
    .header-right{display:flex;align-items:center;gap:10px}
    .live-badge{display:flex;align-items:center;gap:5px;padding:3px 9px;border-radius:100px;background:rgba(0,212,170,.1);border:1px solid rgba(0,212,170,.2);font-size:14px;color:var(--ac);font-weight:600}
    .live-dot{width:6px;height:6px;border-radius:50%;background:var(--ac);animation:pulse-dot 2s infinite}
    @keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}
    .role-badge{padding:3px 9px;border-radius:100px;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
    .role-admin{background:rgba(124,92,252,.2);color:#a78bfa;border:1px solid rgba(124,92,252,.3)}
    .role-editor{background:rgba(0,153,255,.2);color:#60b8ff;border:1px solid rgba(0,153,255,.3)}
    .role-viewer{background:rgba(143,163,200,.2);color:var(--tx2);border:1px solid var(--bd)}
    .hbtn{padding:5px 12px;border-radius:var(--r2);border:1px solid var(--bd);background:transparent;color:var(--tx2);font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Outfit',sans-serif}
    .hbtn:hover{border-color:var(--ac);color:var(--ac)}

    .main{padding:20px 24px 48px;max-width:1400px;margin:0 auto;width:100%}

    /* STATS */
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
    .stat-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;position:relative;overflow:hidden}
    .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--c,var(--ac))}
    .stat-label{font-size:14px;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px;font-weight:600;margin-bottom:6px}
    .stat-value{font-family:'DM Mono',monospace;font-size:26px;font-weight:500;color:var(--c,var(--tx));line-height:1}
    .stat-sub{font-size:14px;color:var(--tx3);margin-top:4px}

    /* TOOLBAR */
    .toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
    .search-wrap{flex:1;min-width:200px;position:relative}
    .search-input{width:100%;padding:8px 12px 8px 36px;background:var(--bg2);border:1.5px solid var(--bd);border-radius:var(--r2);font-size:15px;font-family:'Outfit',sans-serif;color:var(--tx);outline:none;transition:border-color .15s}
    .search-input:focus{border-color:var(--ac)}
    .search-input::placeholder{color:var(--tx3)}
    .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}
    .filter-select{padding:8px 12px;background:var(--bg2);border:1.5px solid var(--bd);border-radius:var(--r2);font-size:14px;font-family:'Outfit',sans-serif;color:var(--tx2);outline:none;cursor:pointer}
    .filter-select:focus{border-color:var(--ac)}
    .add-btn{padding:8px 16px;background:linear-gradient(135deg,var(--ac),#00b894);border:none;border-radius:var(--r2);color:#0a0f1a;font-size:14px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;white-space:nowrap;transition:all .15s}
    .add-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,212,170,.3)}

    /* CATEGORY PILLS */
    .cat-pills{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
    .cat-pill{padding:5px 12px;border-radius:100px;border:1px solid var(--bd);background:transparent;color:var(--tx3);font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'Outfit',sans-serif}
    .cat-pill:hover{border-color:var(--ac2);color:var(--ac2)}
    .cat-pill.active{background:var(--ac2);color:#fff;border-color:var(--ac2)}
    .cat-count{display:inline-flex;align-items:center;justify-content:center;background:rgba(255,255,255,.2);border-radius:100px;padding:0 5px;font-size:15px;margin-left:4px}
    .cat-pill:not(.active) .cat-count{background:var(--bd);color:var(--tx3)}

    /* DUE SOON BANNER */
    .due-banner{background:rgba(255,159,67,.08);border:1px solid rgba(255,159,67,.3);border-radius:var(--r);padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .due-banner-icon{font-size:14px;flex-shrink:0}
    .due-banner-text{font-size:14px;color:var(--orange);flex:1}
    .due-banner-items{display:flex;gap:6px;flex-wrap:wrap}
    .due-item-tag{padding:2px 8px;background:rgba(255,159,67,.15);border:1px solid rgba(255,159,67,.3);border-radius:100px;font-size:14px;color:var(--orange);cursor:pointer}
    .due-item-tag:hover{background:rgba(255,159,67,.25)}

    /* TABLE */
    .table-wrap{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
    .table-scroll{overflow-x:auto}
    table{width:100%;border-collapse:collapse}
    thead th{padding:10px 14px;font-size:14px;text-transform:uppercase;letter-spacing:.6px;color:var(--tx3);font-weight:700;border-bottom:1px solid var(--bd);white-space:nowrap;cursor:pointer;user-select:none;background:var(--bg3)}
    thead th:hover{color:var(--ac)}
    thead th .sort-icon{margin-left:4px;opacity:.4}
    thead th.sorted .sort-icon{opacity:1;color:var(--ac)}
    tbody tr{border-bottom:1px solid var(--bd);transition:background .12s;cursor:pointer}
    tbody tr:last-child{border-bottom:none}
    tbody tr:hover{background:var(--bg3)}
    tbody tr.due-soon{background:rgba(255,159,67,.04)}
    tbody tr.overdue{background:rgba(255,77,106,.04)}
    td{padding:10px 14px;font-size:14px;color:var(--tx2);white-space:nowrap}
    .td-name{font-weight:600;color:var(--tx);font-size:15px}
    .asset-tag-badge{display:inline-flex;align-items:center;padding:2px 7px;background:rgba(0,153,255,.15);border:1px solid rgba(0,153,255,.25);border-radius:100px;font-size:14px;font-family:'DM Mono',monospace;color:var(--ac2);margin-left:6px}
    .status-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:100px;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
    .status-Active{background:rgba(0,212,170,.12);color:var(--ac);border:1px solid rgba(0,212,170,.2)}
    .status-Inactive{background:rgba(143,163,200,.1);color:var(--tx3);border:1px solid var(--bd)}
    .status-Maintenance{background:rgba(255,159,67,.12);color:var(--orange);border:1px solid rgba(255,159,67,.2)}
    .status-Disposed{background:rgba(255,77,106,.1);color:var(--red);border:1px solid rgba(255,77,106,.2)}
    .status-Due\.Soon{background:rgba(255,159,67,.12);color:var(--orange);border:1px solid rgba(255,159,67,.2)}
    .maint-date{font-family:'DM Mono',monospace;font-size:15px}
    .maint-soon{color:var(--orange)}
    .maint-overdue{color:var(--red)}
    .maint-ok{color:var(--tx3)}
    .category-icon{margin-right:5px}
    .action-btns{display:flex;gap:5px}
    .icon-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--bd);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s;color:var(--tx3)}
    .icon-btn:hover{border-color:var(--ac2);color:var(--ac2);background:rgba(0,153,255,.08)}
    .icon-btn.del:hover{border-color:var(--red);color:var(--red);background:rgba(255,77,106,.08)}

    /* EMPTY STATE */
    .empty-state{text-align:center;padding:60px 20px;color:var(--tx3)}
    .empty-icon{font-size:40px;margin-bottom:12px}
    .empty-text{font-size:14px;margin-bottom:6px;color:var(--tx2)}
    .empty-sub{font-size:14px}

    /* DETAIL PANEL */
    .detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;backdrop-filter:blur(3px)}
    .detail-panel{position:fixed;right:0;top:0;bottom:0;width:420px;max-width:100vw;background:var(--bg2);border-left:1px solid var(--bd);z-index:201;overflow-y:auto;animation:slide-in .22s ease}
    @keyframes slide-in{from{transform:translateX(100%)}to{transform:translateX(0)}}
    .dp-header{padding:18px 20px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:flex-start;justify-content:space-between;gap:10px;position:sticky;top:0;background:var(--bg2);z-index:2}
    .dp-title{font-family:'DM Serif Display',serif;font-size:15px;color:var(--tx);line-height:1.3}
    .dp-close{width:30px;height:30px;border-radius:7px;border:1px solid var(--bd);background:transparent;cursor:pointer;font-size:14px;color:var(--tx3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .dp-close:hover{border-color:var(--red);color:var(--red)}
    .dp-body{padding:16px 20px}
    .dp-section{margin-bottom:20px}
    .dp-section-title{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--tx3);margin-bottom:10px;display:flex;align-items:center;gap:6px}
    .dp-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bd);font-size:14px}
    .dp-row:last-child{border-bottom:none}
    .dp-key{color:var(--tx3)}
    .dp-val{font-family:'DM Mono',monospace;font-size:15px;color:var(--tx);text-align:right;max-width:220px;word-break:break-word;white-space:normal}
    .dp-actions{display:flex;gap:8px;padding:14px 20px;border-top:1px solid var(--bd);background:var(--bg2);position:sticky;bottom:0}
    .dp-btn{flex:1;padding:9px;border-radius:var(--r2);border:1px solid var(--bd);background:transparent;color:var(--tx2);font-size:14px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s}
    .dp-btn:hover{border-color:var(--ac2);color:var(--ac2)}
    .dp-btn.primary{background:linear-gradient(135deg,var(--ac),#00b894);border-color:transparent;color:#0a0f1a}
    .dp-btn.primary:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,212,170,.25)}
    .dp-btn.danger{border-color:rgba(255,77,106,.3);color:var(--red)}
    .dp-btn.danger:hover{background:rgba(255,77,106,.1);border-color:var(--red)}

    /* PM HISTORY */
    .pm-timeline{display:flex;flex-direction:column;gap:0}
    .pm-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd);position:relative}
    .pm-item:last-child{border-bottom:none}
    .pm-dot{width:8px;height:8px;border-radius:50%;background:var(--ac);flex-shrink:0;margin-top:5px}
    .pm-content{flex:1;min-width:0}
    .pm-date{font-family:'DM Mono',monospace;font-size:14px;color:var(--tx3)}
    .pm-desc{font-size:14px;color:var(--tx);margin-top:2px}
    .pm-meta{font-size:15px;color:var(--tx3);margin-top:3px}
    .pm-type-badge{display:inline-flex;padding:1px 6px;border-radius:100px;font-size:15px;font-weight:700;text-transform:uppercase;margin-left:6px}
    .pm-Routine{background:rgba(0,212,170,.15);color:var(--ac)}
    .pm-Corrective{background:rgba(255,159,67,.15);color:var(--orange)}
    .pm-Calibration{background:rgba(0,153,255,.15);color:var(--ac2)}
    .pm-Emergency{background:rgba(255,77,106,.15);color:var(--red)}
    .pm-delete{width:22px;height:22px;border-radius:5px;border:1px solid var(--bd);background:transparent;cursor:pointer;font-size:15px;color:var(--tx3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
    .pm-delete:hover{border-color:var(--red);color:var(--red);background:rgba(255,77,106,.08)}
    .pm-add-form{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r2);padding:12px;margin-top:10px}
    .pm-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
    .pm-form-full{margin-bottom:8px}
    .pm-submit{width:100%;padding:7px;border-radius:var(--r2);border:none;background:var(--ac);color:#0a0f1a;font-size:14px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif}
    .pm-submit:hover{background:#00b894}
    .pm-toggle{display:flex;align-items:center;gap:6px;color:var(--ac2);font-size:14px;cursor:pointer;margin-top:8px;background:none;border:none;font-family:'Outfit',sans-serif}
    .pm-toggle:hover{color:var(--ac)}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
    .modal{background:var(--bg2);border:1px solid var(--bd);border-radius:18px;width:100%;max-width:520px;box-shadow:var(--sl);animation:modal-up .2s ease;max-height:90vh;overflow-y:auto}
    @keyframes modal-up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .modal-header{padding:20px 22px 14px;border-bottom:1px solid var(--bd)}
    .modal-header h2{font-family:'DM Serif Display',serif;font-size:18px;color:var(--tx)}
    .modal-header p{font-size:14px;color:var(--tx3);margin-top:3px}
    .modal-body{padding:16px 22px}
    .modal-footer{padding:12px 22px 18px;display:flex;gap:8px}
    .modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .fg{margin-bottom:12px}
    .fl{display:block;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--tx3);margin-bottom:5px}
    .fi{width:100%;padding:9px 12px;background:var(--bg3);border:1.5px solid var(--bd);border-radius:var(--r2);font-size:15px;font-family:'Outfit',sans-serif;color:var(--tx);outline:none;transition:border-color .15s}
    .fi:focus{border-color:var(--ac);background:var(--bg4)}
    .fi::placeholder{color:var(--tx3)}
    textarea.fi{resize:vertical;min-height:72px}
    .btn{padding:9px 16px;border-radius:var(--r2);border:none;cursor:pointer;font-size:14px;font-weight:700;font-family:'Outfit',sans-serif;transition:all .15s;flex:1}
    .btn-save{background:linear-gradient(135deg,var(--ac),#00b894);color:#0a0f1a}
    .btn-save:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,212,170,.25)}
    .btn-cancel{background:var(--bg3);color:var(--tx2);border:1px solid var(--bd)}
    .btn-cancel:hover{border-color:var(--ac2);color:var(--ac2)}
    .btn-danger{background:rgba(255,77,106,.15);color:var(--red);border:1px solid rgba(255,77,106,.3)}
    .btn-danger:hover{background:rgba(255,77,106,.25)}
    .btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

    /* USERS PANEL */
    .users-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
    .user-card{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
    .user-avatar{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
    .user-name{font-size:15px;font-weight:600;color:var(--tx)}
    .user-username{font-size:15px;color:var(--tx3);font-family:'DM Mono',monospace;margin-top:1px}
    .user-actions{display:flex;gap:5px;flex-shrink:0}

    /* TABS */
    .tabs{display:flex;gap:5px;margin-bottom:18px;flex-wrap:wrap}

    .dp-alert-red{background:rgba(255,77,106,.1);border:1px solid rgba(255,77,106,.25);color:var(--red)}

    /* LOADING */
    .spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.2);border-top-color:currentColor;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-row td{text-align:center;padding:40px;color:var(--tx3)}

    /* TOAST */
    .toast-wrap{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:7px;pointer-events:none}
    .toast{padding:9px 15px;border-radius:10px;font-size:14px;font-weight:600;box-shadow:var(--sl);animation:toast-in .25s ease;pointer-events:all;max-width:300px}
    .toast-ok{background:var(--bg3);color:#6ee7b7;border:1px solid rgba(0,212,170,.25)}
    .toast-err{background:var(--bg3);color:#fca5a5;border:1px solid rgba(255,77,106,.25)}
    .toast-info{background:var(--bg3);color:#93c5fd;border:1px solid rgba(0,153,255,.25)}
    @keyframes toast-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

    /* EXPORT BTN */
    .export-btn{padding:8px 14px;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r2);color:var(--tx3);font-size:15px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;white-space:nowrap;transition:all .15s}
    .export-btn:hover{border-color:var(--ac2);color:var(--ac2)}

    @media(max-width:700px){
      /* Layout */
      .main{padding:10px 10px 32px}
      .header{padding:0 12px;height:52px}
      .header-center{display:none}
      .header-title{font-size:16px}
      .header-sub{display:none}
      .header-logo{width:28px;height:28px;font-size:12px}
      .hbtn{padding:4px 9px;font-size:13px}
      .live-badge{display:none}

      /* Stats grid — 2 columns on mobile */
      .stats-grid{grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
      .stat-card{padding:10px 12px}
      .stat-value{font-size:22px}
      .stat-label{font-size:11px}
      .stat-sub{font-size:11px}

      /* Toolbar — stack vertically */
      .toolbar{flex-direction:column;align-items:stretch;gap:8px}
      .search-wrap{width:100%}
      .search-input{width:100%}
      .filter-select{width:100%}
      .export-btn{width:100%;text-align:center}
      .add-btn{width:100%;text-align:center}

      /* Category pills — scrollable row */
      .cat-pills{flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
      .cat-pill{white-space:nowrap;flex-shrink:0}

      /* Table — hide less important columns */
      table th:nth-child(3),
      table td:nth-child(3),
      table th:nth-child(5),
      table td:nth-child(5),
      table th:nth-child(6),
      table td:nth-child(6){display:none}
      .table-scroll{font-size:13px}
      td,th{padding:8px 10px}
      .td-name{max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
      .asset-tag-badge{display:none}

      /* Modal — slide up from bottom */
      .modal{border-radius:18px 18px 0 0;max-width:100%;position:fixed;bottom:0;left:0;right:0;max-height:92vh}
      .modal-overlay{align-items:flex-end;padding:0}
      .modal-grid{grid-template-columns:1fr}

      /* Detail panel — full screen */
      .detail-panel{width:100%;border-radius:0;border-left:none}
      .dp-header{padding:14px 16px 12px}
      .dp-body{padding:14px 16px}
      .dp-actions{padding:12px 16px}
      .dp-title{font-size:16px}

      /* Tabs */
      .tabs{gap:4px}
      .tab{padding:5px 11px;font-size:13px}

      /* Due banner */
      .due-banner{flex-direction:column;gap:6px;padding:10px 12px}

      /* Pagination */
      .hbtn:disabled{opacity:.3}

      /* Users grid */
      .users-grid{grid-template-columns:1fr}
    }

    @media(max-width:400px){
      .stats-grid{grid-template-columns:repeat(2,1fr)}
      .stat-value{font-size:18px}
      table th:nth-child(7),
      table td:nth-child(7){display:none}
    }
  </style>
</head>

<div class="toast-wrap" id="toasts"></div>

<script>
const SUPABASE_URL  = "https://zsupqjjloklvsjcwjwiz.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzdXBxampsb2tsdnNqY3dqd2l6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNDk5ODAsImV4cCI6MjA4ODYyNTk4MH0.Ffr64S5fssXhKZ3nukDrkJM6ZoC8XexIjZYrHjyUfOI";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ─── STATE ───────────────────────────────────────────────────────────────────
let currentUser = null;
let assets = [];
let pmHistory = [];
let users = [];
let activityLogs = [];
let currentTab = 'assets';
let searchQuery = '';
let searchTimer = null;
let filterStatus = 'All';
let filterCat = 'All';
let sortCol = 'name';
let sortDir = 'asc';
let selectedAsset = null;
let showPmForm = false;
let loading = true;
// pagination
const PAGE_SIZE = 50;
let currentPage = 0;
let totalCount = 0;
// stats cache (fetched from DB)
let statsCache = {total:0,active:0,maint:0,inactive:0,totalCost:0,dueSoon:[]};

// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const CATEGORIES = [
  {id:'Medical Equipment', icon:'🩺', color:'#00d4aa'},
  {id:'Furniture & Fixtures', icon:'🪑', color:'#0099ff'},
  {id:'IT & Electronics', icon:'💻', color:'#7c5cfc'},
  {id:'Vehicles & Transport', icon:'🚑', color:'#ff9f43'},
];
const STATUSES = ['Active','Inactive','Maintenance','Disposed'];
const PM_TYPES = ['Routine','Corrective','Calibration','Emergency'];

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function toast(msg, type='ok'){
  const wrap = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  wrap.appendChild(t);
  setTimeout(()=>t.remove(), 3500);
}

function fmtDate(d){ if(!d)return '—'; return new Date(d).toLocaleDateString('en-PH',{year:'numeric',month:'short',day:'numeric'}); }
function fmtCost(n){ return '₱'+Number(n||0).toLocaleString('en-PH'); }

function getDaysUntil(dateStr){
  if(!dateStr) return null;
  const diff = new Date(dateStr) - new Date();
  return Math.ceil(diff / (1000*60*60*24));
}

function getEffectiveStatus(a){
  if(a.status==='Inactive'||a.status==='Disposed') return a.status;
  if(!a.next_maintenance) return a.status;
  const days = getDaysUntil(a.next_maintenance);
  if(days !== null && days < 0 && a.status==='Active') return 'Maintenance';
  if(days !== null && days >= 0 && days <= 7) return 'Due Soon';
  return a.status;
}

function getMaintDisplay(a){
  if(!a.next_maintenance) return {text:'—', cls:'maint-ok'};
  const days = getDaysUntil(a.next_maintenance);
  if(days === null) return {text:'—', cls:'maint-ok'};
  if(days < 0) return {text:`${Math.abs(days)}d overdue`, cls:'maint-overdue'};
  if(days === 0) return {text:'Today', cls:'maint-soon'};
  if(days === 1) return {text:'Tomorrow', cls:'maint-soon'};
  if(days <= 7) return {text:`In ${days}d`, cls:'maint-soon'};
  return {text: fmtDate(a.next_maintenance), cls:'maint-ok'};
}

function getCatIcon(cat){ return CATEGORIES.find(c=>c.id===cat)?.icon||'📦'; }
function getCatColor(cat){ return CATEGORIES.find(c=>c.id===cat)?.color||'var(--ac)'; }

function genId(){
  const prefix = 'HA';
  const existing = assets.map(a=>parseInt((a.id||'').replace(/[^0-9]/g,''))||0);
  const max = existing.length ? Math.max(...existing) : 0;
  return `${prefix}-${String(max+1).padStart(3,'0')}`;
}

function genTag(){
  const existing = assets.map(a=>parseInt(a.asset_tag||'0')||0);
  const max = existing.length ? Math.max(...existing) : 100000;
  return String(max+1);
}

// ─── ACTIVITY LOG ────────────────────────────────────────────────────────────
async function writeLog(action, entity, entityId, detail){
  const entry = {
    action,           // 'CREATE' | 'UPDATE' | 'DELETE'
    entity,           // 'Asset' | 'PM Entry' | 'User'
    entity_id: entityId,
    detail,
    performed_by: currentUser?.username || '—',
    performed_at: new Date().toISOString(),
  };
  const {data} = await sb.from('activity_logs').insert(entry).select().single();
  if(data) activityLogs.unshift(data);
}

async function loadActivityLogs(){
  const {data,error} = await sb.from('activity_logs').select('*').order('performed_at',{ascending:false}).limit(200);
  if(!error && data) activityLogs = data;
}

// ─── SUPABASE CRUD ───────────────────────────────────────────────────────────

async function loadAssets(){
  const today = new Date().toISOString().split('T')[0];
  const week  = new Date(Date.now()+7*864e5).toISOString().split('T')[0];

  // Query 1: paginated page with filters/sort
  let q = sb.from('assets').select('*', {count:'exact'});
  if(searchQuery) q = q.or(`name.ilike.%${searchQuery}%,id.ilike.%${searchQuery}%,asset_tag.ilike.%${searchQuery}%,location.ilike.%${searchQuery}%,assigned_to.ilike.%${searchQuery}%`);
  if(filterCat !== 'All') q = q.eq('category', filterCat);
  if(filterStatus === 'Due Soon'){
    q = q.eq('status','Active').gte('next_maintenance',today).lte('next_maintenance',week);
  } else if(filterStatus !== 'All'){
    q = q.eq('status', filterStatus);
  }
  const validCols = ['id','name','category','status','location','cost','next_maintenance'];
  q = q.order(validCols.includes(sortCol)?sortCol:'name', {ascending:sortDir==='asc'})
       .range(currentPage*PAGE_SIZE, (currentPage+1)*PAGE_SIZE - 1);

  // Queries 2-6: exact counts per status + due soon list (all head:true = zero data transfer)
  const [pageRes, totRes, actRes, mntRes, inaRes, costRes, dueRes] = await Promise.all([
    q,
    sb.from('assets').select('*',{count:'exact',head:true}),
    sb.from('assets').select('*',{count:'exact',head:true}).eq('status','Active'),
    sb.from('assets').select('*',{count:'exact',head:true}).eq('status','Maintenance'),
    sb.from('assets').select('*',{count:'exact',head:true}).eq('status','Inactive'),
    sb.from('assets').select('cost').limit(100000),  // for total value sum
    sb.from('assets').select('id,name').eq('status','Active').gte('next_maintenance',today).lte('next_maintenance',week).limit(50),
  ]);

  if(!pageRes.error && pageRes.data){
    assets = pageRes.data;
    totalCount = pageRes.count || 0;
  }
  statsCache = {
    total:     totRes.count  || 0,
    active:    actRes.count  || 0,
    maint:     mntRes.count  || 0,
    inactive:  inaRes.count  || 0,
    totalCost: (costRes.data||[]).reduce((s,a)=>s+Number(a.cost||0), 0),
    dueSoon:   dueRes.data   || [],
  };
}

async function loadPmHistory(assetId=null){
  let q = sb.from('pm_history').select('*').order('date',{ascending:false});
  if(assetId) q = q.eq('asset_id', assetId);
  else q = q.limit(500); // cap for in-memory use
  const {data,error} = await q;
  if(!error && data){
    if(assetId){
      pmHistory = [...pmHistory.filter(p=>p.asset_id!==assetId), ...data];
    } else {
      pmHistory = data;
    }
  }
}

async function loadUsers(){
  const {data,error} = await sb.from('users').select('id,name,username,role,created_at').order('created_at');
  if(!error && data) users = data;
}

async function saveAsset(asset, isNew){
  if(isNew){
    const {data,error} = await sb.from('assets').insert(asset).select().single();
    if(error){ toast('Failed to save: '+error.message,'err'); return false; }
    assets.push(data);
    await writeLog('CREATE','Asset',data.id,`Added asset "${data.name}" (${data.id}) in ${data.category}`);
  } else {
    const {data,error} = await sb.from('assets').update(asset).eq('id',asset.id).select().single();
    if(error){ toast('Failed to update: '+error.message,'err'); return false; }
    const idx = assets.findIndex(a=>a.id===asset.id);
    if(idx>=0) assets[idx] = data;
    await writeLog('UPDATE','Asset',data.id,`Updated asset "${data.name}" (${data.id})`);
  }
  return true;
}

async function deleteAsset(id){
  const a = assets.find(x=>x.id===id);
  const {error} = await sb.from('assets').delete().eq('id',id);
  if(error){ toast('Failed to delete: '+error.message,'err'); return false; }
  await writeLog('DELETE','Asset',id,`Deleted asset "${a?.name}" (${id})`);
  assets = assets.filter(a=>a.id!==id);
  pmHistory = pmHistory.filter(p=>p.asset_id!==id);
  return true;
}

async function savePm(entry){
  const {data,error} = await sb.from('pm_history').insert(entry).select().single();
  if(error){ toast('Failed to log PM: '+error.message,'err'); return false; }
  pmHistory.unshift(data);
  const a = assets.find(x=>x.id===entry.asset_id);
  await writeLog('CREATE','PM Entry',data.id,`Logged ${entry.type} PM for "${a?.name||entry.asset_id}" — ${entry.description}`);
  // update last_maintenance on asset if newer
  if(a && (!a.last_maintenance || entry.date > a.last_maintenance)){
    a.last_maintenance = entry.date;
    await sb.from('assets').update({last_maintenance:entry.date}).eq('id',a.id);
  }
  return true;
}

async function deletePm(id){
  const p = pmHistory.find(x=>x.id===id);
  const a = assets.find(x=>x.id===p?.asset_id);
  const {error} = await sb.from('pm_history').delete().eq('id',id);
  if(error){ toast('Failed to delete PM entry','err'); return false; }
  await writeLog('DELETE','PM Entry',id,`Removed ${p?.type||''} PM record for "${a?.name||p?.asset_id}"`);
  pmHistory = pmHistory.filter(p=>p.id!==id);
  return true;
}

// ─── AUTO STATUS SYNC ─────────────────────────────────────────────────────────
async function autoUpdateStatuses(){
  for(const a of assets){
    if(a.status==='Active'){
      const days = getDaysUntil(a.next_maintenance);
      if(days !== null && days < 0){
        await sb.from('assets').update({status:'Maintenance'}).eq('id',a.id);
        a.status = 'Maintenance';
      }
    }
  }
}

// ─── EXPORT CSV ──────────────────────────────────────────────────────────────
async function exportCSV(){
  toast('Preparing export…','info');
  const BATCH = 1000;
  let allData = [];
  let from = 0;

  // Build base query with current filters
  function buildExportQ(from, to){
    let q = sb.from('assets').select('*').order(sortCol,{ascending:sortDir==='asc'}).range(from,to);
    if(searchQuery) q = q.or(`name.ilike.%${searchQuery}%,id.ilike.%${searchQuery}%,asset_tag.ilike.%${searchQuery}%,location.ilike.%${searchQuery}%,assigned_to.ilike.%${searchQuery}%`);
    if(filterCat!=='All') q = q.eq('category',filterCat);
    if(filterStatus!=='All' && filterStatus!=='Due Soon') q = q.eq('status',filterStatus);
    return q;
  }

  // Paginate through all records in batches of 1000
  while(true){
    const {data, error} = await buildExportQ(from, from+BATCH-1);
    if(error || !data || data.length===0) break;
    allData = allData.concat(data);
    if(data.length < BATCH) break; // last page
    from += BATCH;
  }

  if(allData.length===0){ toast('No data to export','err'); return; }

  const rows = [['ID','Asset Tag','Name','Category','Status','Location','Assigned To','Cost','Purchase Date','Last Maintenance','Next Maintenance','Notes']];
  allData.forEach(a=>rows.push([a.id,a.asset_tag,a.name,a.category,a.status,a.location,a.assigned_to,a.cost,a.purchase_date,a.last_maintenance,a.next_maintenance,a.notes]));
  const csv = rows.map(r=>r.map(c=>`"${(c||'').toString().replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url;a.download='TadocsAsset-export.csv';a.click();
  URL.revokeObjectURL(url);
  toast(`CSV exported (${allData.length.toLocaleString()} rows) ✓`);
}

  <div class="cat-pills">

    ${CATEGORIES.map(c=>`<button class="cat-pill ${filterCat===c.id?'active':''}" onclick="onFilterCat('${c.id}')">${c.icon} ${c.id}</button>`).join('')}
  </div>

  <div class="table-wrap">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            ${thCol('id','ID')}
            ${thCol('name','Asset Name')}
            ${thCol('category','Category')}
            ${thCol('status','Status')}
            ${thCol('location','Location')}
            ${thCol('cost','Cost')}
            ${thCol('next_maintenance','Next PM')}
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          ${loading ? `<tr class="loading-row"><td colspan="8"><span class="spin"></span> Loading assets…</td></tr>` :
            filtered.length===0 ? `<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">📦</div><div class="empty-text">No assets found</div><div class="empty-sub">${assets.length===0?'Add your first asset to get started':'Try adjusting your search or filters'}</div></div></td></tr>` :
            filtered.map(a=>{
              const eff = getEffectiveStatus(a);
              const maint = getMaintDisplay(a);
              const rowCls = eff==='Due Soon'?'due-soon':eff==='Maintenance'&&getDaysUntil(a.next_maintenance)<0?'overdue':'';
              return `<tr class="${rowCls}" onclick="openDetail('${a.id}')">
                <td><span style="font-family:'DM Mono',monospace;font-size:15px;color:var(--tx3)">${a.id}</span></td>
                <td class="td-name">${a.name}<span class="asset-tag-badge">${a.asset_tag||'—'}</span></td>
                <td><span class="category-icon">${getCatIcon(a.category)}</span>${a.category||'—'}</td>
                <td><span class="status-badge status-${eff.replace(' ','.')}">${eff==='Due Soon'?'⏰ ':eff==='Maintenance'?'🔧 ':''}${eff}</span></td>
                <td>${a.location||'—'}</td>
                <td style="font-family:'DM Mono',monospace;font-size:15px">${fmtCost(a.cost)}</td>
                <td><span class="maint-date ${maint.cls}">${maint.text}</span></td>
                <td onclick="event.stopPropagation()">
                  <div class="action-btns">
                    <button class="icon-btn" onclick="openDetail('${a.id}')" title="View">👁️</button>
                    ${canWrite?`<button class="icon-btn" onclick="showEditModal('${a.id}')" title="Edit">✏️</button>`:''}
                    ${canWrite?`<button class="icon-btn del" onclick="confirmDelete('${a.id}')" title="Delete">🗑️</button>`:''}
                  </div>
                </td>
              </tr>`;
            }).join('')
          }
        </tbody>
      </table>
    </div>
  </div>

  ${totalPages > 1 ? `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px;flex-wrap:wrap;gap:8px">
    <div style="font-size:12px;color:var(--tx3)">
      Showing <b style="color:var(--tx)">${currentPage*PAGE_SIZE+1}–${Math.min((currentPage+1)*PAGE_SIZE,totalCount)}</b> of <b style="color:var(--tx)">${totalCount}</b> assets
    </div>
    <div style="display:flex;gap:6px;align-items:center">
      <button class="hbtn" onclick="goPage(0)" ${currentPage===0?'disabled':''}>«</button>
      <button class="hbtn" onclick="goPage(${currentPage-1})" ${currentPage===0?'disabled':''}>‹ Prev</button>
      <span style="font-size:12px;color:var(--tx2);padding:0 6px">Page ${currentPage+1} / ${totalPages}</span>
      <button class="hbtn" onclick="goPage(${currentPage+1})" ${currentPage>=totalPages-1?'disabled':''}>Next ›</button>
      <button class="hbtn" onclick="goPage(${totalPages-1})" ${currentPage>=totalPages-1?'disabled':''}>»</button>
    </div>
  </div>` : ''}`;
}

function thCol(col, label){
  const active = sortCol===col;
  return `<th class="${active?'sorted':''}" onclick="onSort('${col}')">${label}<span class="sort-icon">${active?(sortDir==='asc'?'↑':'↓'):'↕'}</span></th>`;
}

// ─── EVENTS ───────────────────────────────────────────────────────────────────
function attachEvents(){
  // keyboard esc to close detail
  document.onkeydown = e => { if(e.key==='Escape') { closeDetail(); closeModal(); } };
}

function switchTab(tab){ currentTab=tab; render(); }
function onSearch(v){
  clearTimeout(searchTimer);
  searchQuery=v;
  searchTimer=setTimeout(async ()=>{ currentPage=0; await loadAssets(); render(); }, 350);
}
async function onFilterStatus(v){ filterStatus=v; currentPage=0; await loadAssets(); render(); }
async function onFilterCat(v){ filterCat=v; currentPage=0; await loadAssets(); render(); }
async function onSort(col){
  if(sortCol===col) sortDir=sortDir==='asc'?'desc':'asc'; else{sortCol=col;sortDir='asc';}
  currentPage=0; await loadAssets(); render();
}
async function goPage(p){ currentPage=p; await loadAssets(); render(); }
function openDetail(id){ selectedAsset=id; showPmForm=false; render(); }
function closeDetail(){ selectedAsset=null; render(); }
function togglePmForm(){ showPmForm=!showPmForm; render(); }

async function deletePmEntry(id){
  if(!confirm('Delete this PM entry?')) return;
  if(await deletePm(id)){ toast('PM entry deleted'); render(); }
}

async function logPm(){
  const date = document.getElementById('pm-date')?.value;
  const type = document.getElementById('pm-type')?.value;
  const desc = document.getElementById('pm-desc')?.value;
  const by = document.getElementById('pm-by')?.value;
  const cost = document.getElementById('pm-cost')?.value||0;
  if(!date){ toast('Please select a date','err'); return; }
  const entry = {asset_id:selectedAsset, date, type, description:desc, performed_by:by, cost:Number(cost)};
  if(await savePm(entry)){ toast('PM entry logged ✓'); showPmForm=false; render(); }
}

// ─── MODALS ───────────────────────────────────────────────────────────────────
function showAddModal(){ renderModal('add', null); }
function showEditModal(id){ renderModal('edit', assets.find(a=>a.id===id)); }
function closeModal(){ const m=document.getElementById('modal-wrap'); if(m)m.remove(); }

function renderModal(mode, asset){
  const isEdit = mode==='edit';
  const a = asset || {};
  const today = new Date().toISOString().split('T')[0];

  const wrap = document.createElement('div');
  wrap.id = 'modal-wrap';
  wrap.className = 'modal-overlay';
  wrap.onclick = e => { if(e.target===wrap) closeModal(); };
  wrap.innerHTML = `
  <div class="modal">
    <div class="modal-header">
      <h2>${isEdit?'✏️ Edit Asset':'➕ New Asset'}</h2>
      <p>${isEdit?`Editing ${a.name}`:'Fill in the asset details below'}</p>
    </div>
    <div class="modal-body">
      <div class="modal-grid">
        <div class="fg"><label class="fl">Asset Name *</label><input class="fi" id="m-name" placeholder="e.g. Philips MRI Scanner" value="${a.name||''}"/></div>
        <div class="fg"><label class="fl">Asset Tag</label><input class="fi" id="m-tag" placeholder="e.g. 100011" value="${a.asset_tag||''}"/></div>
      </div>
      <div class="modal-grid">
        <div class="fg"><label class="fl">Category</label><select class="fi" id="m-cat">${CATEGORIES.map(c=>`<option value="${c.id}" ${a.category===c.id?'selected':''}>${c.icon} ${c.id}</option>`).join('')}</select></div>
        <div class="fg"><label class="fl">Status</label><select class="fi" id="m-status">${STATUSES.map(s=>`<option value="${s}" ${a.status===s?'selected':''}>${s}</option>`).join('')}</select></div>
      </div>
      <div class="modal-grid">
        <div class="fg"><label class="fl">Location / Dept</label><input class="fi" id="m-loc" placeholder="e.g. Radiology – Floor 3" value="${a.location||''}"/></div>
        <div class="fg"><label class="fl">Assigned To</label><input class="fi" id="m-assigned" placeholder="Staff or vendor" value="${a.assigned_to||''}"/></div>
      </div>
      <div class="modal-grid">
        <div class="fg"><label class="fl">Purchase Date</label><input class="fi" type="date" id="m-pdate" value="${a.purchase_date||''}"/></div>
        <div class="fg"><label class="fl">Cost (₱)</label><input class="fi" type="number" id="m-cost" placeholder="0" value="${a.cost||''}"/></div>
      </div>
      <div class="modal-grid">
        <div class="fg"><label class="fl">Last Maintenance</label><input class="fi" type="date" id="m-lmaint" value="${a.last_maintenance||''}"/></div>
        <div class="fg"><label class="fl">Next Maintenance</label><input class="fi" type="date" id="m-nmaint" value="${a.next_maintenance||''}"/></div>
      </div>
      <div class="fg"><label class="fl">Notes</label><textarea class="fi" id="m-notes" placeholder="Serial number, warranty info…">${a.notes||''}</textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-save" id="save-btn" onclick="doSaveAsset(${isEdit},'${a.id||''}')">${isEdit?'Save Changes':'Add Asset'}</button>
    </div>
  </div>`;
  document.body.appendChild(wrap);
}

async function doSaveAsset(isEdit, existingId){
  const name = document.getElementById('m-name')?.value?.trim();
  if(!name){ toast('Asset name is required','err'); return; }

  const btn = document.getElementById('save-btn');
  btn.disabled=true; btn.innerHTML='<span class="spin"></span>Saving…';

  const asset = {
    id: isEdit ? existingId : genId(),
    asset_tag: document.getElementById('m-tag')?.value?.trim() || null,
    name,
    category: document.getElementById('m-cat')?.value,
    status: document.getElementById('m-status')?.value,
    location: document.getElementById('m-loc')?.value?.trim(),
    assigned_to: document.getElementById('m-assigned')?.value?.trim(),
    purchase_date: document.getElementById('m-pdate')?.value || null,
    cost: Number(document.getElementById('m-cost')?.value||0),
    last_maintenance: document.getElementById('m-lmaint')?.value || null,
    next_maintenance: document.getElementById('m-nmaint')?.value || null,
    notes: document.getElementById('m-notes')?.value?.trim(),
  };

  if(await saveAsset(asset, !isEdit)){
    toast(isEdit?'Asset updated ✓':'Asset added ✓');
    closeModal();
    render();
  } else {
    btn.disabled=false; btn.innerHTML=isEdit?'Save Changes':'Add Asset';
  }
}

async function confirmDelete(id){
  const a = assets.find(x=>x.id===id);
  if(!confirm(`Delete "${a?.name}"? This cannot be undone.`)) return;
  if(await deleteAsset(id)){
    toast('Asset deleted');
    if(selectedAsset===id) selectedAsset=null;
    render();
  }
}

  </div>`;
  document.body.appendChild(wrap);
  window._selectedRole = u.role||'viewer';
}

function selectRole(r){
  window._selectedRole = r;
  ['admin','editor','viewer'].forEach(x=>{
    const el = document.getElementById('role-'+x);
    if(!el)return;
    el.style.borderColor = x===r?'var(--ac2)':'var(--bd)';
    el.style.background = x===r?'rgba(0,153,255,.1)':'var(--bg3)';
    el.style.color = x===r?'var(--ac2)':'var(--tx3)';
  });
}

async function doSaveUser(mode, existingId){
  const btn = document.getElementById('usave-btn');
  btn.disabled=true; btn.innerHTML='<span class="spin"></span>Saving…';

  if(mode==='create'){
    const name = document.getElementById('um-name')?.value?.trim();
    const username = document.getElementById('um-user')?.value?.trim().toLowerCase().replace(/\s/g,'');
    const pass = document.getElementById('um-pass')?.value;
    const pass2 = document.getElementById('um-pass2')?.value;
    if(!name||!username){ toast('Name and username required','err'); btn.disabled=false; btn.innerHTML='Create User'; return; }
    if(!pass||pass.length<6){ toast('Password must be at least 6 characters','err'); btn.disabled=false; btn.innerHTML='Create User'; return; }
    if(pass!==pass2){ toast('Passwords do not match','err'); btn.disabled=false; btn.innerHTML='Create User'; return; }
    const {data:ex} = await sb.from('users').select('id').eq('username',username).maybeSingle();
    if(ex){ toast('Username already taken','err'); btn.disabled=false; btn.innerHTML='Create User'; return; }
    const {error} = await sb.from('users').insert({name,username,password:pass,role:window._selectedRole||'viewer'});
    if(error){ toast('Failed: '+error.message,'err'); btn.disabled=false; btn.innerHTML='Create User'; return; }
    await writeLog('CREATE','User',username,`Created user "${name}" (@${username}) with role "${window._selectedRole||'viewer'}"`);
    toast(`User "${name}" created ✓`);
  } else if(mode==='edit'){
    const name = document.getElementById('um-name')?.value?.trim();
    const username = document.getElementById('um-user')?.value?.trim().toLowerCase().replace(/\s/g,'');
    if(!name||!username){ toast('Name and username required','err'); btn.disabled=false; btn.innerHTML='Save Changes'; return; }
    const {data:ex} = await sb.from('users').select('id').eq('username',username).neq('id',existingId).maybeSingle();
    if(ex){ toast('Username already taken','err'); btn.disabled=false; btn.innerHTML='Save Changes'; return; }
    const {error} = await sb.from('users').update({name,username,role:window._selectedRole||'viewer'}).eq('id',existingId);
    if(error){ toast('Failed: '+error.message,'err'); btn.disabled=false; btn.innerHTML='Save Changes'; return; }
    await writeLog('UPDATE','User',existingId,`Updated user "${name}" (@${username}), role: "${window._selectedRole||'viewer'}"`);
    toast('User updated ✓');
  } else if(mode==='passwd'){
    const pass = document.getElementById('um-pass')?.value;
    const pass2 = document.getElementById('um-pass2')?.value;
    if(!pass||pass.length<6){ toast('Password must be at least 6 characters','err'); btn.disabled=false; btn.innerHTML='Update Password'; return; }
    if(pass!==pass2){ toast('Passwords do not match','err'); btn.disabled=false; btn.innerHTML='Update Password'; return; }
    const {error} = await sb.from('users').update({password:pass}).eq('id',existingId);
    if(error){ toast('Failed: '+error.message,'err'); btn.disabled=false; btn.innerHTML='Update Password'; return; }
    const u = users.find(x=>x.id===existingId);
    await writeLog('UPDATE','User',existingId,`Changed password for "${u?.name}" (@${u?.username})`);
    toast('Password updated ✓');
  }

  await loadUsers();
  closeModal();
  render();
}

async function confirmDeleteUser(id){
  const u = users.find(x=>x.id===id);
  if(!confirm(`Delete user "${u?.name}"?`)) return;
  const {error} = await sb.from('users').delete().eq('id',id);
  if(error){ toast('Failed: '+error.message,'err'); return; }
  await writeLog('DELETE','User',id,`Deleted user "${u?.name}" (@${u?.username})`);
  toast('User deleted');
  await loadUsers();
  render();
}

function showChangePassword(){
  renderUserModal('passwd', currentUser);
}

// ─── AUTH ─────────────────────────────────────────────────────────────────────
function renderLogin(app){
  app.innerHTML = `
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-logo">🏥</div>
      <div class="login-title">
        <h1>TadocsAsset</h1>
        <p>Taytay Doctors Multispecialty Hospital</p>
      </div>
      <div id="login-err" style="display:none" class="login-err"></div>
      <div class="form-group"><label class="form-label">Username</label><input class="form-input" id="l-user" placeholder="Enter username" autofocus onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <div class="form-group"><label class="form-label">Password</label><input class="form-input" type="password" id="l-pass" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <button class="btn-primary" id="login-btn" onclick="doLogin()">Sign In →</button>
    </div>
  </div>`;
}

async function doLogin(){
  const u = document.getElementById('l-user')?.value?.trim();
  const p = document.getElementById('l-pass')?.value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-err');
  if(!u||!p){ showErr('Please enter username and password'); return; }
  btn.disabled=true; btn.innerHTML='<span class="spin"></span>Signing in…';
  const {data,error} = await sb.from('users').select('*').eq('username',u).eq('password',p).maybeSingle();
  if(error||!data){ showErr('Invalid username or password'); btn.disabled=false; btn.innerHTML='Sign In →'; return; }
  currentUser=data;
  loading=false;
  render(); // show app immediately after auth

  // load all data in parallel in the background
  const isAdmin = currentUser.role==='admin';
  await Promise.all([
    loadAssets(),
    loadPmHistory(),
    ...(isAdmin ? [loadUsers(), loadActivityLogs()] : []),
  ]);
  setupRealtime();
  render(); // re-render once data is ready
}

function showErr(msg){ const e=document.getElementById('login-err'); if(e){e.textContent='⚠️ '+msg;e.style.display='block';} }

function doLogout(){
  currentUser=null; assets=[]; pmHistory=[]; users=[]; activityLogs=[]; loading=true; selectedAsset=null; searchQuery=''; filterStatus='All'; filterCat='All'; currentPage=0; totalCount=0; statsCache={total:0,active:0,maint:0,inactive:0,totalCost:0,dueSoon:[]};
  render();
}

// ─── REALTIME ─────────────────────────────────────────────────────────────────
function setupRealtime(){
  // Assets: refresh current page + stats on any change
  sb.channel('assets-rt')
    .on('postgres_changes',{event:'*',schema:'public',table:'assets'},async ()=>{
      await loadAssets(); // respects current page/filters
      render();
    })
    .subscribe();

  // PM: only reload PM for the currently open asset if detail panel is open
  sb.channel('pm-rt')
    .on('postgres_changes',{event:'*',schema:'public',table:'pm_history'},async (payload)=>{
      const assetId = payload.new?.asset_id || payload.old?.asset_id;
      if(assetId) await loadPmHistory(assetId);
      else await loadPmHistory();
      render();
    })
    .subscribe();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
function init(){
  // Show login immediately — no DB ping needed before auth
  const s = document.getElementById('splash');
  if(s){ s.style.opacity='0'; setTimeout(()=>s.remove(), 400); }
  document.getElementById('app').style.display = 'block';
  render();
}

// ─── SERVICE WORKER ──────────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

init();
</script>
