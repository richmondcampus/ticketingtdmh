const REP_STATE = { tab:'sales' };

async function renderReports(){
  const el = document.getElementById('page-reports');
  if(!el) return;

  const canSeeCostReports = can(['admin','inventory_manager','auditor']);

  // If the person is on a financial tab they no longer have access to
  // (e.g. role changed, or they navigated here via a stale link), fall back
  // to Sales, which everyone can see.
  if(!canSeeCostReports && (REP_STATE.tab === 'aging' || REP_STATE.tab === 'value')){
    REP_STATE.tab = 'sales';
  }

  el.innerHTML = `
    <div class="tab-bar">
      <button class="tab-btn ${REP_STATE.tab==='sales'?'active':''}" data-tab="sales">Sales</button>
      ${canSeeCostReports ? `<button class="tab-btn ${REP_STATE.tab==='aging'?'active':''}" data-tab="aging">Stock Aging</button>` : ''}
      <button class="tab-btn ${REP_STATE.tab==='conversion'?'active':''}" data-tab="conversion">Inquiry Conversion</button>
      ${canSeeCostReports ? `<button class="tab-btn ${REP_STATE.tab==='value'?'active':''}" data-tab="value">Inventory Value</button>` : ''}
    </div>
    <div id="reports-tab-content"></div>
  `;
  el.querySelectorAll('.tab-btn').forEach(btn=> btn.addEventListener('click', ()=>{ REP_STATE.tab=btn.dataset.tab; renderReports(); }));

  if(REP_STATE.tab==='sales') renderSalesReport();
  else if(REP_STATE.tab==='aging' && canSeeCostReports) renderAgingReport();
  else if(REP_STATE.tab==='conversion') renderConversionReport();
  else if(REP_STATE.tab==='value' && canSeeCostReports) renderInventoryValueReport();
  else renderSalesReport();
}

async function startNewAudit(){
  const year = new Date().getFullYear();
  const ok = await confirmDialog(`Start a new inventory audit for ${year}? This will generate a system stock snapshot for this branch.`, {okLabel:'Start Audit'});
  if(!ok) return;

  const { data, error } = await sb.rpc('generate_audit_snapshot', { p_branch_id: STATE.currentBranch, p_audit_year: year });
  if(error){ toast('Failed: ' + error.message, 'error'); return; }
  toast('Audit snapshot generated. Begin physical counting.', 'success');
  openAuditWorkspace(data);
}

async function openAuditWorkspace(auditId){
  AUDIT_STATE.activeAuditId = auditId;
  const { data: audit } = await sb.from('inventory_audits').select('*').eq('id', auditId).single();
  const { data: lines } = await sb.from('audit_count_lines').select('*, product_brands(*, products(name,sku), brands(name))').eq('audit_id', auditId).order('id');

  const countedCount = (lines||[]).filter(l=>l.physical_qty!==null).length;
  const totalCount = (lines||[]).length;
  const varianceCount = (lines||[]).filter(l=>l.physical_qty!==null && l.variance_qty!==0).length;

  const canCount = can(['admin','auditor','inventory_manager']) && ['open','counting'].includes(audit.status);
  const canSubmit = can(['admin','auditor']) && audit.status==='counting' && countedCount===totalCount && totalCount>0;
  const canApprove = can(['admin']) && audit.status==='pending_approval';
  const canClose = can(['admin']) && audit.status==='approved';

  openModal(`
    <div class="modal-header">
      <h3>${escapeHtml(audit.audit_code)}</h3>
      <span class="badge badge-blue" style="margin-right:8px;">${audit.status.replace(/_/g,' ')}</span>
      <button class="icon-btn" onclick="closeModal()">${ICONS.x}</button>
    </div>
    <div class="modal-body">
      <div class="kpi-row" style="margin-bottom:16px;">
        <div class="stat-card" style="padding:12px;"><div class="stat-value" style="font-size:18px;">${countedCount}/${totalCount}</div><div class="stat-label">Items Counted</div></div>
        <div class="stat-card" style="padding:12px;"><div class="stat-value" style="font-size:18px;${varianceCount>0?'color:var(--red-600);':''}">${varianceCount}</div><div class="stat-label">Variances Found</div></div>
      </div>
      <div class="table-wrap" style="max-height:360px;border:1px solid var(--slate-200);border-radius:8px;">
        <table>
          <thead><tr><th>Product</th><th>Brand</th><th>System Qty</th><th>Physical Count</th><th>Variance</th>${canCount?'<th></th>':''}</tr></thead>
          <tbody>
            ${(lines||[]).map(l=>{
              const variance = l.variance_qty;
              const hasCount = l.physical_qty!==null;
              return `<tr>
                <td>${escapeHtml(l.product_brands?.products?.name||'—')}</td>
                <td>${escapeHtml(l.product_brands?.brands?.name||'—')}</td>
                <td class="mono">${Number(l.system_qty).toLocaleString()}</td>
                <td class="mono">${hasCount ? Number(l.physical_qty).toLocaleString() : '<span style="color:var(--slate-300);">pending</span>'}</td>
                <td class="mono" style="${hasCount && variance!==0 ? (variance>0?'color:var(--green-600);':'color:var(--red-600);') : ''}font-weight:700;">${hasCount ? (variance>0?'+':'')+Number(variance).toLocaleString() : '—'}</td>
                ${canCount ? `<td><button class="btn btn-ghost btn-sm" onclick="promptPhysicalCount('${l.id}', ${l.system_qty})">${hasCount?'Edit':'Count'}</button></td>` : ''}
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
    <div class="modal-footer">
      ${canSubmit ? `<button class="btn btn-primary" onclick="submitAuditForApproval('${audit.id}')">Submit for Approval</button>` : ''}
      ${canApprove ? `<button class="btn btn-primary" onclick="approveAuditAction('${audit.id}')">Approve & Apply Adjustments</button>` : ''}
      ${canClose ? `<button class="btn btn-secondary" onclick="closeAuditAction('${audit.id}')">Close Audit</button>` : ''}
    </div>
  `, {large:true});
}

async function promptPhysicalCount(lineId, systemQty){
  const qty = await promptDialog(`Enter the physical count for this item.`, {
    type: 'number',
    defaultValue: systemQty,
    min: 0,
    okLabel: 'Save Count',
    validate: (val)=>{
      if(val==='') return 'Please enter a quantity.';
      const n = parseFloat(val);
      if(isNaN(n) || n < 0) return 'Enter a valid, non-negative number.';
      return null;
    }
  });
  if(qty===null) return;
  recordCount(lineId, parseFloat(qty));
}
async function recordCount(lineId, qty){
  const { error } = await sb.rpc('record_physical_count', { p_line_id: lineId, p_physical_qty: qty });
  if(error){ toast('Failed: '+error.message,'error'); return; }
  toast('Count recorded.', 'success');
  openAuditWorkspace(AUDIT_STATE.activeAuditId);
}
async function submitAuditForApproval(auditId){
  const ok = await confirmDialog('Submit this audit for admin approval? You will not be able to edit counts after this.', {okLabel:'Submit'});
  if(!ok) return;
  const { error } = await sb.rpc('submit_audit_for_approval', { p_audit_id: auditId });
  if(error){ toast('Failed: '+error.message,'error'); return; }
  toast('Audit submitted for approval.', 'success');
  closeModal(); renderAudit();
}
async function approveAuditAction(auditId){
  const ok = await confirmDialog('Approve this audit? This will apply stock adjustments for all variances (creates audit-correction batches/stock-outs).', {okLabel:'Approve & Apply'});
  if(!ok) return;
  const { error } = await sb.rpc('approve_audit', { p_audit_id: auditId });
  if(error){ toast('Failed: '+error.message,'error'); return; }
  toast('Audit approved. Stock adjustments applied.', 'success');
  closeModal(); renderAudit();
}
async function closeAuditAction(auditId){
  const ok = await confirmDialog('Close this audit? This finalizes the record for compliance.', {okLabel:'Close Audit'});
  if(!ok) return;
  const { error } = await sb.rpc('close_audit', { p_audit_id: auditId });
  if(error){ toast('Failed: '+error.message,'error'); return; }
  toast('Audit closed.', 'success');
  closeModal(); renderAudit();
}

async function openInviteUserModal(){
  openModal(`
    <div class="modal-header"><h3>${ICONS.plus} Invite User</h3><button class="icon-btn" onclick="closeModal()">${ICONS.x}</button></div>
    <div class="modal-body">
      <div style="background:var(--blue-100);color:var(--blue-600);padding:12px 14px;border-radius:8px;font-size:12.5px;margin-bottom:16px;font-weight:500;">
        This sends a Supabase invite email right away. The new staff member clicks the link, sets their password, and can log in immediately — no Dashboard trip needed.
      </div>
      <div class="form-row">
        <div class="form-group"><label>Full Name</label><input type="text" id="iu-name" placeholder="e.g. Juan Dela Cruz"></div>
        <div class="form-group"><label>Username (optional)</label><input type="text" id="iu-username" placeholder="e.g. juan.dc"></div>
      </div>
      <div class="form-group"><label>Email (Gmail is fine)</label><input type="email" id="iu-email" placeholder="employee@gmail.com"></div>
      <div class="form-row">
        <div class="form-group">
          <label>Role</label>
          <select id="iu-role">
            <option value="sales_agent">Sales Agent</option>
            <option value="inventory_manager">Inventory Manager</option>
            <option value="order_prep_staff">Order Prep Staff</option>
            <option value="supplier_manager">Supplier Manager</option>
            <option value="auditor">Auditor</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="form-group">
          <label>Branch</label>
          <select id="iu-branch">${STATE.branches.map(b=>`<option value="${b.id}">${escapeHtml(b.name)}</option>`).join('')}</select>
        </div>
      </div>
      <div class="login-error" id="iu-error" style="display:none;"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="iu-submit">Send Invite</button>
    </div>
  `);

  document.getElementById('iu-submit').addEventListener('click', async ()=>{
    const errEl = document.getElementById('iu-error');
    errEl.style.display = 'none';

    const email = document.getElementById('iu-email').value.trim();
    const fullName = document.getElementById('iu-name').value.trim();
    const username = document.getElementById('iu-username').value.trim();
    const role = document.getElementById('iu-role').value;
    const branchId = document.getElementById('iu-branch').value;

    if(!email || !email.includes('@')){ errEl.textContent = 'Enter a valid email address.'; errEl.style.display='block'; return; }

    const btn = document.getElementById('iu-submit');
    btn.disabled = true; btn.textContent = 'Sending invite...';

    try{
      const { data: { session } } = await sb.auth.getSession();
      const res = await fetch(`${window.SUPABASE_URL}/functions/v1/invite-user`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${session.access_token}`,
        },
        body: JSON.stringify({ email, full_name: fullName, username, role, branch_id: branchId }),
      });
      const result = await res.json();

      if(!res.ok || result.error){
        errEl.textContent = result.error || 'Failed to send invite.';
        errEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Send Invite';
        return;
      }

      toast(`Invite sent to ${email}.`, 'success');
      closeModal();
      renderUsers();
    } catch(e){
      errEl.textContent = 'Network error: ' + e.message;
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Send Invite';
    }
  });
}

const BACKUP_TABLES = [
  'branches','categories','brands','suppliers','customers','users',
  'products','product_brands','stock_batches','stock_levels','stock_movements',
  'inquiries','inquiry_items','purchase_orders','purchase_order_items',
  'inventory_audits','audit_count_lines','audit_logs','notifications'
];

async function renderDataBackupTab(){
  const el = document.getElementById('users-tab-content');
  if(!el) return;

  el.innerHTML = `
    <div class="card">
      <div class="card-header"><h3>${ICONS.download} Export Full Data Backup</h3></div>
      <div class="card-body">
        <p style="font-size:13px;color:var(--slate-700);line-height:1.6;margin-bottom:16px;">
          Downloads a complete snapshot of all business data as a single JSON file — every product, customer, supplier, inquiry, stock batch, purchase order, and audit log currently in the system. Keep this somewhere safe (e.g. Google Drive, an external drive) as a backup independent of Supabase.
        </p>
        <div style="background:var(--amber-100);color:var(--amber-600);padding:12px 14px;border-radius:8px;font-size:12.5px;font-weight:500;margin-bottom:16px;">
          This is a data export for backup/record-keeping, not a one-click restore. To actually restore from this file, the data would need to be re-imported manually or with developer help. For full database-level disaster recovery (point-in-time restore), Supabase's own backup system (available on your Pro plan) is the primary safety net — this export is a secondary, portable copy you control yourself.
        </div>
        <button class="btn btn-primary" id="btn-export-backup">${ICONS.download} Download Backup (JSON)</button>
        <div id="backup-progress" style="margin-top:14px;font-size:12.5px;color:var(--slate-500);"></div>
      </div>
    </div>
  `;

  document.getElementById('btn-export-backup').addEventListener('click', runDataBackupExport);
}

async function runDataBackupExport(){
  const btn = document.getElementById('btn-export-backup');
  const progressEl = document.getElementById('backup-progress');
  btn.disabled = true; btn.textContent = 'Exporting...';

  const backup = {
    exported_at: new Date().toISOString(),
    exported_by: STATE.profile.full_name,
    exported_by_email: STATE.profile.email,
    system: 'Hunyo 24 Trading Inventory System',
    tables: {}
  };

  let hadError = false;

  for(const table of BACKUP_TABLES){
    progressEl.textContent = `Exporting ${table}...`;
    const { data, error } = await sb.from(table).select('*');
    if(error){
      backup.tables[table] = { error: error.message };
      hadError = true;
    } else {
      backup.tables[table] = data;
    }
  }

  progressEl.textContent = hadError
    ? 'Export completed with some errors — check the downloaded file for details.'
    : `Export complete. ${BACKUP_TABLES.length} tables exported.`;

  const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const dateStr = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `Hunyo24-Backup-${dateStr}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  btn.disabled = false; btn.textContent = `${ICONS.download} Download Backup (JSON)`;
  toast(hadError ? 'Backup exported with some errors — please review.' : 'Backup exported successfully.', hadError ? 'error' : 'success');

  await sb.rpc('log_audit_event', { p_action:'create', p_entity_type:'data_backup', p_entity_id: null, p_new_values: { exported_tables: BACKUP_TABLES.length } });
}

// ============ AUDIT LOGS (compliance) ============
const LOG_STATE = { page:1, pageSize:25, actionFilter:'', entityFilter:'' };

async function renderLogs(){
  const el = document.getElementById('page-logs');
  if(!el) return;
  el.innerHTML = `
    <div class="toolbar">
      <select class="filter-select" id="log-action-filter">
        <option value="">All Actions</option>
        <option value="login">Login</option>
        <option value="logout">Logout</option>
        <option value="create">Create</option>
        <option value="update">Update</option>
        <option value="delete">Delete</option>
        <option value="approve">Approve</option>
        <option value="convert">Convert</option>
      </select>
      <select class="filter-select" id="log-entity-filter">
        <option value="">All Entities</option>
        <option value="user">User</option>
        <option value="product">Product</option>
        <option value="inquiry">Inquiry</option>
        <option value="purchase_order">Purchase Order</option>
        <option value="audit">Audit</option>
      </select>
    </div>
    <div class="card">
      <div class="table-wrap" id="logs-table-wrap"><div style="padding:20px;"><div class="skeleton" style="height:320px;"></div></div></div>
      <div class="pagination" id="logs-pagination"></div>
    </div>
  `;
  document.getElementById('log-action-filter').addEventListener('change', e=>{ LOG_STATE.actionFilter=e.target.value; LOG_STATE.page=1; refreshLogsTable(); });
  document.getElementById('log-entity-filter').addEventListener('change', e=>{ LOG_STATE.entityFilter=e.target.value; LOG_STATE.page=1; refreshLogsTable(); });
  refreshLogsTable();
}

async function refreshLogsTable(){
  const wrap = document.getElementById('logs-table-wrap');
  if(!wrap) return;

  let query = sb.from('audit_logs').select('*, users(full_name, email)', {count:'exact'});
  if(LOG_STATE.actionFilter) query = query.eq('action', LOG_STATE.actionFilter);
  if(LOG_STATE.entityFilter) query = query.eq('entity_type', LOG_STATE.entityFilter);

  const from = (LOG_STATE.page-1)*LOG_STATE.pageSize;
  const to = from + LOG_STATE.pageSize - 1;
  query = query.order('created_at',{ascending:false}).range(from,to);

  const { data, count, error } = await query;
  if(error){ wrap.innerHTML = `<div class="empty-state"><p>Error: ${escapeHtml(error.message)}</p></div>`; return; }
  if(!data || data.length===0){ wrap.innerHTML = `<div class="empty-state">${ICONS.empty}<p>No audit log entries found.</p></div>`; document.getElementById('logs-pagination').innerHTML=''; return; }

  const actionColors = { login:'green', logout:'slate', create:'blue', update:'amber', delete:'red', approve:'green', convert:'orange' };

  wrap.innerHTML = `<table>
    <thead><tr><th>When</th><th>User</th><th>Action</th><th>Entity</th><th>Details</th></tr></thead>
    <tbody>
      ${data.map(l=>`<tr>
        <td style="color:var(--slate-500);font-size:12px;">${fmtDateTime(l.created_at)}</td>
        <td>${escapeHtml(l.users?.full_name || 'System')}</td>
        <td><span class="badge badge-${actionColors[l.action]||'slate'}">${l.action}</span></td>
        <td>${escapeHtml(l.entity_type)}</td>
        <td><button class="btn btn-ghost btn-sm" onclick='viewLogDetail(${JSON.stringify(JSON.stringify(l)).replace(/'/g,"&#39;")})'>View</button></td>
      </tr>`).join('')}
    </tbody>
  </table>`;

  renderPagination('logs-pagination', LOG_STATE.page, LOG_STATE.pageSize, count||0, (p)=>{ LOG_STATE.page=p; refreshLogsTable(); });
}

function viewLogDetail(logJson){
  const l = JSON.parse(logJson);
  openModal(`
    <div class="modal-header"><h3>Audit Log Detail</h3><button class="icon-btn" onclick="closeModal()">${ICONS.x}</button></div>
    <div class="modal-body">
      <div style="font-size:13px;line-height:1.8;">
        <div><strong>When:</strong> ${fmtDateTime(l.created_at)}</div>
        <div><strong>User:</strong> ${escapeHtml(l.users?.full_name || 'System')} (${escapeHtml(l.users?.email||'—')})</div>
        <div><strong>Action:</strong> ${escapeHtml(l.action)}</div>
        <div><strong>Entity:</strong> ${escapeHtml(l.entity_type)} ${l.entity_id ? `(${escapeHtml(l.entity_id)})` : ''}</div>
      </div>
      ${l.old_values ? `<div style="margin-top:14px;"><div style="font-size:12px;font-weight:700;color:var(--slate-500);margin-bottom:4px;">OLD VALUES</div><pre class="mono" style="background:var(--slate-100);padding:10px;border-radius:6px;font-size:11.5px;overflow-x:auto;">${escapeHtml(JSON.stringify(l.old_values,null,2))}</pre></div>` : ''}
      ${l.new_values ? `<div style="margin-top:10px;"><div style="font-size:12px;font-weight:700;color:var(--slate-500);margin-bottom:4px;">NEW VALUES</div><pre class="mono" style="background:var(--slate-100);padding:10px;border-radius:6px;font-size:11.5px;overflow-x:auto;">${escapeHtml(JSON.stringify(l.new_values,null,2))}</pre></div>` : ''}
    </div>
    <div class="modal-footer"><button class="btn btn-primary" onclick="closeModal()">Close</button></div>
  `);
}

const ROLE_LABELS = {
  admin: 'Admin', inventory_manager: 'Inventory Manager', sales_agent: 'Sales Agent',
  order_prep_staff: 'Order Prep Staff', supplier_manager: 'Supplier Manager', auditor: 'Auditor'
};

function renderHelp(){
  const el = document.getElementById('page-help');
  if(!el) return;

  const myRole = STATE.profile.role;
  const myFaq = ROLE_FAQ[myRole] || [];

  el.innerHTML = `
    <div class="toolbar">
      <div class="search-input-wrap" style="max-width:480px;">
        ${ICONS.search}
        <input type="text" class="search-input" id="help-search" placeholder="Search guidelines and FAQ...">
      </div>
    </div>

    <div class="card" style="margin-bottom:20px;">
      <div class="card-header">
        <h3>${ICONS.help} General Guidelines</h3>
        <span class="badge badge-blue">All Users</span>
      </div>
      <div class="card-body" id="help-general-list" style="padding-top:8px;"></div>
    </div>

    <div class="card">
      <div class="card-header">
        <h3>Frequently Asked Questions</h3>
        <span class="badge badge-orange">${escapeHtml(ROLE_LABELS[myRole] || myRole)}</span>
      </div>
      <div class="card-body" id="help-faq-list" style="padding-top:8px;"></div>
    </div>
  `;

  renderGeneralGuidelines(GENERAL_GUIDELINES);
  renderRoleFaq(myFaq);

  document.getElementById('help-search').addEventListener('input', debounce(e=>{
    HELP_STATE.search = e.target.value.trim().toLowerCase();
    filterHelpContent();
  }, 250));
}

function renderGeneralGuidelines(items){
  const container = document.getElementById('help-general-list');
  if(items.length === 0){
    container.innerHTML = `<div class="empty-state">${ICONS.empty}<p>No matching guidelines.</p></div>`;
    return;
  }
  container.innerHTML = items.map((g, i) => `
    <div class="help-accordion-item" data-section="general" data-idx="${i}" style="border-bottom:1px solid var(--slate-100);">
      <button class="help-accordion-trigger" style="width:100%;text-align:left;background:none;border:none;padding:13px 4px;display:flex;align-items:center;justify-content:space-between;gap:10px;">
        <span style="font-size:13.5px;font-weight:600;color:var(--navy-900);">${escapeHtml(g.title)}</span>
        <span class="help-chevron" style="color:var(--slate-500);flex-shrink:0;transition:transform .15s;">${ICONS.chevronDown}</span>
      </button>
      <div class="help-accordion-body" style="display:none;padding:0 4px 16px;font-size:13px;color:var(--slate-700);line-height:1.6;">${g.body}</div>
    </div>
  `).join('');
  wireAccordion(container);
}

function renderRoleFaq(items){
  const container = document.getElementById('help-faq-list');
  if(items.length === 0){
    container.innerHTML = `<div class="empty-state">${ICONS.empty}<p>No FAQ entries yet for your role.</p></div>`;
    return;
  }
  container.innerHTML = items.map((f, i) => `
    <div class="help-accordion-item" data-section="faq" data-idx="${i}" style="border-bottom:1px solid var(--slate-100);">
      <button class="help-accordion-trigger" style="width:100%;text-align:left;background:none;border:none;padding:13px 4px;display:flex;align-items:center;justify-content:space-between;gap:10px;">
        <span style="font-size:13.5px;font-weight:600;color:var(--navy-900);">${escapeHtml(f.q)}</span>
        <span class="help-chevron" style="color:var(--slate-500);flex-shrink:0;transition:transform .15s;">${ICONS.chevronDown}</span>
      </button>
      <div class="help-accordion-body" style="display:none;padding:0 4px 16px;font-size:13px;color:var(--slate-700);line-height:1.6;">${escapeHtml(f.a)}</div>
    </div>
  `).join('');
  wireAccordion(container);
}

function wireAccordion(container){
  container.querySelectorAll('.help-accordion-trigger').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const item = btn.closest('.help-accordion-item');
      const body = item.querySelector('.help-accordion-body');
      const chevron = item.querySelector('.help-chevron');
      const isOpen = body.style.display === 'block';
      body.style.display = isOpen ? 'none' : 'block';
      chevron.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(180deg)';
    });
  });
}

function filterHelpContent(){
  const q = HELP_STATE.search;
  const myRole = STATE.profile.role;

  const filteredGeneral = q
    ? GENERAL_GUIDELINES.filter(g => g.title.toLowerCase().includes(q) || g.body.toLowerCase().includes(q))
    : GENERAL_GUIDELINES;
  const filteredFaq = q
    ? (ROLE_FAQ[myRole]||[]).filter(f => f.q.toLowerCase().includes(q) || f.a.toLowerCase().includes(q))
    : (ROLE_FAQ[myRole]||[]);

  renderGeneralGuidelines(filteredGeneral);
  renderRoleFaq(filteredFaq);
}
