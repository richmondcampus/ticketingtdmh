<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>HUnyo 24 Trading — Inventory System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --navy-950:#0A1320;
  --navy-900:#0F1B2D;
  --navy-800:#16263D;
  --navy-700:#1E3350;
  --navy-600:#2A4768;
  --orange-600:#E8590C;
  --orange-500:#F2730F;
  --orange-100:#FFE8D6;
  --canvas:#F7F5F1;
  --surface:#FFFFFF;
  --slate-900:#1A202C;
  --slate-700:#2B3445;
  --slate-500:#64748B;
  --slate-300:#CBD5E1;
  --slate-200:#E2E8F0;
  --slate-100:#F1F5F9;
  --green-600:#1E8E5A;
  --green-100:#DCFCE7;
  --amber-600:#D97706;
  --amber-100:#FEF3C7;
  --red-600:#DC2626;
  --red-100:#FEE2E2;
  --blue-600:#2563EB;
  --blue-100:#DBEAFE;
  --radius-sm:6px;
  --radius-md:10px;
  --radius-lg:16px;
  --shadow-sm:0 1px 2px rgba(15,27,45,0.06);
  --shadow-md:0 4px 12px rgba(15,27,45,0.08);
  --shadow-lg:0 12px 32px rgba(15,27,45,0.16);
  --font-ui:'Inter',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--font-ui);
  background:var(--canvas);
  color:var(--slate-700);
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
  height:100vh;
}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--slate-300);border-radius:8px;}
::-webkit-scrollbar-thumb:hover{background:var(--slate-500);}

a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;}
/* Safety net: any icon SVG without an explicit size (inline style/width attr)
   defaults to a sane 18px instead of stretching to fill its container. Specific
   contexts (.empty-state svg, .stat-icon svg, etc.) override this as needed. */
svg{width:18px;height:18px;flex-shrink:0;}
input,select,textarea{font-family:inherit;}
:focus-visible{outline:2px solid var(--orange-600);outline-offset:2px;}

/* ===== STOCK PULSE — signature element ===== */
.pulse-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--green-600);
  display:inline-block;
  position:relative;
  flex-shrink:0;
}
.pulse-dot::after{
  content:'';
  position:absolute;inset:0;
  border-radius:50%;
  background:var(--green-600);
  animation:pulse-ring 1.8s cubic-bezier(0.4,0,0.6,1) infinite;
}
.pulse-dot.flash::after{ animation-duration:0.6s; animation-iteration-count:2; }
@keyframes pulse-ring{
  0%{ transform:scale(1); opacity:0.7; }
  100%{ transform:scale(2.8); opacity:0; }
}
@media (prefers-reduced-motion:reduce){
  .pulse-dot::after{ animation:none; }
}

/* ===== LOGIN SCREEN ===== */
#login-screen{
  position:fixed;inset:0;
  background:linear-gradient(135deg,var(--navy-950) 0%,var(--navy-800) 100%);
  display:flex;align-items:center;justify-content:center;
  z-index:1000;
  padding:24px;
}
#login-screen::before{
  content:'';
  position:absolute;inset:0;
  background-image:
    repeating-linear-gradient(90deg, rgba(232,89,12,0.04) 0px, rgba(232,89,12,0.04) 1px, transparent 1px, transparent 64px),
    repeating-linear-gradient(0deg, rgba(232,89,12,0.04) 0px, rgba(232,89,12,0.04) 1px, transparent 1px, transparent 64px);
  pointer-events:none;
}
.login-card{
  position:relative;
  background:var(--surface);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);
  width:100%;max-width:420px;
  padding:40px 36px;
}
.login-brand{
  display:flex;align-items:center;gap:12px;margin-bottom:8px;
}
.login-brand .mark{
  width:44px;height:44px;border-radius:10px;
  background:linear-gradient(135deg,var(--orange-600),var(--orange-500));
  display:flex;align-items:center;justify-content:center;
  font-weight:800;color:white;font-size:18px;
  flex-shrink:0;
}
.login-brand h1{font-size:19px;font-weight:800;color:var(--navy-900);letter-spacing:-0.02em;}
.login-brand p{font-size:12px;color:var(--slate-500);font-weight:600;letter-spacing:0.04em;text-transform:uppercase;}
.login-sub{font-size:14px;color:var(--slate-500);margin:20px 0 24px;line-height:1.5;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--slate-700);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.03em;}
.form-group input{
  width:100%;padding:11px 14px;
  border:1.5px solid var(--slate-200);
  border-radius:var(--radius-sm);
  font-size:14px;
  transition:border-color .15s;
  background:var(--slate-100);
}
.form-group input:focus{border-color:var(--orange-600);background:white;}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:11px 20px;border-radius:var(--radius-sm);
  font-size:14px;font-weight:600;border:none;
  transition:all .15s;
}
.btn-primary{background:var(--orange-600);color:white;width:100%;}
.btn-primary:hover{background:#D14E0A;}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed;}
.btn-secondary{background:var(--slate-100);color:var(--slate-700);border:1.5px solid var(--slate-200);}
.btn-secondary:hover{background:var(--slate-200);}
.btn-ghost{background:transparent;color:var(--slate-500);}
.btn-ghost:hover{background:var(--slate-100);}
.btn-danger{background:var(--red-600);color:white;}
.btn-danger:hover{background:#C01E1E;}
.btn-sm{padding:7px 12px;font-size:12.5px;}
.login-footer{margin-top:20px;text-align:center;font-size:13px;color:var(--slate-500);}
.login-footer a{color:var(--orange-600);font-weight:600;}
.login-error{
  background:var(--red-100);color:var(--red-600);
  padding:10px 14px;border-radius:var(--radius-sm);
  font-size:13px;margin-bottom:16px;display:none;
  font-weight:500;
}
.login-toggle{display:flex;gap:4px;background:var(--slate-100);padding:4px;border-radius:var(--radius-sm);margin-bottom:24px;}
.login-toggle button{flex:1;padding:9px;border:none;background:transparent;border-radius:6px;font-size:13px;font-weight:600;color:var(--slate-500);}
.login-toggle button.active{background:white;color:var(--navy-900);box-shadow:var(--shadow-sm);}

/* ===== APP SHELL ===== */
#app-shell{display:none;height:100vh;overflow:hidden;}
#app-shell.active{display:flex;}

/* SIDEBAR */
#sidebar{
  width:248px;flex-shrink:0;
  background:var(--navy-900);
  display:flex;flex-direction:column;
  height:100vh;
  transition:width .2s;
}
#sidebar.collapsed{width:72px;}
.sidebar-header{
  padding:20px 16px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}
.sidebar-header .mark{
  width:36px;height:36px;border-radius:8px;flex-shrink:0;
  background:linear-gradient(135deg,var(--orange-600),var(--orange-500));
  display:flex;align-items:center;justify-content:center;
  font-weight:800;color:white;font-size:15px;
}
.sidebar-header .brand-text{overflow:hidden;white-space:nowrap;}
.sidebar-header .brand-text h1{font-size:14px;font-weight:800;color:white;letter-spacing:-0.01em;}
.sidebar-header .brand-text p{font-size:10px;color:rgba(255,255,255,0.5);font-weight:600;letter-spacing:0.05em;text-transform:uppercase;}
#sidebar.collapsed .brand-text{display:none;}

.sidebar-nav{flex:1;overflow-y:auto;padding:12px 10px;}
.nav-section{margin-bottom:18px;}
.nav-section-label{
  font-size:10px;font-weight:700;color:rgba(255,255,255,0.35);
  text-transform:uppercase;letter-spacing:0.08em;
  padding:8px 12px 6px;
}
#sidebar.collapsed .nav-section-label{display:none;}
.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;border-radius:8px;
  color:rgba(255,255,255,0.65);
  font-size:13.5px;font-weight:500;
  cursor:pointer;margin-bottom:2px;
  white-space:nowrap;overflow:hidden;
  position:relative;
  transition:background .12s,color .12s;
}
.nav-item svg{width:18px;height:18px;flex-shrink:0;}
.nav-item:hover{background:rgba(255,255,255,0.06);color:white;}
.nav-item.active{background:var(--orange-600);color:white;}
.nav-item .nav-badge{
  margin-left:auto;background:var(--red-600);color:white;
  font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;
  min-width:18px;text-align:center;
}
#sidebar.collapsed .nav-item span:not(.nav-badge){display:none;}
#sidebar.collapsed .nav-item .nav-badge{position:absolute;top:4px;right:4px;margin-left:0;}

.sidebar-footer{
  padding:14px;border-top:1px solid rgba(255,255,255,0.08);
}
.user-chip{
  display:flex;align-items:center;gap:10px;
  padding:8px;border-radius:8px;cursor:pointer;
}
.user-chip:hover{background:rgba(255,255,255,0.06);}
.user-avatar{
  width:32px;height:32px;border-radius:50%;
  background:var(--orange-600);color:white;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:12px;flex-shrink:0;
}
.user-info{overflow:hidden;flex:1;}
#sidebar.collapsed .user-info{display:none;}
.user-info .name{font-size:12.5px;font-weight:600;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-info .role{font-size:10.5px;color:rgba(255,255,255,0.5);text-transform:capitalize;}
.collapse-btn{
  width:100%;padding:8px;margin-top:8px;
  background:rgba(255,255,255,0.04);border:none;border-radius:6px;
  color:rgba(255,255,255,0.5);display:flex;align-items:center;justify-content:center;
}
.collapse-btn:hover{background:rgba(255,255,255,0.08);color:white;}

/* MAIN AREA */
#main-area{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0;}
#topbar{
  height:64px;flex-shrink:0;background:var(--surface);
  border-bottom:1px solid var(--slate-200);
  display:flex;align-items:center;gap:16px;padding:0 24px;
}
.topbar-title{font-size:17px;font-weight:700;color:var(--navy-900);}
.topbar-spacer{flex:1;}
.branch-pill{
  display:flex;align-items:center;gap:8px;
  padding:7px 14px;background:var(--slate-100);border-radius:20px;
  font-size:12.5px;font-weight:600;color:var(--slate-700);
}
.icon-btn{
  width:38px;height:38px;border-radius:8px;border:none;background:transparent;
  display:flex;align-items:center;justify-content:center;color:var(--slate-500);
  position:relative;
}
.icon-btn:hover{background:var(--slate-100);color:var(--navy-900);}
.icon-btn svg{width:19px;height:19px;}
.notif-dot{
  position:absolute;top:7px;right:7px;width:8px;height:8px;border-radius:50%;
  background:var(--red-600);border:2px solid white;
}
#realtime-indicator{
  display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--slate-500);font-weight:600;
}

#content-area{flex:1;overflow-y:auto;padding:24px;}
.page{display:none;}
.page.active{display:block;animation:fadein .2s;}
@keyframes fadein{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

/* ===== SHARED COMPONENTS ===== */
.card{background:var(--surface);border-radius:var(--radius-md);border:1px solid var(--slate-200);box-shadow:var(--shadow-sm);}
.card-header{padding:18px 20px;border-bottom:1px solid var(--slate-200);display:flex;align-items:center;gap:12px;}
.card-header h3{font-size:15px;font-weight:700;color:var(--navy-900);}
.card-body{padding:20px;}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:20px;}
.stat-card{
  background:var(--surface);border-radius:var(--radius-md);border:1px solid var(--slate-200);
  padding:18px 20px;position:relative;overflow:hidden;
}
.stat-card .stat-icon{
  width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;
}
.stat-card .stat-icon svg{width:18px;height:18px;}
.stat-card .stat-value{font-size:26px;font-weight:800;color:var(--navy-900);font-family:var(--font-mono);letter-spacing:-0.02em;}
.stat-card .stat-label{font-size:12px;color:var(--slate-500);font-weight:600;margin-top:4px;}
.stat-card .stat-delta{font-size:11.5px;font-weight:700;margin-top:8px;display:flex;align-items:center;gap:4px;}
.stat-delta.up{color:var(--green-600);}
.stat-delta.down{color:var(--red-600);}

.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13.5px;}
thead th{
  text-align:left;padding:10px 14px;font-size:11px;font-weight:700;
  color:var(--slate-500);text-transform:uppercase;letter-spacing:0.04em;
  background:var(--slate-100);border-bottom:1px solid var(--slate-200);
  white-space:nowrap;position:sticky;top:0;z-index:1;
}
tbody td{padding:12px 14px;border-bottom:1px solid var(--slate-100);color:var(--slate-700);}
tbody tr:hover{background:var(--slate-100);}
tbody tr:last-child td{border-bottom:none;}
.mono{font-family:var(--font-mono);font-size:12.5px;}

.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;
  text-transform:capitalize;
}
.badge-green{background:var(--green-100);color:var(--green-600);}
.badge-amber{background:var(--amber-100);color:var(--amber-600);}
.badge-red{background:var(--red-100);color:var(--red-600);}
.badge-blue{background:var(--blue-100);color:var(--blue-600);}
.badge-slate{background:var(--slate-200);color:var(--slate-700);}
.badge-orange{background:var(--orange-100);color:var(--orange-600);}

.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.search-input-wrap{position:relative;flex:1;min-width:220px;max-width:380px;}
.search-input-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--slate-500);}
.search-input{width:100%;padding:9px 12px 9px 36px;border:1.5px solid var(--slate-200);border-radius:var(--radius-sm);font-size:13.5px;background:var(--surface);}
.search-input:focus{border-color:var(--orange-600);}
select.filter-select{padding:9px 12px;border:1.5px solid var(--slate-200);border-radius:var(--radius-sm);font-size:13px;background:var(--surface);color:var(--slate-700);}

.pagination{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-top:1px solid var(--slate-200);font-size:12.5px;color:var(--slate-500);}
.pagination-btns{display:flex;gap:6px;}
.page-btn{padding:6px 11px;border:1.5px solid var(--slate-200);background:white;border-radius:6px;font-size:12.5px;font-weight:600;color:var(--slate-700);}
.page-btn:hover:not(:disabled){border-color:var(--orange-600);color:var(--orange-600);}
.page-btn:disabled{opacity:0.4;cursor:not-allowed;}

.empty-state{padding:60px 20px;text-align:center;color:var(--slate-500);}
.empty-state svg{width:48px;height:48px;margin:0 auto 14px;opacity:0.3;}
.empty-state p{font-size:13.5px;font-weight:500;}

.skeleton{background:linear-gradient(90deg,var(--slate-100) 25%,var(--slate-200) 50%,var(--slate-100) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:4px;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

/* MODAL */
.modal-overlay{
  position:fixed;inset:0;background:rgba(10,19,32,0.55);
  display:none;align-items:center;justify-content:center;z-index:500;padding:20px;
  backdrop-filter:blur(2px);
}
.modal-overlay.active{display:flex;}
.modal{
  background:white;border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);
  width:100%;max-width:560px;max-height:90vh;display:flex;flex-direction:column;
}
.modal.modal-lg{max-width:840px;}
.modal-header{padding:18px 22px;border-bottom:1px solid var(--slate-200);display:flex;align-items:center;gap:12px;}
.modal-header h3{font-size:16px;font-weight:700;color:var(--navy-900);flex:1;}
.modal-body{padding:22px;overflow-y:auto;}
.modal-footer{padding:16px 22px;border-top:1px solid var(--slate-200);display:flex;justify-content:flex-end;gap:10px;}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-group textarea{width:100%;padding:11px 14px;border:1.5px solid var(--slate-200);border-radius:var(--radius-sm);font-size:14px;resize:vertical;min-height:70px;}
.form-group select{width:100%;padding:11px 14px;border:1.5px solid var(--slate-200);border-radius:var(--radius-sm);font-size:14px;background:white;}

/* TOAST */
#toast-container{position:fixed;bottom:24px;right:24px;z-index:2000;display:flex;flex-direction:column;gap:10px;}
.toast{
  background:var(--navy-900);color:white;padding:13px 18px;border-radius:var(--radius-sm);
  font-size:13.5px;font-weight:500;box-shadow:var(--shadow-lg);
  display:flex;align-items:center;gap:10px;min-width:280px;
  animation:toast-in .25s ease;
}
.toast.success{background:var(--green-600);}
.toast.error{background:var(--red-600);}
.toast.info{background:var(--navy-900);}
@keyframes toast-in{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}

/* CART (Inquiry module) */
.inquiry-layout{display:grid;grid-template-columns:1fr 360px;gap:20px;align-items:start;}
.cart-panel{position:sticky;top:0;}
.cart-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--slate-100);}
.cart-item-info{flex:1;min-width:0;}
.cart-item-name{font-size:13px;font-weight:600;color:var(--navy-900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cart-item-brand{font-size:11.5px;color:var(--slate-500);}
.qty-stepper{display:flex;align-items:center;gap:4px;}
.qty-stepper button{width:24px;height:24px;border-radius:5px;border:1px solid var(--slate-200);background:white;font-size:14px;font-weight:700;color:var(--slate-700);display:flex;align-items:center;justify-content:center;}
.qty-stepper input{width:40px;text-align:center;border:1px solid var(--slate-200);border-radius:5px;padding:3px;font-size:12.5px;font-family:var(--font-mono);}

.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;}
.product-card{
  background:white;border:1.5px solid var(--slate-200);border-radius:var(--radius-md);
  padding:14px;cursor:pointer;transition:all .15s;
}
.product-card:hover{border-color:var(--orange-600);box-shadow:var(--shadow-md);transform:translateY(-1px);}
.product-card-img{
  width:100%;height:90px;background:var(--slate-100);border-radius:8px;
  display:flex;align-items:center;justify-content:center;margin-bottom:10px;color:var(--slate-300);
}
.product-card-img svg{width:32px;height:32px;}
.product-card-name{font-size:13px;font-weight:700;color:var(--navy-900);margin-bottom:3px;line-height:1.3;}
.product-card-sku{font-size:10.5px;color:var(--slate-500);font-family:var(--font-mono);margin-bottom:8px;}
.brand-chips{display:flex;flex-wrap:wrap;gap:5px;}
.brand-chip{
  font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:12px;
  background:var(--slate-100);color:var(--slate-700);border:1px solid var(--slate-200);
}
.brand-chip.preferred{background:var(--orange-100);color:var(--orange-600);border-color:var(--orange-100);}

.tab-bar{display:flex;gap:4px;border-bottom:2px solid var(--slate-200);margin-bottom:20px;}
.tab-btn{padding:11px 16px;background:none;border:none;font-size:13.5px;font-weight:600;color:var(--slate-500);border-bottom:2px solid transparent;margin-bottom:-2px;}
.tab-btn.active{color:var(--orange-600);border-bottom-color:var(--orange-600);}
.tab-btn:hover:not(.active){color:var(--navy-900);}

.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;}

@media (max-width: 900px){
  #sidebar{position:fixed;left:0;top:0;z-index:200;width:240px;transform:translateX(-100%);transition:transform .2s;}
  #sidebar.mobile-open{transform:translateX(0);}
  .inquiry-layout{grid-template-columns:1fr;}

// ---------- FORMATTERS ----------
function peso(n){
  return '₱' + Number(n||0).toLocaleString('en-PH', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtDate(d){
  if(!d) return '—';
  return new Date(d).toLocaleDateString('en-PH', {year:'numeric',month:'short',day:'numeric'});
}
function fmtDateTime(d){
  if(!d) return '—';
  return new Date(d).toLocaleString('en-PH', {year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
}
function timeAgo(d){
  const s = Math.floor((new Date() - new Date(d))/1000);
  if(s<60) return 'just now';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}
function escapeHtml(str){
  if(str===null||str===undefined) return '';
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function debounce(fn, ms=300){
  let t;
  return (...args)=>{ clearTimeout(t); t = setTimeout(()=>fn(...args), ms); };
}

// ---------- AUTH ----------
async function initAuth(){
  const { data: { session } } = await sb.auth.getSession();
  if(session){
    await onAuthenticated(session);
  } else {
    showLogin();
  }

  sb.auth.onAuthStateChange(async (event, session) => {
    // IMPORTANT: onAuthStateChange fires for more than just a fresh login —
    // it also fires on TOKEN_REFRESHED (automatic, every ~hour) and again on
    // SIGNED_IN when the browser tab regains focus/visibility. We only want
    // to run the full "just logged in" flow (navigate to dashboard, open a
    // realtime channel, etc.) the FIRST time we see a given user session —
    // not every time the token quietly refreshes in the background.
    if(event === 'SIGNED_IN' && session){
      const alreadyActiveForThisUser = STATE.profile && STATE.user && STATE.user.id === session.user.id;
      if(alreadyActiveForThisUser){
        // Same user, already fully loaded — just keep the session fresh, do nothing visual.
        STATE.user = session.user;
        return;
      }
      await onAuthenticated(session);
    } else if(event === 'TOKEN_REFRESHED'){
      // Token quietly renewed in the background — update our reference, but
      // do NOT re-navigate, re-render, or open new realtime channels.
      if(session) STATE.user = session.user;
    } else if(event === 'SIGNED_OUT'){
      STATE.profile = null;
      STATE.user = null;
      showLogin();
    }
  });
}

async function onAuthenticated(session){
  STATE.user = session.user;
  const { data: profile, error } = await sb.from('users').select('*').eq('id', session.user.id).single();
  if(error || !profile){
    toast('Could not load your profile. Contact admin.', 'error');
    await sb.auth.signOut();
    return;
  }
  if(!profile.is_active){
    toast('Your account has been deactivated. Contact admin.', 'error');
    await sb.auth.signOut();
    return;
  }
  STATE.profile = profile;

  // Update last_login_at + audit log (fire-and-forget, only happens once per real login now)
  sb.from('users').update({ last_login_at: new Date().toISOString() }).eq('id', profile.id).then(()=>{});
  sb.rpc('log_audit_event', { p_action:'login', p_entity_type:'user', p_entity_id: profile.id }).then(()=>{});

  await loadBranches();
  showApp();
  renderSidebar();
  navigateTo('dashboard');
  teardownRealtimeSubscriptions(); // safety: ensure no leftover channels before opening a fresh one
  setupRealtimeSubscriptions();
  loadNotificationBadge();
}

async function loadBranches(){
  const { data } = await sb.from('branches').select('*').eq('is_active', true).order('is_main_branch', {ascending:false});
  STATE.branches = data || [];
  STATE.currentBranch = STATE.profile.branch_id || (STATE.branches[0] && STATE.branches[0].id);
  const branchObj = STATE.branches.find(b=>b.id===STATE.currentBranch);
  document.getElementById('branch-pill-name').textContent = branchObj ? branchObj.name : 'All Branches';
}

function showLogin(){
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app-shell').classList.remove('active');
}
function showApp(){
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-shell').classList.add('active');
  const initials = (STATE.profile.full_name||'??').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
  document.getElementById('user-avatar').textContent = initials;
  document.getElementById('user-name').textContent = STATE.profile.full_name;
  document.getElementById('user-role').textContent = STATE.profile.role.replace(/_/g,' ');
}

// Resolves whatever the person typed (email OR username) into an actual email.
// If it already looks like an email, use it as-is — no need to hit the DB.
// Otherwise, look up the username via the public RPC. Generic "not found" is fine
// here since signInWithPassword gives a generic error anyway (no enumeration risk).
async function resolveLoginEmail(identifier){
  if(identifier.includes('@')) return identifier;
  const { data, error } = await sb.rpc('get_email_for_username', { p_username: identifier });
  if(error || !data) return identifier; // fall through; signIn will just fail with invalid credentials
  return data;
}

document.getElementById('login-form').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const identifier = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('login-submit-btn');
  errEl.style.display='none';
  btn.disabled = true; btn.textContent = 'Signing in...';

  const email = await resolveLoginEmail(identifier);
  const { error } = await sb.auth.signInWithPassword({ email, password });

  btn.disabled = false; btn.textContent = 'Sign In';
  if(error){
    errEl.textContent = error.message === 'Invalid login credentials' ? 'Incorrect email/username or password.' : error.message;
    errEl.style.display = 'block';
  }
});

document.getElementById('forgot-password-link').addEventListener('click', async (e)=>{
  e.preventDefault();
  const identifier = document.getElementById('login-email').value.trim();
  if(!identifier){ toast('Enter your email or username first, then click "Forgot password?"', 'error'); return; }
  const email = await resolveLoginEmail(identifier);
  const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.href });
  const successEl = document.getElementById('login-success');
  if(error){ toast(error.message, 'error'); }
  else {
    successEl.textContent = 'If an account exists, a password reset email has been sent.';
    successEl.style.display = 'block';
  }
});

document.getElementById('logout-btn').addEventListener('click', async ()=>{

});

    suppliers: renderSuppliers,
    reports: renderReports,

  if(window.innerWidth <= 900) document.getElementById('sidebar').classList.remove('mobile-open');
}

// ---------- REALTIME ----------
function setupRealtimeSubscriptions(){
  const ch = sb.channel('inventory-realtime')
    .on('postgres_changes', { event:'*', schema:'public', table:'stock_levels' }, payload=>{
      flashPulse();
      if(STATE.page==='inventory') refreshInventoryTable();
      if(STATE.page==='dashboard') renderDashboard();
    })
    .on('postgres_changes', { event:'*', schema:'public', table:'inquiries' }, payload=>{
      flashPulse();
      if(STATE.page==='inquiry') refreshInquiryList();
      if(STATE.page==='dashboard') renderDashboard();
    })
    .on('postgres_changes', { event:'*', schema:'public', table:'purchase_orders' }, payload=>{
      flashPulse();
      if(STATE.page==='suppliers') refreshPOList();
    })
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'notifications', filter:`recipient_id=eq.${STATE.profile.id}` }, payload=>{
      flashPulse();
      loadNotificationBadge();
      toast(payload.new.title, 'info');
    })
    .subscribe();

  STATE.realtimeChannels.push(ch);
}
function flashPulse(){
  const dot = document.getElementById('realtime-dot');
  dot.classList.add('flash');
  setTimeout(()=> dot.classList.remove('flash'), 1200);
}
function teardownRealtimeSubscriptions(){
  STATE.realtimeChannels.forEach(ch => sb.removeChannel(ch));
  STATE.realtimeChannels = [];
}

// ---------- ROLE HELPERS ----------
function can(roles){
  if(roles==='*') return true;
  return roles.includes(STATE.profile.role);
}
function requireRole(roles, fn){
  return (...args) => { if(can(roles)) fn(...args); else toast('You do not have permission for this action.', 'error'); };
}

async function refreshInventoryTable(){
  const wrap = document.getElementById('inv-table-wrap');
  if(!wrap) return;

  let lowStockIds = null;
  if(INV_STATE.lowStockOnly){
    const { data } = await sb.rpc('get_low_stock_items', { p_branch_id: STATE.currentBranch });
    lowStockIds = (data||[]).map(d=>d.product_brand_id);
    if(lowStockIds.length===0){
      wrap.innerHTML = `<div class="empty-state">${ICONS.empty}<p>No items below reorder level. Nice work!</p></div>`;
      document.getElementById('inv-pagination').innerHTML='';
      return;
    }
  }

  let query = sb.from('product_brands')
    .select('*, products!inner(*, categories(name)), brands(name), stock_levels!inner(qty_on_hand, branch_id)', {count:'exact'})
    .eq('is_active', true)
    .eq('stock_levels.branch_id', STATE.currentBranch);

  if(INV_STATE.search){
    query = query.or(`name.ilike.%${INV_STATE.search}%,sku.ilike.%${INV_STATE.search}%`, { foreignTable:'products' });
  }
  if(INV_STATE.categoryFilter){
    query = query.eq('products.category_id', INV_STATE.categoryFilter);
  }
  if(lowStockIds){
    query = query.in('id', lowStockIds);
  }

  const from = (INV_STATE.page-1) * INV_STATE.pageSize;
  const to = from + INV_STATE.pageSize - 1;
  query = query.order('created_at', { foreignTable:'products', ascending:false }).range(from, to);

  const { data, count, error } = await query;
  if(error){ wrap.innerHTML = `<div class="empty-state"><p>Error loading inventory: ${escapeHtml(error.message)}</p></div>`; return; }

  INV_STATE.total = count || 0;

  if(!data || data.length===0){
    wrap.innerHTML = `<div class="empty-state">${ICONS.empty}<p>No products found.</p></div>`;
    document.getElementById('inv-pagination').innerHTML='';
    return;
  }

  wrap.innerHTML = `<table>
    <thead><tr><th>Product</th><th>Brand</th><th>SKU</th><th>Category</th><th>Stock</th><th>Reorder Lvl</th><th>Price</th><th>Status</th><th></th></tr></thead>
    <tbody>
      ${data.map(pb => {
        const qty = pb.stock_levels?.[0]?.qty_on_hand ?? 0;
        const reorder = pb.products?.reorder_level ?? 0;
        const isLow = qty <= reorder;
        return `<tr>
          <td style="font-weight:600;color:var(--navy-900);">${escapeHtml(pb.products?.name)}</td>
          <td>${pb.is_preferred ? `<span class="badge badge-orange">★ ${escapeHtml(pb.brands?.name)}</span>` : escapeHtml(pb.brands?.name)}</td>
          <td class="mono">${escapeHtml(pb.products?.sku)}</td>
          <td>${escapeHtml(pb.products?.categories?.name || '—')}</td>
          <td class="mono" style="font-weight:700;${isLow?'color:var(--red-600);':''}">${Number(qty).toLocaleString()}</td>
          <td class="mono" style="color:var(--slate-500);">${Number(reorder).toLocaleString()}</td>
          <td class="mono">${peso(pb.price)}</td>
          <td>${isLow ? `<span class="badge badge-red">Low Stock</span>` : `<span class="badge badge-green">In Stock</span>`}</td>
          <td><button class="btn btn-ghost btn-sm" onclick="viewProductDetail('${pb.id}')">View</button></td>
        </tr>`;
      }).join('')}
    </tbody>
  </table>`;

  renderPagination('inv-pagination', INV_STATE.page, INV_STATE.pageSize, INV_STATE.total, (p)=>{ INV_STATE.page=p; refreshInventoryTable(); });
}

function renderPagination(containerId, page, pageSize, total, onPage){
  const totalPages = Math.max(1, Math.ceil(total/pageSize));
  const container = document.getElementById(containerId);
  container.innerHTML = `
    <span>Showing ${total===0?0:((page-1)*pageSize+1)}–${Math.min(page*pageSize,total)} of ${total}</span>
    <div class="pagination-btns">
      <button class="page-btn" ${page<=1?'disabled':''} data-go="prev">← Prev</button>
      <span class="page-btn" style="cursor:default;">${page} / ${totalPages}</span>
      <button class="page-btn" ${page>=totalPages?'disabled':''} data-go="next">Next →</button>
    </div>
  `;
  container.querySelector('[data-go="prev"]')?.addEventListener('click', ()=> onPage(page-1));
  container.querySelector('[data-go="next"]')?.addEventListener('click', ()=> onPage(page+1));
}

async function openStockInModal(preselectProductBrandId){
  const { data: productBrands } = await sb.from('product_brands').select('id, price, products(name,sku), brands(name)').eq('is_active',true).order('id');

  openModal(`
    <div class="modal-header"><h3>${ICONS.plus} Stock In</h3><button class="icon-btn" onclick="closeModal()">${ICONS.x}</button></div>
    <div class="modal-body">
      <div class="form-group">
        <label>Product / Brand</label>
        <select id="si-product-brand">
          <option value="">Select product...</option>
          ${(productBrands||[]).map(pb=>`<option value="${pb.id}" ${pb.id===preselectProductBrandId?'selected':''}>${escapeHtml(pb.products.name)} (${escapeHtml(pb.products.sku)}) — ${escapeHtml(pb.brands.name)}</option>`).join('')}
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Quantity Received</label>
          <input type="number" id="si-qty" min="0.01" step="0.01" placeholder="0">
        </div>
        <div class="form-group">
          <label>Unit Cost (₱)</label>
          <input type="number" id="si-cost" min="0" step="0.01" placeholder="0.00">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Batch Code (optional)</label>
          <input type="text" id="si-batch-code" placeholder="Auto-generated if blank">
        </div>
        <div class="form-group">
          <label>Expiry Date (optional)</label>
          <input type="date" id="si-expiry">
        </div>
      </div>
      <div class="form-group">
        <label>Notes</label>
        <textarea id="si-notes" placeholder="e.g. Delivered via PO-202606-00012"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="si-submit">Confirm Stock In</button>
    </div>
  `);

  document.getElementById('si-submit').addEventListener('click', async ()=>{
    const productBrandId = document.getElementById('si-product-brand').value;
    const qty = parseFloat(document.getElementById('si-qty').value);
    const cost = parseFloat(document.getElementById('si-cost').value) || 0;
    const batchCode = document.getElementById('si-batch-code').value.trim() || null;
    const expiry = document.getElementById('si-expiry').value || null;
    const notes = document.getElementById('si-notes').value.trim() || null;

    if(!productBrandId || !qty || qty<=0){ toast('Select a product and enter a valid quantity.', 'error'); return; }

    const btn = document.getElementById('si-submit');
    btn.disabled = true; btn.textContent = 'Processing...';

    const { error } = await sb.rpc('stock_in', {
      p_product_brand_id: productBrandId, p_branch_id: STATE.currentBranch,
      p_qty: qty, p_unit_cost: cost, p_batch_code: batchCode, p_expiry_date: expiry, p_notes: notes
    });

    if(error){ toast('Stock-in failed: ' + error.message, 'error'); btn.disabled=false; btn.textContent='Confirm Stock In'; return; }

    toast('Stock-in recorded successfully.', 'success');
    closeModal();
    refreshInventoryTable();
  });
}

          <select id="np-supplier"><option value="">None</option>${(suppliers||[]).map(s=>`<option value="${s.id}">${escapeHtml(s.company_name)}</option>`).join('')}</select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Sell Price (₱)</label><input type="number" id="np-price" min="0" step="0.01"></div>
        <div class="form-group"><label>Cost Price (₱)</label><input type="number" id="np-cost-price" min="0" step="0.01"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="np-submit">Create Product</button>
    </div>
  `, {large:true});

  document.getElementById('np-submit').addEventListener('click', async ()=>{
    const sku = document.getElementById('np-sku').value.trim();
    const name = document.getElementById('np-name').value.trim();
    const unit = document.getElementById('np-unit').value.trim() || 'pc';
    const categoryId = document.getElementById('np-category').value;
    const reorderLevel = parseFloat(document.getElementById('np-reorder').value) || 0;
    const brandId = document.getElementById('np-brand').value;
    const supplierId = document.getElementById('np-supplier').value || null;
    const price = parseFloat(document.getElementById('np-price').value) || 0;
    const costPrice = parseFloat(document.getElementById('np-cost-price').value) || 0;

    if(!sku || !name || !brandId){ toast('SKU, name, and brand are required.', 'error'); return; }

    const btn = document.getElementById('np-submit');
    btn.disabled = true; btn.textContent = 'Creating...';

    const { data: product, error: prodErr } = await sb.from('products').insert({
      sku, name, unit, category_id: categoryId || null, reorder_level: reorderLevel, default_price: price, created_by: STATE.profile.id
    }).select().single();

    if(prodErr){ toast('Failed: ' + prodErr.message, 'error'); btn.disabled=false; btn.textContent='Create Product'; return; }

    const { error: pbErr } = await sb.from('product_brands').insert({
      product_id: product.id, brand_id: brandId, supplier_id: supplierId, price, cost_price: costPrice, is_preferred: true
    });

    if(pbErr){ toast('Product created but brand variant failed: ' + pbErr.message, 'error'); }
    else { toast('Product created successfully.', 'success'); }

    closeModal();
    refreshInventoryTable();
  });
}

async function loadCartProductGrid(){
  const grid = document.getElementById('cart-product-grid');
  if(!grid) return;
  const search = document.getElementById('cart-product-search')?.value || '';

  let query = sb.from('products').select('id, name, sku, default_price, product_brands(id, brand_id, price, is_preferred, brands(name), stock_levels(qty_on_hand, branch_id))').eq('is_active', true).limit(24);
  if(search) query = query.ilike('name', `%${search}%`);

  const { data, error } = await query;
  if(error){ grid.innerHTML = `<div class="empty-state"><p>Error: ${escapeHtml(error.message)}</p></div>`; return; }
  if(!data || data.length===0){ grid.innerHTML = `<div class="empty-state">${ICONS.empty}<p>No products found.</p></div>`; return; }

  grid.innerHTML = data.map(p => {
    const brands = (p.product_brands||[]).filter(pb=>pb.id);
    return `<div class="product-card" data-product-id="${p.id}">
      <div class="product-card-img">${ICONS.box}</div>
      <div class="product-card-name">${escapeHtml(p.name)}</div>
      <div class="product-card-sku">${escapeHtml(p.sku)}</div>
      <div class="brand-chips">
        ${brands.map(b => {
          const stock = (b.stock_levels||[]).find(sl=>sl.branch_id===STATE.currentBranch);
          const qty = stock?.qty_on_hand ?? 0;
          return `<span class="brand-chip ${b.is_preferred?'preferred':''}" data-pb-id="${b.id}" data-pname="${escapeHtml(p.name)}" data-sku="${escapeHtml(p.sku)}" data-bname="${escapeHtml(b.brands.name)}" data-price="${b.price}" data-stock="${qty}">${escapeHtml(b.brands.name)} · ${peso(b.price)}</span>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');

  grid.querySelectorAll('.brand-chip').forEach(chip=>{
    chip.addEventListener('click', (e)=>{
      e.stopPropagation();
      addToCart({
        product_brand_id: chip.dataset.pbId,
        product_name: chip.dataset.pname,
        sku: chip.dataset.sku,
        brand_name: chip.dataset.bname,
        unit_price: parseFloat(chip.dataset.price),
        available_stock: parseFloat(chip.dataset.stock),
        qty: 1
      });
    });
  });
}

function addToCart(item){
  const existing = STATE.cart.find(c=>c.product_brand_id === item.product_brand_id);
  if(existing){ existing.qty += 1; }
  else { STATE.cart.push(item); }
  toast(`Added ${item.product_name} (${item.brand_name}) to cart`, 'success');
  updateCartUI();
}
function removeFromCart(productBrandId){
  STATE.cart = STATE.cart.filter(c=>c.product_brand_id !== productBrandId);
  updateCartUI();
}
function updateCartQty(productBrandId, qty){
  const item = STATE.cart.find(c=>c.product_brand_id === productBrandId);
  if(item){ item.qty = Math.max(1, qty); }
  updateCartUI();
}
function cartTotal(){
  return STATE.cart.reduce((sum,c)=> sum + (c.qty * c.unit_price), 0);
}
function renderCartItemsHtml(){
  if(STATE.cart.length===0) return `<div class="empty-state" style="padding:30px 10px;">${ICONS.cart}<p>Cart is empty. Tap a brand chip to add.</p></div>`;
  return STATE.cart.map(c=>`
    <div class="cart-item">
      <div class="cart-item-info">
        <div class="cart-item-name">${escapeHtml(c.product_name)}</div>
        <div class="cart-item-brand">${escapeHtml(c.brand_name)} • ${peso(c.unit_price)} ${c.available_stock!==undefined ? `• stock: ${c.available_stock}` : ''}</div>
      </div>
      <div class="qty-stepper">
        <button onclick="updateCartQty('${c.product_brand_id}', ${c.qty-1})">−</button>
        <input type="number" value="${c.qty}" onchange="updateCartQty('${c.product_brand_id}', parseFloat(this.value)||1)">
        <button onclick="updateCartQty('${c.product_brand_id}', ${c.qty+1})">+</button>
      </div>
      <button class="icon-btn" style="width:26px;height:26px;" onclick="removeFromCart('${c.product_brand_id}')">${ICONS.x}</button>
    </div>
  `).join('');
}
function updateCartUI(){
  const list = document.getElementById('cart-items-list');
  if(list) list.innerHTML = renderCartItemsHtml();
  const total = document.getElementById('cart-total');
  if(total) total.textContent = peso(cartTotal());
  const countBadge = document.getElementById('cart-count-badge');
  if(countBadge) countBadge.textContent = `${STATE.cart.length} items`;
  const submitBtn = document.getElementById('cart-submit-btn');
  if(submitBtn) submitBtn.disabled = STATE.cart.length===0;
  const pdfBtn = document.getElementById('cart-pdf-btn');
  if(pdfBtn) pdfBtn.disabled = STATE.cart.length===0;

  const navBadge = document.getElementById('cart-badge');
  if(navBadge){
    navBadge.style.display = STATE.cart.length>0 ? 'inline-flex' : 'none';
    navBadge.textContent = STATE.cart.length;
  }
}

async function submitInquiry(){
  if(STATE.cart.length===0) return;
  const customerId = document.getElementById('cart-customer').value;
  const btn = document.getElementById('cart-submit-btn');
  btn.disabled = true; btn.textContent = 'Submitting...';

  const { data: inqNumber } = await sb.rpc('generate_inquiry_number');

  const { data: inquiry, error: inqErr } = await sb.from('inquiries').insert({
    inquiry_number: inqNumber, customer_id: customerId, branch_id: STATE.currentBranch,
    sales_agent_id: STATE.profile.id, status: 'submitted',
    valid_until: new Date(Date.now() + 7*86400000).toISOString().slice(0,10)
  }).select().single();

  if(inqErr){ toast('Failed to create inquiry: ' + inqErr.message, 'error'); btn.disabled=false; btn.textContent='Submit Inquiry'; return; }

  const items = STATE.cart.map(c => ({
    inquiry_id: inquiry.id, product_brand_id: c.product_brand_id, qty: c.qty, unit_price: c.unit_price
  }));
  const { error: itemsErr } = await sb.from('inquiry_items').insert(items);

  if(itemsErr){ toast('Inquiry created but items failed: ' + itemsErr.message, 'error'); }
  else { toast(`Inquiry ${inqNumber} submitted successfully.`, 'success'); }

  STATE.cart = [];
  updateCartUI();
  btn.disabled = false; btn.textContent = 'Submit Inquiry';
  INQ_STATE.tab = 'list';
  renderInquiry();
}

// ============ QUOTATION PDF ============
function generateQuotationPDF(){
  if(STATE.cart.length===0){ toast('Cart is empty.', 'error'); return; }
  const customerSelect = document.getElementById('cart-customer');
  const customerName = customerSelect ? customerSelect.options[customerSelect.selectedIndex].text : 'Walk-in Customer';

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const quoteNo = 'QT-' + Date.now().toString().slice(-8);

  doc.setFontSize(18); doc.setFont(undefined,'bold');
  doc.setTextColor(15,27,45);
  doc.text('HUNYO 24 TRADING', 14, 20);
  doc.setFontSize(9); doc.setFont(undefined,'normal'); doc.setTextColor(100,100,100);
  doc.text('Hardware & Construction Supplies — Taytay, Rizal, Philippines', 14, 26);

  doc.setDrawColor(232,89,12); doc.setLineWidth(0.8);
  doc.line(14, 30, 196, 30);

  doc.setFontSize(13); doc.setTextColor(15,27,45); doc.setFont(undefined,'bold');
  doc.text('QUOTATION', 14, 40);
  doc.setFontSize(9); doc.setFont(undefined,'normal');
  doc.text(`Quote No: ${quoteNo}`, 14, 47);
  doc.text(`Date: ${new Date().toLocaleDateString('en-PH')}`, 14, 52);
  doc.text(`Customer: ${customerName}`, 14, 57);
  doc.text(`Prepared by: ${STATE.profile.full_name}`, 14, 62);
  doc.text(`Valid until: ${new Date(Date.now()+7*86400000).toLocaleDateString('en-PH')}`, 120, 47);

  let y = 74;
  doc.setFillColor(15,27,45); doc.rect(14, y-6, 182, 8, 'F');
  doc.setTextColor(255,255,255); doc.setFontSize(9); doc.setFont(undefined,'bold');
  doc.text('PRODUCT', 16, y); doc.text('BRAND', 95, y); doc.text('QTY', 130, y); doc.text('UNIT PRICE', 148, y); doc.text('TOTAL', 178, y);
  y += 8;

  doc.setTextColor(40,40,40); doc.setFont(undefined,'normal'); doc.setFontSize(9);
  STATE.cart.forEach((item, idx) => {
    if(idx % 2 === 1){ doc.setFillColor(247,245,241); doc.rect(14, y-5, 182, 7, 'F'); }
    doc.text(String(item.product_name).slice(0,38), 16, y);
    doc.text(String(item.brand_name).slice(0,18), 95, y);
    doc.text(String(item.qty), 130, y);
    doc.text(peso(item.unit_price).replace('₱','P'), 148, y);
    doc.text(peso(item.qty*item.unit_price).replace('₱','P'), 178, y);
    y += 7;
  });

  y += 4;
  doc.setDrawColor(200,200,200); doc.line(14, y, 196, y);
  y += 8;
  doc.setFont(undefined,'bold'); doc.setFontSize(11); doc.setTextColor(232,89,12);
  doc.text(`TOTAL: ${peso(cartTotal()).replace('₱','P')}`, 148, y);

  y += 20;
  doc.setFontSize(8); doc.setTextColor(130,130,130); doc.setFont(undefined,'normal');
  doc.text('This quotation is valid for 7 days from the date of issue. Prices subject to change without prior notice.', 14, y);
  doc.text('Thank you for choosing HUnyo 24 Trading.', 14, y+5);

  doc.save(`Quotation-${quoteNo}.pdf`);
  toast('Quotation PDF generated.', 'success');
}

async function refreshInquiryList(){
  const wrap = document.getElementById('inq-table-wrap');
  if(!wrap) return;

  let query = sb.from('inquiries').select('*, customers(full_name), users!inquiries_sales_agent_id_fkey(full_name)', {count:'exact'}).eq('branch_id', STATE.currentBranch);
  if(INQ_STATE.search) query = query.ilike('inquiry_number', `%${INQ_STATE.search}%`);
  if(INQ_STATE.statusFilter) query = query.eq('status', INQ_STATE.statusFilter);

  const from = (INQ_STATE.listPage-1)*INQ_STATE.listPageSize;
  const to = from + INQ_STATE.listPageSize - 1;
  query = query.order('created_at',{ascending:false}).range(from,to);

  const { data, count, error } = await query;
  if(error){ wrap.innerHTML = `<div class="empty-state"><p>Error: ${escapeHtml(error.message)}</p></div>`; return; }
  if(!data || data.length===0){ wrap.innerHTML = `<div class="empty-state">${ICONS.empty}<p>No inquiries found.</p></div>`; document.getElementById('inq-pagination').innerHTML=''; return; }

  const statusColors = { draft:'slate', submitted:'blue', forwarded_to_prep:'amber', preparing:'amber', ready:'green', converted:'green', cancelled:'red' };

  wrap.innerHTML = `<table>
    <thead><tr><th>Inquiry #</th><th>Customer</th><th>Agent</th><th>Total</th><th>Status</th><th>Date</th><th></th></tr></thead>
    <tbody>
      ${data.map(i=>`<tr>
        <td class="mono" style="font-weight:600;">${escapeHtml(i.inquiry_number)}</td>
        <td>${escapeHtml(i.customers?.full_name || 'Walk-in')}</td>
        <td>${escapeHtml(i.users?.full_name || '—')}</td>
        <td class="mono">${peso(i.total_amount)}</td>
        <td><span class="badge badge-${statusColors[i.status]||'slate'}">${i.status.replace(/_/g,' ')}</span></td>
        <td style="color:var(--slate-500);font-size:12px;">${fmtDate(i.created_at)}</td>
        <td><button class="btn btn-ghost btn-sm" onclick="viewInquiryDetail('${i.id}')">View</button></td>
      </tr>`).join('')}
    </tbody>
  </table>`;

  renderPagination('inq-pagination', INQ_STATE.listPage, INQ_STATE.listPageSize, count||0, (p)=>{ INQ_STATE.listPage=p; refreshInquiryList(); });
}

async function viewInquiryDetail(inquiryId){
  const { data: inquiry } = await sb.from('inquiries').select('*, customers(*), users!inquiries_sales_agent_id_fkey(full_name)').eq('id', inquiryId).single();
  const { data: items } = await sb.from('inquiry_items').select('*, product_brands(*, products(name,sku), brands(name))').eq('inquiry_id', inquiryId);

  const canForward = can(['admin','sales_agent','inventory_manager']) && ['submitted'].includes(inquiry.status);
  const canConvert = can(['admin','inventory_manager','order_prep_staff']) && ['submitted','forwarded_to_prep','preparing','ready'].includes(inquiry.status);
  const canCancel = can(['admin','sales_agent','inventory_manager']) && !['converted','cancelled'].includes(inquiry.status);

  openModal(`
    <div class="modal-header"><h3>${escapeHtml(inquiry.inquiry_number)}</h3><button class="icon-btn" onclick="closeModal()">${ICONS.x}</button></div>
    <div class="modal-body">
      <div style="display:flex;justify-content:space-between;margin-bottom:16px;font-size:13px;">
        <div>
          <div style="color:var(--slate-500);">Customer</div>
          <div style="font-weight:600;color:var(--navy-900);">${escapeHtml(inquiry.customers?.full_name || 'Walk-in')}</div>
        </div>
        <div>
          <div style="color:var(--slate-500);">Sales Agent</div>
          <div style="font-weight:600;color:var(--navy-900);">${escapeHtml(inquiry.users?.full_name || '—')}</div>
        </div>
        <div>
          <div style="color:var(--slate-500);">Status</div>
          <div style="font-weight:600;color:var(--navy-900);text-transform:capitalize;">${inquiry.status.replace(/_/g,' ')}</div>
        </div>
      </div>
      <table>
        <thead><tr><th>Product</th><th>Brand</th><th>Qty</th><th>Unit Price</th><th>Line Total</th></tr></thead>
        <tbody>
          ${(items||[]).map(it=>`<tr>
            <td>${escapeHtml(it.product_brands?.products?.name||'—')}</td>
            <td>${escapeHtml(it.product_brands?.brands?.name||'—')}</td>
            <td class="mono">${Number(it.qty).toLocaleString()}</td>
            <td class="mono">${peso(it.unit_price)}</td>
            <td class="mono">${peso(it.line_total)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
      <div style="text-align:right;margin-top:14px;font-size:15px;font-weight:700;color:var(--navy-900);">Total: ${peso(inquiry.total_amount)}</div>
    </div>
    <div class="modal-footer">
      ${canForward ? `<button class="btn btn-secondary" onclick="forwardInquiry('${inquiry.id}')">Forward to Prep Staff</button>` : ''}
      ${canConvert ? `<button class="btn btn-primary" onclick="convertInquiryToPurchase('${inquiry.id}')">Convert to Purchase (Deduct Stock)</button>` : ''}
      ${canCancel ? `<button class="btn btn-danger" onclick="cancelInquiry('${inquiry.id}')">Cancel</button>` : ''}
    </div>
  `, {large:true});
}

async function forwardInquiry(inquiryId){
  const { error } = await sb.from('inquiries').update({ status:'forwarded_to_prep', forwarded_at: new Date().toISOString() }).eq('id', inquiryId);
  if(error){ toast('Failed: '+error.message,'error'); return; }
  toast('Inquiry forwarded to preparation staff.', 'success');
  closeModal();
  refreshInquiryList();
}

async function convertInquiryToPurchase(inquiryId){
  if(!confirm('Convert this inquiry to a purchase? This will deduct stock using FIFO and cannot be undone.')) return;
  const { error } = await sb.rpc('convert_inquiry_to_purchase', { p_inquiry_id: inquiryId });
  if(error){ toast('Conversion failed: ' + error.message, 'error'); return; }
  toast('Inquiry converted to purchase. Stock deducted via FIFO.', 'success');
  closeModal();
  refreshInquiryList();
}

async function cancelInquiry(inquiryId){
  if(!confirm('Cancel this inquiry?')) return;
  const { error } = await sb.from('inquiries').update({ status:'cancelled' }).eq('id', inquiryId);
  if(error){ toast('Failed: '+error.message,'error'); return; }
  toast('Inquiry cancelled.', 'info');
  closeModal();
  refreshInquiryList();
}

    </div>

async function refreshPOList(){
  const wrap = document.getElementById('po-table-wrap');
  if(!wrap) return;

  let query = sb.from('purchase_orders').select('*, suppliers(company_name)', {count:'exact'}).eq('branch_id', STATE.currentBranch);
  if(SUP_STATE.poStatusFilter) query = query.eq('status', SUP_STATE.poStatusFilter);

  const from = (SUP_STATE.poPage-1)*SUP_STATE.poPageSize;
  const to = from + SUP_STATE.poPageSize - 1;
  query = query.order('created_at',{ascending:false}).range(from,to);

  const { data, count, error } = await query;
  if(error){ wrap.innerHTML = `<div class="empty-state"><p>Error: ${escapeHtml(error.message)}</p></div>`; return; }
  if(!data || data.length===0){ wrap.innerHTML = `<div class="empty-state">${ICONS.empty}<p>No purchase orders yet.</p></div>`; document.getElementById('po-pagination').innerHTML=''; return; }

  const statusColors = { draft:'slate', submitted:'blue', approved:'amber', partially_received:'amber', received:'green', cancelled:'red' };

  wrap.innerHTML = `<table>
    <thead><tr><th>PO Number</th><th>Supplier</th><th>Order Date</th><th>Expected Delivery</th><th>Total</th><th>Status</th><th></th></tr></thead>
    <tbody>
      ${data.map(po=>`<tr>
        <td class="mono" style="font-weight:600;">${escapeHtml(po.po_number)}</td>
        <td>${escapeHtml(po.suppliers?.company_name||'—')}</td>
        <td>${fmtDate(po.order_date)}</td>
        <td>${fmtDate(po.expected_delivery_date)}</td>
        <td class="mono">${peso(po.total_amount)}</td>
        <td><span class="badge badge-${statusColors[po.status]||'slate'}">${po.status.replace(/_/g,' ')}</span></td>
        <td><button class="btn btn-ghost btn-sm" onclick="viewPODetail('${po.id}')">View</button></td>
      </tr>`).join('')}
    </tbody>
  </table>`;

  renderPagination('po-pagination', SUP_STATE.poPage, SUP_STATE.poPageSize, count||0, (p)=>{ SUP_STATE.poPage=p; refreshPOList(); });
}

const NEW_PO_ITEMS = [];

async function openNewPOModal(){

    <div class="modal-header"><h3>${ICONS.plus} New Purchase Order</h3><button class="icon-btn" onclick="closeModal()">${ICONS.x}</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label>Supplier</label>
          <select id="po-supplier">${(suppliers||[]).map(s=>`<option value="${s.id}">${escapeHtml(s.company_name)}</option>`).join('')}</select>
        </div>
        <div class="form-group">
          <label>Expected Delivery Date</label>
          <input type="date" id="po-expected-date">

      </div>
      <hr style="border:none;border-top:1px solid var(--slate-200);margin:14px 0;">
      <div style="display:flex;gap:8px;align-items:flex-end;margin-bottom:10px;">
        <div class="form-group" style="flex:2;margin-bottom:0;">
          <label>Add Product</label>
          <select id="po-add-product">${(productBrands||[]).map(pb=>`<option value="${pb.id}" data-cost="${pb.cost_price}">${escapeHtml(pb.products.name)} — ${escapeHtml(pb.brands.name)}</option>`).join('')}</select>
        </div>
        <div class="form-group" style="flex:1;margin-bottom:0;">
          <label>Qty</label>
          <input type="number" id="po-add-qty" min="1" value="1">
        </div>
        <div class="form-group" style="flex:1;margin-bottom:0;">
          <label>Unit Cost</label>
          <input type="number" id="po-add-cost" min="0" step="0.01">
        </div>
        <button class="btn btn-secondary btn-sm" id="po-add-item-btn" style="height:42px;">Add</button>
      </div>
      <div id="po-items-table"></div>
      <div style="text-align:right;margin-top:10px;font-weight:700;font-size:14px;" id="po-items-total">Total: ${peso(0)}</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="po-submit">Create Purchase Order</button>
    </div>
  `, {large:true});

  const productSelect = document.getElementById('po-add-product');
  productSelect.addEventListener('change', ()=>{
    document.getElementById('po-add-cost').value = productSelect.options[productSelect.selectedIndex].dataset.cost || '';
  });
  if(productSelect.options.length){
    document.getElementById('po-add-cost').value = productSelect.options[0].dataset.cost || '';
  }

  document.getElementById('po-add-item-btn').addEventListener('click', ()=>{
    const select = document.getElementById('po-add-product');
    const opt = select.options[select.selectedIndex];
    const qty = parseFloat(document.getElementById('po-add-qty').value) || 1;
    const cost = parseFloat(document.getElementById('po-add-cost').value) || 0;
    if(!opt) return;
    NEW_PO_ITEMS.push({ product_brand_id: select.value, label: opt.textContent, qty, unit_cost: cost });
    renderPOItemsTable();
  });

  renderPOItemsTable();

  document.getElementById('po-submit').addEventListener('click', submitNewPO);
}

function renderPOItemsTable(){
  const wrap = document.getElementById('po-items-table');
  if(NEW_PO_ITEMS.length===0){
    wrap.innerHTML = `<div class="empty-state" style="padding:24px;">${ICONS.empty}<p>No items added yet.</p></div>`;
  } else {
    wrap.innerHTML = `<table><thead><tr><th>Product</th><th>Qty</th><th>Unit Cost</th><th>Subtotal</th><th></th></tr></thead><tbody>
      ${NEW_PO_ITEMS.map((it,idx)=>`<tr>
        <td>${escapeHtml(it.label)}</td>
        <td class="mono">${it.qty}</td>
        <td class="mono">${peso(it.unit_cost)}</td>
        <td class="mono">${peso(it.qty*it.unit_cost)}</td>
        <td><button class="icon-btn" style="width:26px;height:26px;" onclick="removePOItem(${idx})">${ICONS.x}</button></td>
      </tr>`).join('')}
    </tbody></table>`;
  }
  const total = NEW_PO_ITEMS.reduce((s,i)=>s+i.qty*i.unit_cost,0);
  document.getElementById('po-items-total').textContent = 'Total: ' + peso(total);
}
function removePOItem(idx){ NEW_PO_ITEMS.splice(idx,1); renderPOItemsTable(); }

async function submitNewPO(){
  if(NEW_PO_ITEMS.length===0){ toast('Add at least one item.', 'error'); return; }
  const supplierId = document.getElementById('po-supplier').value;
  const expectedDate = document.getElementById('po-expected-date').value || null;
  const btn = document.getElementById('po-submit');
  btn.disabled = true; btn.textContent = 'Creating...';

  const { data: poNumber } = await sb.rpc('generate_po_number');

  const { data: po, error: poErr } = await sb.from('purchase_orders').insert({
    po_number: poNumber, supplier_id: supplierId, branch_id: STATE.currentBranch,
    status: 'submitted', expected_delivery_date: expectedDate, created_by: STATE.profile.id
  }).select().single();

  if(poErr){ toast('Failed: '+poErr.message,'error'); btn.disabled=false; btn.textContent='Create Purchase Order'; return; }

  const items = NEW_PO_ITEMS.map(it => ({ purchase_order_id: po.id, product_brand_id: it.product_brand_id, qty_ordered: it.qty, unit_cost: it.unit_cost }));
  const { error: itemsErr } = await sb.from('purchase_order_items').insert(items);

  if(itemsErr){ toast('PO created but items failed: '+itemsErr.message, 'error'); }
  else { toast(`Purchase order ${poNumber} created.`, 'success'); }

  closeModal();
  refreshPOList();
}

async function viewPODetail(poId){
  const { data: po } = await sb.from('purchase_orders').select('*, suppliers(*)').eq('id', poId).single();
  const { data: items } = await sb.from('purchase_order_items').select('*, product_brands(*, products(name,sku), brands(name))').eq('purchase_order_id', poId);

  const canApprove = can(['admin','inventory_manager','supplier_manager']) && po.status==='submitted';
  const canReceive = can(['admin','inventory_manager']) && ['approved','partially_received'].includes(po.status);

  openModal(`
    <div class="modal-header"><h3>${escapeHtml(po.po_number)}</h3><button class="icon-btn" onclick="closeModal()">${ICONS.x}</button></div>
    <div class="modal-body">
      <div style="font-size:13px;margin-bottom:14px;color:var(--slate-500);">Supplier: <strong style="color:var(--navy-900);">${escapeHtml(po.suppliers?.company_name)}</strong> • Status: <strong style="text-transform:capitalize;color:var(--navy-900);">${po.status.replace(/_/g,' ')}</strong></div>
      <table>
        <thead><tr><th>Product</th><th>Brand</th><th>Ordered</th><th>Received</th><th>Unit Cost</th><th>Subtotal</th>${canReceive?'<th></th>':''}</tr></thead>
        <tbody>
          ${(items||[]).map(it=>{
            const pending = it.qty_ordered - it.qty_received;
            return `<tr>
              <td>${escapeHtml(it.product_brands?.products?.name||'—')}</td>
              <td>${escapeHtml(it.product_brands?.brands?.name||'—')}</td>
              <td class="mono">${Number(it.qty_ordered).toLocaleString()}</td>
              <td class="mono">${Number(it.qty_received).toLocaleString()}</td>
              <td class="mono">${peso(it.unit_cost)}</td>
              <td class="mono">${peso(it.line_total)}</td>
              ${canReceive ? `<td>${pending>0 ? `<button class="btn btn-secondary btn-sm" onclick="receivePOItemPrompt('${it.id}', ${pending})">Receive</button>` : `<span class="badge badge-green">Done</span>`}</td>` : ''}
            </tr>`;
          }).join('')}
        </tbody>
      </table>
      <div style="text-align:right;margin-top:14px;font-size:15px;font-weight:700;color:var(--navy-900);">Total: ${peso(po.total_amount)}</div>
    </div>
    <div class="modal-footer">
      ${canApprove ? `<button class="btn btn-primary" onclick="approvePO('${po.id}')">Approve PO</button>` : ''}
      ${can(['admin']) && po.status!=='received' && po.status!=='cancelled' ? `<button class="btn btn-danger" onclick="cancelPO('${po.id}')">Cancel PO</button>` : ''}
    </div>
  `, {large:true});
}

async function approvePO(poId){
  const { error } = await sb.from('purchase_orders').update({ status:'approved', approved_by: STATE.profile.id, approved_at: new Date().toISOString() }).eq('id', poId);
  if(error){ toast('Failed: '+error.message,'error'); return; }
  toast('Purchase order approved.', 'success');
  closeModal(); refreshPOList();
}
async function cancelPO(poId){
  if(!confirm('Cancel this purchase order?')) return;
  const { error } = await sb.from('purchase_orders').update({ status:'cancelled' }).eq('id', poId);
  if(error){ toast('Failed: '+error.message,'error'); return; }
  toast('Purchase order cancelled.', 'info');
  closeModal(); refreshPOList();
}
function receivePOItemPrompt(poItemId, maxQty){
  const qty = prompt(`Quantity received (max ${maxQty}):`, maxQty);
  if(qty===null) return;
  const q = parseFloat(qty);
  if(!q || q<=0 || q>maxQty){ toast('Invalid quantity.', 'error'); return; }
  receivePOItem(poItemId, q);
}
async function receivePOItem(poItemId, qty){
  const { error } = await sb.rpc('receive_po_item', { p_po_item_id: poItemId, p_qty_received: qty });
  if(error){ toast('Failed: '+error.message,'error'); return; }
  toast('Stock received and FIFO batch created.', 'success');
  closeModal();
  refreshPOList();
}

async function startNewAudit(){
  const year = new Date().getFullYear();
  if(!confirm(`Start a new inventory audit for ${year}? This will generate a system stock snapshot for this branch.`)) return;

  const { data, error } = await sb.rpc('generate_audit_snapshot', { p_branch_id: STATE.currentBranch, p_audit_year: year });
  if(error){ toast('Failed: ' + error.message, 'error'); return; }
  toast('Audit snapshot generated. Begin physical counting.', 'success');
  openAuditWorkspace(data);
}

async function openAuditWorkspace(auditId){
  AUDIT_STATE.activeAuditId = auditId;
  const { data: audit } = await sb.from('inventory_audits').select('*').eq('id', auditId).single();
  const { data: lines } = await sb.from('audit_count_lines').select('*, product_brands(*, products(name,sku), brands(name))').eq('audit_id', auditId).order('id');

  const countedCount = (lines||[]).filter(l=>l.physical_qty!==null).length;
  const totalCount = (lines||[]).length;
  const varianceCount = (lines||[]).filter(l=>l.physical_qty!==null && l.variance_qty!==0).length;

  const canCount = can(['admin','auditor','inventory_manager']) && ['open','counting'].includes(audit.status);
  const canSubmit = can(['admin','auditor']) && audit.status==='counting' && countedCount===totalCount && totalCount>0;
  const canApprove = can(['admin']) && audit.status==='pending_approval';
  const canClose = can(['admin']) && audit.status==='approved';

  openModal(`
    <div class="modal-header">
      <h3>${escapeHtml(audit.audit_code)}</h3>
      <span class="badge badge-blue" style="margin-right:8px;">${audit.status.replace(/_/g,' ')}</span>
      <button class="icon-btn" onclick="closeModal()">${ICONS.x}</button>
    </div>
    <div class="modal-body">
      <div class="kpi-row" style="margin-bottom:16px;">
        <div class="stat-card" style="padding:12px;"><div class="stat-value" style="font-size:18px;">${countedCount}/${totalCount}</div><div class="stat-label">Items Counted</div></div>
        <div class="stat-card" style="padding:12px;"><div class="stat-value" style="font-size:18px;${varianceCount>0?'color:var(--red-600);':''}">${varianceCount}</div><div class="stat-label">Variances Found</div></div>
      </div>
      <div class="table-wrap" style="max-height:360px;border:1px solid var(--slate-200);border-radius:8px;">
        <table>
          <thead><tr><th>Product</th><th>Brand</th><th>System Qty</th><th>Physical Count</th><th>Variance</th>${canCount?'<th></th>':''}</tr></thead>
          <tbody>
            ${(lines||[]).map(l=>{
              const variance = l.variance_qty;
              const hasCount = l.physical_qty!==null;
              return `<tr>
                <td>${escapeHtml(l.product_brands?.products?.name||'—')}</td>
                <td>${escapeHtml(l.product_brands?.brands?.name||'—')}</td>
                <td class="mono">${Number(l.system_qty).toLocaleString()}</td>
                <td class="mono">${hasCount ? Number(l.physical_qty).toLocaleString() : '<span style="color:var(--slate-300);">pending</span>'}</td>
                <td class="mono" style="${hasCount && variance!==0 ? (variance>0?'color:var(--green-600);':'color:var(--red-600);') : ''}font-weight:700;">${hasCount ? (variance>0?'+':'')+Number(variance).toLocaleString() : '—'}</td>
                ${canCount ? `<td><button class="btn btn-ghost btn-sm" onclick="promptPhysicalCount('${l.id}', ${l.system_qty})">${hasCount?'Edit':'Count'}</button></td>` : ''}
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
    <div class="modal-footer">
      ${canSubmit ? `<button class="btn btn-primary" onclick="submitAuditForApproval('${audit.id}')">Submit for Approval</button>` : ''}
      ${canApprove ? `<button class="btn btn-primary" onclick="approveAuditAction('${audit.id}')">Approve & Apply Adjustments</button>` : ''}
      ${canClose ? `<button class="btn btn-secondary" onclick="closeAuditAction('${audit.id}')">Close Audit</button>` : ''}
    </div>
  `, {large:true});
}

function promptPhysicalCount(lineId, systemQty){
  const qty = prompt(`Enter physical count (system shows ${systemQty}):`, systemQty);
  if(qty===null) return;
  const q = parseFloat(qty);
  if(isNaN(q) || q<0){ toast('Invalid quantity.', 'error'); return; }
  recordCount(lineId, q);
}
async function recordCount(lineId, qty){
  const { error } = await sb.rpc('record_physical_count', { p_line_id: lineId, p_physical_qty: qty });
  if(error){ toast('Failed: '+error.message,'error'); return; }
  toast('Count recorded.', 'success');
  openAuditWorkspace(AUDIT_STATE.activeAuditId);
}
async function submitAuditForApproval(auditId){
  if(!confirm('Submit this audit for admin approval? You will not be able to edit counts after this.')) return;
  const { error } = await sb.rpc('submit_audit_for_approval', { p_audit_id: auditId });
  if(error){ toast('Failed: '+error.message,'error'); return; }
  toast('Audit submitted for approval.', 'success');
  closeModal(); renderAudit();
}
async function approveAuditAction(auditId){
  if(!confirm('Approve this audit? This will apply stock adjustments for all variances (creates audit-correction batches/stock-outs).')) return;
  const { error } = await sb.rpc('approve_audit', { p_audit_id: auditId });
  if(error){ toast('Failed: '+error.message,'error'); return; }
  toast('Audit approved. Stock adjustments applied.', 'success');
  closeModal(); renderAudit();
}
async function closeAuditAction(auditId){
  if(!confirm('Close this audit? This finalizes the record for compliance.')) return;
  const { error } = await sb.rpc('close_audit', { p_audit_id: auditId });
  if(error){ toast('Failed: '+error.message,'error'); return; }
  toast('Audit closed.', 'success');
  closeModal(); renderAudit();
}

async function openInviteUserModal(){
  openModal(`
    <div class="modal-header"><h3>${ICONS.plus} Invite User</h3><button class="icon-btn" onclick="closeModal()">${ICONS.x}</button></div>
    <div class="modal-body">
      <div style="background:var(--blue-100);color:var(--blue-600);padding:12px 14px;border-radius:8px;font-size:12.5px;margin-bottom:16px;font-weight:500;">
        This sends a Supabase invite email right away. The new staff member clicks the link, sets their password, and can log in immediately — no Dashboard trip needed.
      </div>
      <div class="form-row">
        <div class="form-group"><label>Full Name</label><input type="text" id="iu-name" placeholder="e.g. Juan Dela Cruz"></div>
        <div class="form-group"><label>Username (optional)</label><input type="text" id="iu-username" placeholder="e.g. juan.dc"></div>
      </div>
      <div class="form-group"><label>Email (Gmail is fine)</label><input type="email" id="iu-email" placeholder="employee@gmail.com"></div>
      <div class="form-row">
        <div class="form-group">
          <label>Role</label>
          <select id="iu-role">
            <option value="sales_agent">Sales Agent</option>
            <option value="inventory_manager">Inventory Manager</option>
            <option value="order_prep_staff">Order Prep Staff</option>
            <option value="supplier_manager">Supplier Manager</option>
            <option value="auditor">Auditor</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="form-group">
          <label>Branch</label>
          <select id="iu-branch">${STATE.branches.map(b=>`<option value="${b.id}">${escapeHtml(b.name)}</option>`).join('')}</select>
        </div>
      </div>
      <div class="login-error" id="iu-error" style="display:none;"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="iu-submit">Send Invite</button>
    </div>
  `);

  document.getElementById('iu-submit').addEventListener('click', async ()=>{
    const errEl = document.getElementById('iu-error');
    errEl.style.display = 'none';

    const email = document.getElementById('iu-email').value.trim();
    const fullName = document.getElementById('iu-name').value.trim();
    const username = document.getElementById('iu-username').value.trim();
    const role = document.getElementById('iu-role').value;
    const branchId = document.getElementById('iu-branch').value;

    if(!email || !email.includes('@')){ errEl.textContent = 'Enter a valid email address.'; errEl.style.display='block'; return; }

    const btn = document.getElementById('iu-submit');
    btn.disabled = true; btn.textContent = 'Sending invite...';

    try{
      const { data: { session } } = await sb.auth.getSession();
      const res = await fetch(`${window.SUPABASE_URL}/functions/v1/invite-user`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${session.access_token}`,
        },
        body: JSON.stringify({ email, full_name: fullName, username, role, branch_id: branchId }),
      });
      const result = await res.json();

      if(!res.ok || result.error){
        errEl.textContent = result.error || 'Failed to send invite.';
        errEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Send Invite';
        return;
      }

      toast(`Invite sent to ${email}.`, 'success');
      closeModal();
      renderUsers();
    } catch(e){
      errEl.textContent = 'Network error: ' + e.message;
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Send Invite';
    }
  });
}

async function refreshLogsTable(){
  const wrap = document.getElementById('logs-table-wrap');
  if(!wrap) return;

  let query = sb.from('audit_logs').select('*, users(full_name, email)', {count:'exact'});
  if(LOG_STATE.actionFilter) query = query.eq('action', LOG_STATE.actionFilter);
  if(LOG_STATE.entityFilter) query = query.eq('entity_type', LOG_STATE.entityFilter);

  const from = (LOG_STATE.page-1)*LOG_STATE.pageSize;
  const to = from + LOG_STATE.pageSize - 1;
  query = query.order('created_at',{ascending:false}).range(from,to);

  const { data, count, error } = await query;
  if(error){ wrap.innerHTML = `<div class="empty-state"><p>Error: ${escapeHtml(error.message)}</p></div>`; return; }
  if(!data || data.length===0){ wrap.innerHTML = `<div class="empty-state">${ICONS.empty}<p>No audit log entries found.</p></div>`; document.getElementById('logs-pagination').innerHTML=''; return; }

  const actionColors = { login:'green', logout:'slate', create:'blue', update:'amber', delete:'red', approve:'green', convert:'orange' };

  wrap.innerHTML = `<table>
    <thead><tr><th>When</th><th>User</th><th>Action</th><th>Entity</th><th>Details</th></tr></thead>
    <tbody>
      ${data.map(l=>`<tr>
        <td style="color:var(--slate-500);font-size:12px;">${fmtDateTime(l.created_at)}</td>
        <td>${escapeHtml(l.users?.full_name || 'System')}</td>
        <td><span class="badge badge-${actionColors[l.action]||'slate'}">${l.action}</span></td>
        <td>${escapeHtml(l.entity_type)}</td>
        <td><button class="btn btn-ghost btn-sm" onclick='viewLogDetail(${JSON.stringify(JSON.stringify(l)).replace(/'/g,"&#39;")})'>View</button></td>
      </tr>`).join('')}
    </tbody>
  </table>`;

  renderPagination('logs-pagination', LOG_STATE.page, LOG_STATE.pageSize, count||0, (p)=>{ LOG_STATE.page=p; refreshLogsTable(); });
}

function viewLogDetail(logJson){
  const l = JSON.parse(logJson);
  openModal(`
    <div class="modal-header"><h3>Audit Log Detail</h3><button class="icon-btn" onclick="closeModal()">${ICONS.x}</button></div>
    <div class="modal-body">
      <div style="font-size:13px;line-height:1.8;">
        <div><strong>When:</strong> ${fmtDateTime(l.created_at)}</div>
        <div><strong>User:</strong> ${escapeHtml(l.users?.full_name || 'System')} (${escapeHtml(l.users?.email||'—')})</div>
        <div><strong>Action:</strong> ${escapeHtml(l.action)}</div>
        <div><strong>Entity:</strong> ${escapeHtml(l.entity_type)} ${l.entity_id ? `(${escapeHtml(l.entity_id)})` : ''}</div>
      </div>
      ${l.old_values ? `<div style="margin-top:14px;"><div style="font-size:12px;font-weight:700;color:var(--slate-500);margin-bottom:4px;">OLD VALUES</div><pre class="mono" style="background:var(--slate-100);padding:10px;border-radius:6px;font-size:11.5px;overflow-x:auto;">${escapeHtml(JSON.stringify(l.old_values,null,2))}</pre></div>` : ''}
      ${l.new_values ? `<div style="margin-top:10px;"><div style="font-size:12px;font-weight:700;color:var(--slate-500);margin-bottom:4px;">NEW VALUES</div><pre class="mono" style="background:var(--slate-100);padding:10px;border-radius:6px;font-size:11.5px;overflow-x:auto;">${escapeHtml(JSON.stringify(l.new_values,null,2))}</pre></div>` : ''}
    </div>
    <div class="modal-footer"><button class="btn btn-primary" onclick="closeModal()">Close</button></div>
  `);
}


</script>
</body>
</html>
