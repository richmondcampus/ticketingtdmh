<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Hunyo 24 Trading — Inventory System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --navy-950:#0A1320;
  --navy-900:#0F1B2D;
  --navy-800:#16263D;
  --navy-700:#1E3350;
  --navy-600:#2A4768;
  --orange-600:#C81E2C;
  --orange-500:#D93A47;
  --orange-100:#FBE2E4;
  --canvas:#F7F5F1;
  --surface:#FFFFFF;
  --slate-900:#1A202C;
  --slate-700:#2B3445;
  --slate-500:#64748B;
  --slate-300:#CBD5E1;
  --slate-200:#E2E8F0;
  --slate-100:#F1F5F9;
  --green-600:#1E8E5A;
  --green-100:#DCFCE7;
  --amber-600:#D97706;
  --amber-100:#FEF3C7;
  --red-600:#DC2626;
  --red-100:#FEE2E2;
  --blue-600:#2563EB;
  --blue-100:#DBEAFE;
  --radius-sm:6px;
  --radius-md:10px;
  --radius-lg:16px;
  --shadow-sm:0 1px 2px rgba(15,27,45,0.06);
  --shadow-md:0 4px 12px rgba(15,27,45,0.08);
  --shadow-lg:0 12px 32px rgba(15,27,45,0.16);
  --font-ui:'Inter',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--font-ui);
  background:var(--canvas);
  color:var(--slate-700);
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
  height:100vh;
}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--slate-300);border-radius:8px;}
::-webkit-scrollbar-thumb:hover{background:var(--slate-500);}

a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;}
/* Safety net: any icon SVG without an explicit size (inline style/width attr)
   defaults to a sane 18px instead of stretching to fill its container. Specific
   contexts (.empty-state svg, .stat-icon svg, etc.) override this as needed. */
svg{width:18px;height:18px;flex-shrink:0;}
input,select,textarea{font-family:inherit;}
:focus-visible{outline:2px solid var(--orange-600);outline-offset:2px;}

/* ===== STOCK PULSE — signature element ===== */
.pulse-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--green-600);
  display:inline-block;
  position:relative;
  flex-shrink:0;
}
.pulse-dot::after{
  content:'';
  position:absolute;inset:0;
  border-radius:50%;
  background:var(--green-600);
  animation:pulse-ring 1.8s cubic-bezier(0.4,0,0.6,1) infinite;
}
.pulse-dot.flash::after{ animation-duration:0.6s; animation-iteration-count:2; }
@keyframes pulse-ring{
  0%{ transform:scale(1); opacity:0.7; }
  100%{ transform:scale(2.8); opacity:0; }
}
@media (prefers-reduced-motion:reduce){
  .pulse-dot::after{ animation:none; }
}

/* ===== LOGIN SCREEN ===== */
#login-screen{
  position:fixed;inset:0;
  background:linear-gradient(135deg,var(--navy-950) 0%,var(--navy-800) 100%);
  display:flex;align-items:center;justify-content:center;
  z-index:1000;
  padding:24px;
}
#login-screen::before{
  content:'';
  position:absolute;inset:0;
  background-image:
    repeating-linear-gradient(90deg, rgba(232,89,12,0.04) 0px, rgba(232,89,12,0.04) 1px, transparent 1px, transparent 64px),
    repeating-linear-gradient(0deg, rgba(232,89,12,0.04) 0px, rgba(232,89,12,0.04) 1px, transparent 1px, transparent 64px);
  pointer-events:none;
}
.login-card{
  position:relative;
  background:var(--surface);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);
  width:100%;max-width:420px;
  padding:40px 36px;
}
.login-brand{
  display:flex;align-items:center;gap:12px;margin-bottom:8px;
}
.login-brand .mark{
  width:44px;height:44px;border-radius:10px;
  background:linear-gradient(135deg,var(--orange-600),var(--orange-500));
  display:flex;align-items:center;justify-content:center;
  font-weight:800;color:white;font-size:18px;
  flex-shrink:0;
}
.login-brand h1{font-size:19px;font-weight:800;color:var(--navy-900);letter-spacing:-0.02em;}
.login-brand p{font-size:12px;color:var(--slate-500);font-weight:600;letter-spacing:0.04em;text-transform:uppercase;}
.login-sub{font-size:14px;color:var(--slate-500);margin:20px 0 24px;line-height:1.5;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--slate-700);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.03em;}
.form-group input{
  width:100%;padding:11px 14px;
  border:1.5px solid var(--slate-200);
  border-radius:var(--radius-sm);
  font-size:14px;
  transition:border-color .15s;
  background:var(--slate-100);
}
.form-group input:focus{border-color:var(--orange-600);background:white;}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:11px 20px;border-radius:var(--radius-sm);
  font-size:14px;font-weight:600;border:none;
  transition:all .15s;
}
.btn-primary{background:var(--orange-600);color:white;width:100%;}
.btn-primary:hover{background:#D14E0A;}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed;}
.btn-secondary{background:var(--slate-100);color:var(--slate-700);border:1.5px solid var(--slate-200);}
.btn-secondary:hover{background:var(--slate-200);}
.btn-ghost{background:transparent;color:var(--slate-500);}
.btn-ghost:hover{background:var(--slate-100);}
.btn-danger{background:var(--red-600);color:white;}
.btn-danger:hover{background:#C01E1E;}
.btn-sm{padding:7px 12px;font-size:12.5px;}
.login-footer{margin-top:20px;text-align:center;font-size:13px;color:var(--slate-500);}
.login-footer a{color:var(--orange-600);font-weight:600;}
.login-error{
  background:var(--red-100);color:var(--red-600);
  padding:10px 14px;border-radius:var(--radius-sm);
  font-size:13px;margin-bottom:16px;display:none;
  font-weight:500;
}
.login-toggle{display:flex;gap:4px;background:var(--slate-100);padding:4px;border-radius:var(--radius-sm);margin-bottom:24px;}
.login-toggle button{flex:1;padding:9px;border:none;background:transparent;border-radius:6px;font-size:13px;font-weight:600;color:var(--slate-500);}
.login-toggle button.active{background:white;color:var(--navy-900);box-shadow:var(--shadow-sm);}

/* ===== APP SHELL ===== */
#app-shell{display:none;height:100vh;overflow:hidden;}
#app-shell.active{display:flex;}

/* SIDEBAR */
#sidebar{
  width:248px;flex-shrink:0;
  background:var(--navy-900);
  display:flex;flex-direction:column;
  height:100vh;
  transition:width .2s;
}
#sidebar.collapsed{width:72px;}
.sidebar-header{
  padding:20px 16px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}
.sidebar-header .mark{
  width:36px;height:36px;border-radius:8px;flex-shrink:0;
  background:linear-gradient(135deg,var(--orange-600),var(--orange-500));
  display:flex;align-items:center;justify-content:center;
  font-weight:800;color:white;font-size:15px;
}
.sidebar-header .brand-text{overflow:hidden;white-space:nowrap;}
.sidebar-header .brand-text h1{font-size:14px;font-weight:800;color:white;letter-spacing:-0.01em;}
.sidebar-header .brand-text p{font-size:10px;color:rgba(255,255,255,0.5);font-weight:600;letter-spacing:0.05em;text-transform:uppercase;}
#sidebar.collapsed .brand-text{display:none;}

.sidebar-nav{flex:1;overflow-y:auto;padding:12px 10px;}
.nav-section{margin-bottom:18px;}
.nav-section-label{
  font-size:10px;font-weight:700;color:rgba(255,255,255,0.35);
  text-transform:uppercase;letter-spacing:0.08em;
  padding:8px 12px 6px;
}
#sidebar.collapsed .nav-section-label{display:none;}
.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;border-radius:8px;
  color:rgba(255,255,255,0.65);
  font-size:13.5px;font-weight:500;
  cursor:pointer;margin-bottom:2px;
  white-space:nowrap;overflow:hidden;
  position:relative;
  transition:background .12s,color .12s;
}
.nav-item svg{width:18px;height:18px;flex-shrink:0;}
.nav-item:hover{background:rgba(255,255,255,0.06);color:white;}
.nav-item.active{background:var(--orange-600);color:white;}
.nav-item .nav-badge{
  margin-left:auto;background:var(--red-600);color:white;
  font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;
  min-width:18px;text-align:center;
}
#sidebar.collapsed .nav-item span:not(.nav-badge){display:none;}
#sidebar.collapsed .nav-item .nav-badge{position:absolute;top:4px;right:4px;margin-left:0;}

.sidebar-footer{
  padding:14px;border-top:1px solid rgba(255,255,255,0.08);
}
.user-chip{
  display:flex;align-items:center;gap:10px;
  padding:8px;border-radius:8px;cursor:pointer;
}
.user-chip:hover{background:rgba(255,255,255,0.06);}
.user-avatar{
  width:32px;height:32px;border-radius:50%;
  background:var(--orange-600);color:white;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:12px;flex-shrink:0;
}
.user-info{overflow:hidden;flex:1;}
#sidebar.collapsed .user-info{display:none;}
.user-info .name{font-size:12.5px;font-weight:600;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-info .role{font-size:10.5px;color:rgba(255,255,255,0.5);text-transform:capitalize;}
.collapse-btn{
  width:100%;padding:8px;margin-top:8px;
  background:rgba(255,255,255,0.04);border:none;border-radius:6px;
  color:rgba(255,255,255,0.5);display:flex;align-items:center;justify-content:center;
}
.collapse-btn:hover{background:rgba(255,255,255,0.08);color:white;}

/* MAIN AREA */
#main-area{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0;}
#topbar{
  height:64px;flex-shrink:0;background:var(--surface);
  border-bottom:1px solid var(--slate-200);
  display:flex;align-items:center;gap:16px;padding:0 24px;
}
.topbar-title{font-size:17px;font-weight:700;color:var(--navy-900);}
.topbar-spacer{flex:1;}
.branch-pill{
  display:flex;align-items:center;gap:8px;
  padding:7px 14px;background:var(--slate-100);border-radius:20px;
  font-size:12.5px;font-weight:600;color:var(--slate-700);
}
.icon-btn{
  width:38px;height:38px;border-radius:8px;border:none;background:transparent;
  display:flex;align-items:center;justify-content:center;color:var(--slate-500);
  position:relative;
}
.icon-btn:hover{background:var(--slate-100);color:var(--navy-900);}
.icon-btn svg{width:19px;height:19px;}
.notif-dot{
  position:absolute;top:7px;right:7px;width:8px;height:8px;border-radius:50%;
  background:var(--red-600);border:2px solid white;
}
#realtime-indicator{
  display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--slate-500);font-weight:600;
}

#content-area{flex:1;overflow-y:auto;padding:24px;}
.page{display:none;}
.page.active{display:block;animation:fadein .2s;}
@keyframes fadein{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

/* ===== SHARED COMPONENTS ===== */
.card{background:var(--surface);border-radius:var(--radius-md);border:1px solid var(--slate-200);box-shadow:var(--shadow-sm);}
.card-header{padding:18px 20px;border-bottom:1px solid var(--slate-200);display:flex;align-items:center;gap:12px;}
.card-header h3{font-size:15px;font-weight:700;color:var(--navy-900);}
.card-body{padding:20px;}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:20px;}
.stat-card{
  background:var(--surface);border-radius:var(--radius-md);border:1px solid var(--slate-200);
  padding:18px 20px;position:relative;overflow:hidden;
}
.stat-card .stat-icon{
  width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;
}
.stat-card .stat-icon svg{width:18px;height:18px;}
.stat-card .stat-value{font-size:26px;font-weight:800;color:var(--navy-900);font-family:var(--font-mono);letter-spacing:-0.02em;}
.stat-card .stat-label{font-size:12px;color:var(--slate-500);font-weight:600;margin-top:4px;}
.stat-card .stat-delta{font-size:11.5px;font-weight:700;margin-top:8px;display:flex;align-items:center;gap:4px;}
.stat-delta.up{color:var(--green-600);}
.stat-delta.down{color:var(--red-600);}

.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13.5px;}
thead th{
  text-align:left;padding:10px 14px;font-size:11px;font-weight:700;
  color:var(--slate-500);text-transform:uppercase;letter-spacing:0.04em;
  background:var(--slate-100);border-bottom:1px solid var(--slate-200);
  white-space:nowrap;position:sticky;top:0;z-index:1;
}
tbody td{padding:12px 14px;border-bottom:1px solid var(--slate-100);color:var(--slate-700);}
tbody tr:hover{background:var(--slate-100);}
tbody tr:last-child td{border-bottom:none;}
.mono{font-family:var(--font-mono);font-size:12.5px;}

.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;
  text-transform:capitalize;
}
.badge-green{background:var(--green-100);color:var(--green-600);}
.badge-amber{background:var(--amber-100);color:var(--amber-600);}
.badge-red{background:var(--red-100);color:var(--red-600);}
.badge-blue{background:var(--blue-100);color:var(--blue-600);}
.badge-slate{background:var(--slate-200);color:var(--slate-700);}
.badge-orange{background:var(--orange-100);color:var(--orange-600);}

.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.search-input-wrap{position:relative;flex:1;min-width:220px;max-width:380px;}
.search-input-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--slate-500);}
.search-input{width:100%;padding:9px 12px 9px 36px;border:1.5px solid var(--slate-200);border-radius:var(--radius-sm);font-size:13.5px;background:var(--surface);}
.search-input:focus{border-color:var(--orange-600);}
select.filter-select{padding:9px 12px;border:1.5px solid var(--slate-200);border-radius:var(--radius-sm);font-size:13px;background:var(--surface);color:var(--slate-700);}

.pagination{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-top:1px solid var(--slate-200);font-size:12.5px;color:var(--slate-500);}
.pagination-btns{display:flex;gap:6px;}
.page-btn{padding:6px 11px;border:1.5px solid var(--slate-200);background:white;border-radius:6px;font-size:12.5px;font-weight:600;color:var(--slate-700);}
.page-btn:hover:not(:disabled){border-color:var(--orange-600);color:var(--orange-600);}
.page-btn:disabled{opacity:0.4;cursor:not-allowed;}

.empty-state{padding:60px 20px;text-align:center;color:var(--slate-500);}
.empty-state svg{width:48px;height:48px;margin:0 auto 14px;opacity:0.3;}
.empty-state p{font-size:13.5px;font-weight:500;}

.skeleton{background:linear-gradient(90deg,var(--slate-100) 25%,var(--slate-200) 50%,var(--slate-100) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:4px;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

/* MODAL */
.modal-overlay{
  position:fixed;inset:0;background:rgba(10,19,32,0.55);
  display:none;align-items:center;justify-content:center;z-index:500;padding:20px;
  backdrop-filter:blur(2px);
}
.modal-overlay.active{display:flex;}
.modal{
  background:white;border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);
  width:100%;max-width:560px;max-height:90vh;display:flex;flex-direction:column;
}
.modal.modal-lg{max-width:840px;}
.modal-header{padding:18px 22px;border-bottom:1px solid var(--slate-200);display:flex;align-items:center;gap:12px;}
.modal-header h3{font-size:16px;font-weight:700;color:var(--navy-900);flex:1;}
.modal-body{padding:22px;overflow-y:auto;}
.modal-footer{padding:16px 22px;border-top:1px solid var(--slate-200);display:flex;justify-content:flex-end;gap:10px;}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-group textarea{width:100%;padding:11px 14px;border:1.5px solid var(--slate-200);border-radius:var(--radius-sm);font-size:14px;resize:vertical;min-height:70px;}
.form-group select{width:100%;padding:11px 14px;border:1.5px solid var(--slate-200);border-radius:var(--radius-sm);font-size:14px;background:white;}

/* TOAST */
#toast-container{position:fixed;bottom:24px;right:24px;z-index:2000;display:flex;flex-direction:column;gap:10px;}
.toast{
  background:var(--navy-900);color:white;padding:13px 18px;border-radius:var(--radius-sm);
  font-size:13.5px;font-weight:500;box-shadow:var(--shadow-lg);
  display:flex;align-items:center;gap:10px;min-width:280px;
  animation:toast-in .25s ease;
}
.toast.success{background:var(--green-600);}
.toast.error{background:var(--red-600);}
.toast.info{background:var(--navy-900);}
@keyframes toast-in{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}

/* CART (Inquiry module) */
.inquiry-layout{display:grid;grid-template-columns:1fr 360px;gap:20px;align-items:start;}
.cart-panel{position:sticky;top:0;}
.cart-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--slate-100);}
.cart-item-info{flex:1;min-width:0;}
.cart-item-name{font-size:13px;font-weight:600;color:var(--navy-900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cart-item-brand{font-size:11.5px;color:var(--slate-500);}
.qty-stepper{display:flex;align-items:center;gap:4px;}
.qty-stepper button{width:24px;height:24px;border-radius:5px;border:1px solid var(--slate-200);background:white;font-size:14px;font-weight:700;color:var(--slate-700);display:flex;align-items:center;justify-content:center;}
.qty-stepper input{width:40px;text-align:center;border:1px solid var(--slate-200);border-radius:5px;padding:3px;font-size:12.5px;font-family:var(--font-mono);}

.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;}
.product-card{
  background:white;border:1.5px solid var(--slate-200);border-radius:var(--radius-md);
  padding:14px;cursor:pointer;transition:all .15s;
}
.product-card:hover{border-color:var(--orange-600);box-shadow:var(--shadow-md);transform:translateY(-1px);}
.product-card-img{
  width:100%;height:90px;background:var(--slate-100);border-radius:8px;
  display:flex;align-items:center;justify-content:center;margin-bottom:10px;color:var(--slate-300);
}
.product-card-img svg{width:32px;height:32px;}
.product-card-name{font-size:13px;font-weight:700;color:var(--navy-900);margin-bottom:3px;line-height:1.3;}
.product-card-sku{font-size:10.5px;color:var(--slate-500);font-family:var(--font-mono);margin-bottom:8px;}
.brand-chips{display:flex;flex-wrap:wrap;gap:5px;}
.brand-chip{
  font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:12px;
  background:var(--slate-100);color:var(--slate-700);border:1px solid var(--slate-200);
  cursor:pointer;transition:all .12s;
}
.brand-chip:hover{background:var(--orange-600);color:white;border-color:var(--orange-600);transform:translateY(-1px);}
.brand-chip.preferred{background:var(--orange-100);color:var(--orange-600);border-color:var(--orange-100);}
.brand-chip.preferred:hover{background:var(--orange-600);color:white;}

/* Search-as-you-type product dropdown (Inquiry cart) */
.product-search-dropdown{
  display:none;position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:50;
  background:white;border:1.5px solid var(--slate-200);border-radius:var(--radius-md);
  box-shadow:var(--shadow-lg);max-height:420px;overflow-y:auto;
}
.product-search-dropdown.active{display:block;}
.product-search-item{

.tab-btn:hover:not(.active){color:var(--navy-900);}

.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;}
.dashboard-columns{display:grid;grid-template-columns:1.5fr 1fr;gap:20px;align-items:start;}

@media (max-width: 900px){
  #sidebar{position:fixed;left:0;top:0;z-index:200;width:240px;transform:translateX(-100%);transition:transform .2s;}
  #sidebar.mobile-open{transform:translateX(0);}
  .inquiry-layout{grid-template-columns:1fr;}
  .cart-panel{position:static;}
}

/* ===== PHONE-WIDTH OPTIMIZATION (≤640px) ===== */
@media (max-width: 640px){
  /* Topbar: tighten padding, hide non-essential text, keep icons reachable */
  #topbar{padding:0 12px;gap:8px;}
  .topbar-title{font-size:15px;}
  #realtime-indicator{display:none;} /* "Live" text — the pulse dot is enough signal on small screens */
  .branch-pill{
    padding:6px 10px;font-size:11px;max-width:130px;
  }
  .branch-pill span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;}
  .icon-btn{width:34px;height:34px;}

  /* Sidebar header: brand name must never overflow its own panel */
  .sidebar-header .brand-text h1{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sidebar-header .brand-text p{font-size:9px;}
  .user-info .name{font-size:12px;}

  #content-area{padding:14px;}

  /* Stat cards: single column, no cramped 2-up squeeze on a 360px screen */
  .stat-grid{grid-template-columns:1fr;gap:10px;}
  .kpi-row{grid-template-columns:repeat(2,1fr);}

  /* Toolbars: stack filters/buttons vertically and let them fill width
     instead of wrapping into an awkward ragged row */
  .toolbar{flex-direction:column;align-items:stretch;}
  .toolbar .search-input-wrap{max-width:none;min-width:0;}
  .toolbar .btn{width:100%;}
  .toolbar > div:not(.search-input-wrap){width:100%;}

  /* ===== TABLE → CARD TRANSFORM =====
     Hide the table header entirely and lay out each row as a stacked card.
     Each <td> already carries a data-label (set by applyMobileTableLabels
     in app-core.js) pulled from its column's <th> text — we surface that
     as a small caption above the value instead of relying on column
     position, so nothing gets visually cut off regardless of how long the
     content is (product names, supplier names, etc. wrap freely instead
     of forcing horizontal scroll). */
  .table-wrap{overflow-x:visible;}
  table{width:100%;}
  table thead{display:none;}
  table tbody{display:block;}
  table tbody tr{
    display:block;background:var(--surface);border:1px solid var(--slate-200);
    border-radius:var(--radius-md);margin-bottom:10px;padding:12px 14px;
  }
  table tbody tr:hover{background:var(--surface);} /* disable desktop hover-highlight on touch */
  table tbody td{
    display:flex;justify-content:space-between;align-items:flex-start;gap:12px;
    padding:7px 0;border-bottom:1px solid var(--slate-100);
    text-align:right;white-space:normal;word-break:break-word;
  }
  table tbody td:last-child{border-bottom:none;}
  table tbody td:empty{display:none;} /* action-only cells with no label add no clutter when empty */
  table tbody td::before{
    content:attr(data-label);
    font-size:10.5px;font-weight:700;color:var(--slate-500);
    text-transform:uppercase;letter-spacing:0.03em;
    text-align:left;flex-shrink:0;padding-top:1px;
  }
  /* Cells with no meaningful label (e.g. a lone action button column) skip the caption */
  table tbody td:not([data-label])::before{content:none;}

  /* Action-button cells (Edit/Delete pairs etc.) sometimes carry their own
     inline `display:flex;gap:4px` from the render function for desktop
     layout — on mobile, let those buttons stack full-width instead of
     being squeezed onto one row next to nothing. */
  table tbody td[style*="display:flex"]{
    flex-direction:column !important;justify-content:flex-start !important;
    align-items:stretch !important;gap:6px !important;
  }
  table tbody td[style*="display:flex"] .btn{width:100%;justify-content:center;}

  /* Pagination: stack the count text above the prev/next controls */
  .pagination{flex-direction:column;gap:10px;align-items:stretch;text-align:center;}
  .pagination-btns{justify-content:center;}

  /* Modals: use nearly the full viewport instead of fixed desktop widths */
  .modal{max-width:100%;width:100%;margin:0 8px;max-height:92vh;}
  .modal.modal-lg{max-width:100%;}
  .modal-header h3{font-size:14.5px;}
  .form-row{grid-template-columns:1fr;}

  /* Modal footer buttons: stack full-width instead of cramming 2-3 buttons
     onto one row — much easier to tap accurately on a phone. */
  .modal-footer{flex-direction:column-reverse;} /* primary action ends up on top, thumb-reachable */
  .modal-footer .btn{width:100%;}
  .modal-footer > div[style*="flex:1"]{display:none;} /* spacer divs (used to push a Delete button left on desktop) are meaningless once stacked */

  /* Product search dropdown (Inquiry cart): full-width, no overflow past viewport */
  .product-search-dropdown{left:0;right:0;max-height:60vh;}

  /* Cards used as KPI tiles inside modals (audit workspace etc.) */
  .stat-card{padding:14px;}
  .stat-card .stat-value{font-size:20px;}

  /* Dashboard's two-column layout (Recent Movements + Low Stock Alerts)
     stacks to a single column on phone width. */
  .dashboard-columns{grid-template-columns:1fr !important;}

  /* Login screen: tighten padding so the card doesn't feel cramped edge-to-edge */
  .login-card{padding:28px 22px;}
}

// ---------- MOBILE TABLE → CARD TRANSFORM ----------
// On narrow screens, plain HTML tables don't work well (forced horizontal
// scroll, tiny touch targets, long product names like "Latex Paint White
// (Gallon)" blowing out the layout). Instead of rewriting all ~14 separate
// table-rendering functions across the app, this tags every <td> with a
// data-label pulled from its matching <th>, and the CSS (see
// .table-wrap in mobile media query) uses that label to lay each row out
// as a stacked card below ~640px. This runs automatically via a
// MutationObserver so any table rendered anywhere (including inside
// modals) gets labeled with zero extra calls needed in render functions.
function applyMobileTableLabels(root){
  root.querySelectorAll('table').forEach(table=>{
    if(table.dataset.mobileLabeled) return; // already processed
    const headerCells = Array.from(table.querySelectorAll('thead th'));
    if(headerCells.length === 0) return;
    const labels = headerCells.map(th => th.textContent.trim());
    table.querySelectorAll('tbody tr').forEach(tr=>{
      Array.from(tr.children).forEach((td, i)=>{
        if(labels[i]) td.setAttribute('data-label', labels[i]);
      });
    });
    table.dataset.mobileLabeled = 'true';
  });
}

const mobileTableObserver = new MutationObserver(()=>{
  applyMobileTableLabels(document.getElementById('content-area') || document.body);
  applyMobileTableLabels(document.getElementById('modal-box') || document.body);
});
(function initMobileTableObserver(){
  const contentArea = document.getElementById('content-area');
  const modalBox = document.getElementById('modal-box');
  if(contentArea) mobileTableObserver.observe(contentArea, { childList:true, subtree:true });
  if(modalBox) mobileTableObserver.observe(modalBox, { childList:true, subtree:true });
})();

// ---------- STYLED CONFIRM / PROMPT DIALOGS ----------
// Drop-in replacements for native confirm()/prompt() that match the app's
// look. Both return a Promise. They render in a dedicated stacked overlay
// (separate from the main modal) so they work correctly even when called on
// top of an already-open modal (e.g. confirming an action inside the Audit
// workspace) without wiping out what's underneath.
function ensureDialogRoot(){
  let root = document.getElementById('dialog-overlay');
  if(!root){
    root = document.createElement('div');
    root.id = 'dialog-overlay';
    root.className = 'modal-overlay';
    root.style.zIndex = '900'; // above the regular modal (500)
    root.innerHTML = '<div class="modal" id="dialog-box" style="max-width:420px;"></div>';
    document.body.appendChild(root);
  }
  return root;
}

function confirmDialog(message, opts={}){
  return new Promise(resolve=>{
    const root = ensureDialogRoot();
    const box = document.getElementById('dialog-box');
    const danger = opts.danger;
    box.innerHTML = `
      <div class="modal-body" style="padding-top:24px;">
        <div style="display:flex;gap:14px;align-items:flex-start;">
          <div style="width:38px;height:38px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:${danger?'var(--red-100)':'var(--orange-100)'};color:${danger?'var(--red-600)':'var(--orange-600)'};">${ICONS.alert}</div>
          <div style="font-size:14px;color:var(--slate-700);line-height:1.5;padding-top:7px;">${escapeHtml(message)}</div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="dlg-cancel">${opts.cancelLabel || 'Cancel'}</button>
        <button class="btn ${danger?'btn-danger':'btn-primary'}" id="dlg-ok">${opts.okLabel || 'Confirm'}</button>
      </div>
    `;
    root.classList.add('active');
    const cleanup = (result)=>{ root.classList.remove('active'); box.innerHTML=''; resolve(result); };
    document.getElementById('dlg-cancel').addEventListener('click', ()=>cleanup(false));
    document.getElementById('dlg-ok').addEventListener('click', ()=>cleanup(true));
    root.onclick = (e)=>{ if(e.target.id==='dialog-overlay') cleanup(false); };
  });
}

function promptDialog(message, opts={}){
  return new Promise(resolve=>{
    const root = ensureDialogRoot();
    const box = document.getElementById('dialog-box');
    const defaultValue = opts.defaultValue ?? '';
    const inputType = opts.type || 'text';
    box.innerHTML = `
      <div class="modal-body" style="padding-top:24px;">
        <div style="font-size:14px;color:var(--slate-700);margin-bottom:12px;line-height:1.5;">${escapeHtml(message)}</div>
        <input type="${inputType}" id="dlg-input" class="search-input" style="width:100%;padding:11px 14px;" value="${escapeHtml(String(defaultValue))}" ${opts.min!==undefined?`min="${opts.min}"`:''} ${opts.max!==undefined?`max="${opts.max}"`:''} step="${opts.step||'any'}">
        <div id="dlg-error" style="color:var(--red-600);font-size:12px;margin-top:8px;display:none;font-weight:500;"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="dlg-cancel">Cancel</button>
        <button class="btn btn-primary" id="dlg-ok">${opts.okLabel || 'OK'}</button>
      </div>
    `;
    root.classList.add('active');
    const input = document.getElementById('dlg-input');
    input.focus();
    input.select();

    const cleanup = (result)=>{ root.classList.remove('active'); box.innerHTML=''; resolve(result); };
    const submit = ()=>{
      const val = input.value.trim();
      if(opts.validate){
        const err = opts.validate(val);
        if(err){
          const errEl = document.getElementById('dlg-error');
          errEl.textContent = err; errEl.style.display = 'block';
          return;
        }
      }
      cleanup(val);
    };
    document.getElementById('dlg-cancel').addEventListener('click', ()=>cleanup(null));
    document.getElementById('dlg-ok').addEventListener('click', submit);
    input.addEventListener('keydown', e=>{ if(e.key==='Enter') submit(); });
    root.onclick = (e)=>{ if(e.target.id==='dialog-overlay') cleanup(null); };
  });
}

// ---------- FORMATTERS ----------
function peso(n){
  return '₱' + Number(n||0).toLocaleString('en-PH', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtDate(d){
  if(!d) return '—';
  return new Date(d).toLocaleDateString('en-PH', {year:'numeric',month:'short',day:'numeric'});
}
function fmtDateTime(d){
  if(!d) return '—';
  return new Date(d).toLocaleString('en-PH', {year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
}
function timeAgo(d){
  const s = Math.floor((new Date() - new Date(d))/1000);
  if(s<60) return 'just now';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}
function escapeHtml(str){
  if(str===null||str===undefined) return '';
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function debounce(fn, ms=300){
  let t;
  return (...args)=>{ clearTimeout(t); t = setTimeout(()=>fn(...args), ms); };
}

// ---------- AUTH ----------
let AUTH_INIT_DONE = false;   // true once the full "just logged in" flow has completed at least once
let AUTH_INIT_IN_PROGRESS = false; // guards against overlapping calls firing concurrently

async function initAuth(){
  const { data: { session } } = await sb.auth.getSession();
  if(session){
    await onAuthenticated(session);
  } else {
    showLogin();
  }

  sb.auth.onAuthStateChange(async (event, session) => {
    // IMPORTANT: onAuthStateChange fires for more than just a fresh login —
    // it also fires on TOKEN_REFRESHED (automatic, every ~hour) and again on
    // SIGNED_IN when the browser tab regains focus/visibility (Supabase calls
    // this "visibility recovery"). We only want to run the full "just logged
    // in" flow (navigate to dashboard, open a realtime channel, etc.) once —
    // not every time the token quietly refreshes or the tab regains focus.
    if(event === 'SIGNED_IN' && session){
      STATE.user = session.user;
      if(AUTH_INIT_DONE || AUTH_INIT_IN_PROGRESS){
        // Already fully loaded (or currently loading) — this is a background
        // recovery event, not a real new login. Don't re-navigate or re-subscribe.
        return;
      }
      await onAuthenticated(session);
    } else if(event === 'TOKEN_REFRESHED'){
      // Token quietly renewed in the background — update our reference only.
      if(session) STATE.user = session.user;
    } else if(event === 'SIGNED_OUT'){
      AUTH_INIT_DONE = false;
      STATE.profile = null;
      STATE.user = null;
      showLogin();
    }
  });
}

async function onAuthenticated(session){
  if(AUTH_INIT_IN_PROGRESS) return; // belt-and-suspenders against re-entrancy
  AUTH_INIT_IN_PROGRESS = true;
  try{
    STATE.user = session.user;
    const { data: profile, error } = await sb.from('users').select('*').eq('id', session.user.id).single();
    if(error || !profile){
      toast('Could not load your profile. Contact admin.', 'error');
      await sb.auth.signOut();
      return;
    }
    if(!profile.is_active){
      toast('Your account has been deactivated. Contact admin.', 'error');
      await sb.auth.signOut();
      return;
    }
    STATE.profile = profile;

    // Update last_login_at + audit log (fire-and-forget, only happens once per real login now)
    sb.from('users').update({ last_login_at: new Date().toISOString() }).eq('id', profile.id).then(()=>{});
    sb.rpc('log_audit_event', { p_action:'login', p_entity_type:'user', p_entity_id: profile.id }).then(()=>{});

    await loadBranches();
    showApp();
    renderSidebar();
    navigateTo('dashboard');
    setupRealtimeSubscriptions(); // idempotent — tears down any existing channel itself
    loadNotificationBadge();
    AUTH_INIT_DONE = true;
  } finally {
    AUTH_INIT_IN_PROGRESS = false;
  }
}

// Resolves whatever the person typed (email OR username) into an actual email.
// If it already looks like an email, use it as-is — no need to hit the DB.
// Otherwise, look up the username via the public RPC. Generic "not found" is fine
// here since signInWithPassword gives a generic error anyway (no enumeration risk).
async function resolveLoginEmail(identifier){
  if(identifier.includes('@')) return identifier;
  const { data, error } = await sb.rpc('get_email_for_username', { p_username: identifier });
  if(error || !data) return identifier; // fall through; signIn will just fail with invalid credentials
  return data;
}

  const btn = document.getElementById('login-submit-btn');
  errEl.style.display='none';
  btn.disabled = true; btn.textContent = 'Signing in...';

  const email = await resolveLoginEmail(identifier);
  const { error } = await sb.auth.signInWithPassword({ email, password });

  btn.disabled = false; btn.textContent = 'Sign In';
  if(error){
    errEl.textContent = error.message === 'Invalid login credentials' ? 'Incorrect email/username or password.' : error.message;
    errEl.style.display = 'block';
  }
});

document.getElementById('forgot-password-link').addEventListener('click', async (e)=>{

// ---------- REALTIME ----------
function setupRealtimeSubscriptions(){
  // Idempotency guard: if a channel with this name already exists on the
  // client (regardless of what STATE.realtimeChannels thinks), remove it
  // first. This is what actually prevents the "cannot add postgres_changes
  // callbacks after subscribe()" error — that error happens specifically
  // when something tries to re-use/re-attach to an already-subscribed
  // channel object instead of starting fresh.
  const existing = sb.getChannels().filter(ch => ch.topic === 'realtime:inventory-realtime');
  existing.forEach(ch => sb.removeChannel(ch));
  STATE.realtimeChannels = STATE.realtimeChannels.filter(ch => ch.topic !== 'realtime:inventory-realtime');

  const ch = sb.channel('inventory-realtime')
    .on('postgres_changes', { event:'*', schema:'public', table:'stock_levels' }, payload=>{
      flashPulse();
      if(STATE.page==='inventory') refreshInventoryTable();
      if(STATE.page==='dashboard') renderDashboard();
    })
    .on('postgres_changes', { event:'*', schema:'public', table:'inquiries' }, payload=>{
      flashPulse();
      if(STATE.page==='inquiry') refreshInquiryList();
      if(STATE.page==='dashboard') renderDashboard();
    })
    .on('postgres_changes', { event:'*', schema:'public', table:'purchase_orders' }, payload=>{
      flashPulse();
      if(STATE.page==='suppliers') refreshPOList();
    })
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'notifications', filter:`recipient_id=eq.${STATE.profile.id}` }, payload=>{
      flashPulse();
      loadNotificationBadge();
      toast(payload.new.title, 'info');
    })
    .subscribe();

  STATE.realtimeChannels.push(ch);
}
function flashPulse(){
  const dot = document.getElementById('realtime-dot');
  dot.classList.add('flash');
  setTimeout(()=> dot.classList.remove('flash'), 1200);
}
function teardownRealtimeSubscriptions(){
  STATE.realtimeChannels.forEach(ch => sb.removeChannel(ch));
  STATE.realtimeChannels = [];
}

async function refreshInventoryTable(){
  const wrap = document.getElementById('inv-table-wrap');
  if(!wrap) return;

  let lowStockIds = null;
  if(INV_STATE.lowStockOnly){
    const { data } = await sb.rpc('get_low_stock_items', { p_branch_id: STATE.currentBranch });
    lowStockIds = (data||[]).map(d=>d.product_brand_id);
    if(lowStockIds.length===0){
      wrap.innerHTML = `<div class="empty-state">${ICONS.empty}<p>No items below reorder level. Nice work!</p></div>`;
      document.getElementById('inv-pagination').innerHTML='';
      return;
    }
  }

  let query = sb.from('product_brands')
    .select('*, products!inner(*, categories(name)), brands(name), stock_levels!inner(qty_on_hand, branch_id)', {count:'exact'})
    .eq('is_active', true)
    .eq('stock_levels.branch_id', STATE.currentBranch);

  if(INV_STATE.search){
    query = query.or(`name.ilike.%${INV_STATE.search}%,sku.ilike.%${INV_STATE.search}%`, { foreignTable:'products' });
  }
  if(INV_STATE.categoryFilter){
    query = query.eq('products.category_id', INV_STATE.categoryFilter);
  }
  if(lowStockIds){
    query = query.in('id', lowStockIds);
  }

  const from = (INV_STATE.page-1) * INV_STATE.pageSize;
  const to = from + INV_STATE.pageSize - 1;
  query = query.order('created_at', { foreignTable:'products', ascending:false }).range(from, to);

  const { data, count, error } = await query;
  if(error){ wrap.innerHTML = `<div class="empty-state"><p>Error loading inventory: ${escapeHtml(error.message)}</p></div>`; return; }

  INV_STATE.total = count || 0;

  if(!data || data.length===0){
    wrap.innerHTML = `<div class="empty-state">${ICONS.empty}<p>No products found.</p></div>`;
    document.getElementById('inv-pagination').innerHTML='';
    return;
  }

  wrap.innerHTML = `<table>
    <thead><tr><th>Product</th><th>Brand</th><th>SKU</th><th>Category</th><th>Stock</th><th>Reorder Lvl</th><th>Price</th><th>Status</th><th></th></tr></thead>
    <tbody>
      ${data.map(pb => {
        const qty = pb.stock_levels?.[0]?.qty_on_hand ?? 0;
        const reorder = pb.products?.reorder_level ?? 0;
        const isLow = qty <= reorder;
        return `<tr>
          <td style="font-weight:600;color:var(--navy-900);">${escapeHtml(pb.products?.name)}</td>
          <td>${pb.is_preferred ? `<span class="badge badge-orange">★ ${escapeHtml(pb.brands?.name)}</span>` : escapeHtml(pb.brands?.name)}</td>
          <td class="mono">${escapeHtml(pb.products?.sku)}</td>
          <td>${escapeHtml(pb.products?.categories?.name || '—')}</td>
          <td class="mono" style="font-weight:700;${isLow?'color:var(--red-600);':''}">${Number(qty).toLocaleString()}</td>
          <td class="mono" style="color:var(--slate-500);">${Number(reorder).toLocaleString()}</td>
          <td class="mono">${peso(pb.price)}</td>
          <td>${isLow ? `<span class="badge badge-red">Low Stock</span>` : `<span class="badge badge-green">In Stock</span>`}</td>
          <td><button class="btn btn-ghost btn-sm" onclick="viewProductDetail('${pb.id}')">View</button></td>
        </tr>`;
      }).join('')}
    </tbody>
  </table>`;

  renderPagination('inv-pagination', INV_STATE.page, INV_STATE.pageSize, INV_STATE.total, (p)=>{ INV_STATE.page=p; refreshInventoryTable(); });
}

function renderPagination(containerId, page, pageSize, total, onPage){
  const totalPages = Math.max(1, Math.ceil(total/pageSize));
  const container = document.getElementById(containerId);
  container.innerHTML = `
    <span>Showing ${total===0?0:((page-1)*pageSize+1)}–${Math.min(page*pageSize,total)} of ${total}</span>
    <div class="pagination-btns">
      <button class="page-btn" ${page<=1?'disabled':''} data-go="prev">← Prev</button>
      <span class="page-btn" style="cursor:default;">${page} / ${totalPages}</span>
      <button class="page-btn" ${page>=totalPages?'disabled':''} data-go="next">Next →</button>
    </div>
  `;
  container.querySelector('[data-go="prev"]')?.addEventListener('click', ()=> onPage(page-1));
  container.querySelector('[data-go="next"]')?.addEventListener('click', ()=> onPage(page+1));
}

const BULK_STATE = { mode: 'stock_in', parsedRows: [], fileName: '' };

function downloadBulkTemplate(){
  const mode = BULK_STATE.mode;
  const headers = ['sku','brand','product_name','category','unit','qty','unit_cost','price','reorder_level','batch_code','expiry_date','notes'];
  const sampleRows = mode === 'stock_in' ? [
    ['PVC-PIPE-12','Neltex','PVC Pipe 1/2 inch x 3m','Plumbing','pc',100,70,95,50,'','',''],
    ['HAMMER-CLAW-16OZ','Stanley','Claw Hammer 16oz','Hardware & Fasteners','pc',20,310,420,10,'','',''],
    ['NEW-ITEM-001','SomeBrand','Brand New Product Example','Hand Tools','pc',15,150,220,5,'','','Leave batch_code/expiry_date blank if not applicable'],
  ] : [
    ['PVC-PIPE-12','Neltex','PVC Pipe 1/2 inch x 3m','Plumbing','pc',180,'','','','','','Physical count correction'],
    ['HAMMER-CLAW-16OZ','Stanley','Claw Hammer 16oz','Hardware & Fasteners','pc',22,'','','','','',''],
  ];

  const ws = XLSX.utils.aoa_to_sheet([headers, ...sampleRows]);
  ws['!cols'] = [
    {wch:18},{wch:14},{wch:28},{wch:18},{wch:8},{wch:8},{wch:10},{wch:10},{wch:12},{wch:14},{wch:12},{wch:30}
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, mode === 'stock_in' ? 'Stock In' : 'Stock Correction');

  const notesWs = XLSX.utils.aoa_to_sheet([
    ['Column','Required?','Notes'],
    ['sku','Yes','Unique product code. If it does not exist yet, a new product will be created automatically.'],
    ['brand','Yes','Brand name. If it does not exist yet, it will be created automatically.'],
    ['product_name','Only for new SKUs','Used as the product name if this SKU does not exist yet. Ignored if SKU already exists.'],
    ['category','Optional','Must match an existing category name exactly (e.g. Plumbing, Electrical). Ignored if it does not match.'],
    ['unit','Optional','e.g. pc, m, gal, box. Defaults to "pc". Only used when creating a new product.'],
    ['qty', 'Yes', mode === 'stock_in' ? 'Quantity being added as a new stock batch.' : 'The TARGET quantity that stock should be set to (system will add or remove the difference).'],
    ['unit_cost','Recommended','Cost per unit. Used for FIFO batch costing and inventory valuation.'],
    ['price','Only for new SKUs','Sell price. Only used when creating a new product+brand combo.'],
    ['reorder_level','Only for new SKUs','Low-stock alert threshold. Only used when creating a new product.'],
    ['batch_code','Optional','Custom batch identifier. Auto-generated if left blank.'],
    ['expiry_date','Optional','Format: YYYY-MM-DD. Leave blank if not applicable.'],
    ['notes','Optional','Free text note attached to this stock movement.'],
  ]);
  notesWs['!cols'] = [{wch:16},{wch:16},{wch:70}];
  XLSX.utils.book_append_sheet(wb, notesWs, 'Instructions');

  XLSX.writeFile(wb, `Hunyo24-${mode === 'stock_in' ? 'StockIn' : 'StockCorrection'}-Template.xlsx`);
}

async function openBulkUploadModal(){
  BULK_STATE.mode = 'stock_in';
  BULK_STATE.parsedRows = [];
  BULK_STATE.fileName = '';

  openModal(`
    <div class="modal-header"><h3>${ICONS.upload} Bulk Stock Upload</h3><button class="icon-btn" onclick="closeModal()">${ICONS.x}</button></div>
    <div class="modal-body">
      <div class="tab-bar" style="margin-bottom:16px;">
        <button class="tab-btn active" id="bulk-tab-stockin" data-mode="stock_in">Bulk Stock-In</button>
        <button class="tab-btn" id="bulk-tab-correction" data-mode="correction">Bulk Stock Correction</button>
      </div>
      <div id="bulk-mode-description" style="background:var(--blue-100);color:var(--blue-600);padding:11px 14px;border-radius:8px;font-size:12.5px;font-weight:500;margin-bottom:16px;">
        Adds a new FIFO batch for each row — use this for receiving new deliveries in bulk. Existing stock is increased, never overwritten.

      <div style="display:flex;gap:10px;margin-bottom:16px;">

        <input type="file" id="bulk-file-input" accept=".xlsx,.xls,.csv" style="display:none;">

        <div class="table-wrap" style="max-height:280px;border:1px solid var(--slate-200);border-radius:8px;" id="bulk-result-table"></div>
      </div>
    </div>

      <button class="btn btn-secondary" onclick="closeModal()">Close</button>
      <button class="btn btn-primary" id="bulk-import-btn" disabled>Import Rows</button>
    </div>
  `, {large:true});

  document.getElementById('bulk-download-template').addEventListener('click', downloadBulkTemplate);

  const dropzone = document.getElementById('bulk-dropzone');

  dropzone.addEventListener('dragleave', ()=>{ dropzone.style.borderColor = 'var(--slate-300)'; });
  dropzone.addEventListener('drop', e=>{
    e.preventDefault();
    dropzone.style.borderColor = 'var(--slate-300)';
    if(e.dataTransfer.files.length) handleBulkFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', e=>{
    if(e.target.files.length) handleBulkFile(e.target.files[0]);
  });

  document.getElementById('bulk-clear-file').addEventListener('click', ()=>{
    BULK_STATE.parsedRows = [];
    fileInput.value = '';

        ? 'Adds a new FIFO batch for each row — use this for receiving new deliveries in bulk. Existing stock is increased, never overwritten.'
        : 'Sets stock to an exact target quantity per row — use this to correct counts (e.g. after a physical inventory check). The system adds or removes only the difference, and logs it like an audit adjustment.';
      if(BULK_STATE.parsedRows.length) renderBulkPreview();
    });
  });

  document.getElementById('bulk-import-btn').addEventListener('click', runBulkImport);
}

function handleBulkFile(file){
  BULK_STATE.fileName = file.name;
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type:'array' });
      const firstSheetName = wb.SheetNames[0];
      const sheet = wb.Sheets[firstSheetName];
      const rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });

      if(rows.length === 0){
        toast('The file appears to be empty.', 'error');
        return;
      }

      const normalizeKey = k => String(k).trim().toLowerCase().replace(/\s+/g,'_');
      BULK_STATE.parsedRows = rows.map(r=>{
        const norm = {};
        Object.keys(r).forEach(k=>{ norm[normalizeKey(k)] = r[k]; });
        return norm;
      });

      renderBulkPreview();
      document.getElementById('bulk-result-area').style.display = 'none';
      document.getElementById('bulk-import-btn').disabled = false;
    } catch(err){
      toast('Could not read this file: ' + err.message, 'error');
    }
  };
  reader.readAsArrayBuffer(file);
}

function renderBulkPreview(){
  const area = document.getElementById('bulk-preview-area');
  const title = document.getElementById('bulk-preview-title');
  const table = document.getElementById('bulk-preview-table');
  const rows = BULK_STATE.parsedRows;

  area.style.display = 'block';
  title.textContent = `Preview — ${rows.length} row${rows.length===1?'':'s'} from "${BULK_STATE.fileName}"`;

  const qtyLabel = BULK_STATE.mode === 'stock_in' ? 'Qty to Add' : 'Target Qty';
  const previewRows = rows.slice(0, 50);

  table.innerHTML = `<table>
    <thead><tr><th>#</th><th>SKU</th><th>Brand</th><th>Product Name</th><th>${qtyLabel}</th><th>Unit Cost</th></tr></thead>
    <tbody>
      ${previewRows.map((r,i)=>{
        const missingSku = !r.sku || String(r.sku).trim()==='';
        const missingBrand = !r.brand || String(r.brand).trim()==='';
        const qty = r.qty;
        const badQty = qty===undefined || qty==='' || isNaN(parseFloat(qty));
        const rowIssue = missingSku || missingBrand || badQty;
        return `<tr ${rowIssue?'style="background:var(--red-100);"':''}>
          <td class="mono">${i+1}</td>
          <td class="mono">${missingSku ? '<span style="color:var(--red-600);font-weight:700;">missing</span>' : escapeHtml(r.sku)}</td>
          <td>${missingBrand ? '<span style="color:var(--red-600);font-weight:700;">missing</span>' : escapeHtml(r.brand)}</td>
          <td>${escapeHtml(r.product_name||'—')}</td>
          <td class="mono">${badQty ? '<span style="color:var(--red-600);font-weight:700;">invalid</span>' : Number(qty).toLocaleString()}</td>
          <td class="mono">${r.unit_cost!==undefined && r.unit_cost!=='' ? peso(r.unit_cost) : '—'}</td>
        </tr>`;
      }).join('')}
    </tbody>
  </table>
  ${rows.length>50 ? `<div style="padding:10px 14px;font-size:12px;color:var(--slate-500);">+ ${rows.length-50} more rows not shown in preview (all will still be imported)</div>` : ''}`;
}

async function runBulkImport(){
  const rows = BULK_STATE.parsedRows;
  if(!rows || rows.length===0) return;

  const branchName = STATE.branches.find(b=>b.id===STATE.currentBranch)?.name || 'the current branch';
  const ok = await confirmDialog(
    `Import ${rows.length} row${rows.length===1?'':'s'} as ${BULK_STATE.mode==='stock_in' ? 'new stock-in batches' : 'stock corrections'} for ${branchName}? New products or brands not yet in the system will be created automatically.`,
    { okLabel: 'Import Now' }
  );
  if(!ok) return;

  const btn = document.getElementById('bulk-import-btn');
  btn.disabled = true; btn.textContent = 'Importing...';

  const payload = rows.map(r => ({
    sku: r.sku, brand: r.brand, product_name: r.product_name, category: r.category,
    unit: r.unit, qty: r.qty, unit_cost: r.unit_cost, price: r.price,
    reorder_level: r.reorder_level, batch_code: r.batch_code, expiry_date: r.expiry_date, notes: r.notes
  }));

  const rpcName = BULK_STATE.mode === 'stock_in' ? 'bulk_stock_in' : 'bulk_stock_correction';
  const { data, error } = await sb.rpc(rpcName, { p_branch_id: STATE.currentBranch, p_rows: payload });

  btn.disabled = false; btn.textContent = 'Import Rows';

  if(error){
    toast('Import failed: ' + error.message, 'error');
    return;
  }

  const successCount = (data||[]).filter(r=>r.success).length;
  const failCount = (data||[]).length - successCount;

  document.getElementById('bulk-result-area').style.display = 'block';
  document.getElementById('bulk-result-title').textContent = `Results — ${successCount} succeeded, ${failCount} failed`;
  document.getElementById('bulk-result-table').innerHTML = `<table>
    <thead><tr><th>#</th><th>SKU</th><th>Brand</th><th>Status</th><th>Detail</th></tr></thead>
    <tbody>
      ${(data||[]).map(r=>`<tr>
        <td class="mono">${r.row_index}</td>
        <td class="mono">${escapeHtml(r.sku||'—')}</td>
        <td>${escapeHtml(r.brand||'—')}</td>
        <td>${r.success ? `<span class="badge badge-green">${ICONS.check} OK</span>` : `<span class="badge badge-red">Failed</span>`}</td>
        <td style="font-size:12px;color:var(--slate-500);">${escapeHtml(r.message||'')}</td>
      </tr>`).join('')}
    </tbody>
  </table>`;

  if(failCount===0){
    toast(`All ${successCount} rows imported successfully.`, 'success');
  } else {
    toast(`Imported ${successCount} rows, ${failCount} failed. See details below.`, failCount===data.length ? 'error' : 'info');
  }

  refreshInventoryTable();
}

const INQ_STATE = { tab:'new', listPage:1, listPageSize:15, statusFilter:'', search:'' };

async function renderInquiry(){
  const el = document.getElementById('page-inquiry');

  el.innerHTML = `

// ============ NEW INQUIRY — CART INTERFACE ============
async function renderInquiryCart(){

    customerSelect.insertBefore(newOption, customerSelect.querySelector('option[value="__new__"]'));

async function handleProductSearchInput(){
  const searchInput = document.getElementById('cart-product-search');
  const dropdown = document.getElementById('cart-product-dropdown');
  const hint = document.getElementById('cart-search-hint');
  if(!searchInput || !dropdown) return;

  const search = searchInput.value.trim();

  // Nothing typed — close the dropdown and show the idle hint instead of
  // hitting the database with an unfiltered query.
  if(search.length === 0){
    dropdown.classList.remove('active');
    dropdown.innerHTML = '';
    if(hint) hint.style.display = 'block';
    return;
  }

  if(hint) hint.style.display = 'none';
  dropdown.classList.add('active');
  dropdown.innerHTML = `<div style="padding:16px;text-align:center;"><div class="skeleton" style="height:14px;width:60%;margin:0 auto;"></div></div>`;

  const { data, error } = await sb.from('products')
    .select('id, name, sku, product_brands(id, brand_id, price, is_preferred, brands(name), stock_levels(qty_on_hand, branch_id))')
    .eq('is_active', true)
    .or(`name.ilike.%${search}%,sku.ilike.%${search}%`)
    .limit(6);

  // The search box may have changed (or been cleared) while this request
  // was in flight — discard a stale response instead of overwriting newer input.
  if(document.getElementById('cart-product-search')?.value.trim() !== search) return;

  if(error){ dropdown.innerHTML = `<div style="padding:16px;color:var(--red-600);font-size:12.5px;">Error: ${escapeHtml(error.message)}</div>`; return; }
  if(!data || data.length===0){ dropdown.innerHTML = `<div style="padding:20px;text-align:center;color:var(--slate-500);font-size:13px;">No products match "${escapeHtml(search)}".</div>`; return; }

  dropdown.innerHTML = data.map(p => {
    const brands = (p.product_brands||[]).filter(pb=>pb.id);
    return `<div class="product-search-item">
      <div class="product-search-item-info">
        <div class="product-search-item-name">${escapeHtml(p.name)}</div>
        <div class="product-search-item-sku">${escapeHtml(p.sku)}</div>
      </div>
      <div class="brand-chips">
        ${brands.map(b => {
          const stock = (b.stock_levels||[]).find(sl=>sl.branch_id===STATE.currentBranch);
          const qty = stock?.qty_on_hand ?? 0;
          return `<span class="brand-chip ${b.is_preferred?'preferred':''}" data-pb-id="${b.id}" data-pname="${escapeHtml(p.name)}" data-sku="${escapeHtml(p.sku)}" data-bname="${escapeHtml(b.brands.name)}" data-price="${b.price}" data-stock="${qty}">${escapeHtml(b.brands.name)} · ${peso(b.price)}</span>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');

  dropdown.querySelectorAll('.brand-chip').forEach(chip=>{
    chip.addEventListener('click', (e)=>{
      e.stopPropagation();
      addToCart({
        product_brand_id: chip.dataset.pbId,
        product_name: chip.dataset.pname,
        sku: chip.dataset.sku,
        brand_name: chip.dataset.bname,
        unit_price: parseFloat(chip.dataset.price),
        available_stock: parseFloat(chip.dataset.stock),
        qty: 1
      });
      // Close the dropdown after adding — keeps the flow fast for adding one
      // item at a time without the list jumping around underneath the user.
      dropdown.classList.remove('active');
      dropdown.innerHTML = '';
      searchInput.value = '';
      if(hint) hint.style.display = 'block';
    });
  });
}

function closeCartDropdownOnOutsideClick(e){
  const dropdown = document.getElementById('cart-product-dropdown');
  const searchInput = document.getElementById('cart-product-search');
  if(!dropdown || !searchInput) return;
  if(!dropdown.contains(e.target) && e.target !== searchInput){
    dropdown.classList.remove('active');
  }
}

function addToCart(item){
  const existing = STATE.cart.find(c=>c.product_brand_id === item.product_brand_id);
  if(existing){ existing.qty += 1; }
  else { STATE.cart.push(item); }
  toast(`Added ${item.product_name} (${item.brand_name}) to cart`, 'success');
  updateCartUI();
}
function removeFromCart(productBrandId){
  STATE.cart = STATE.cart.filter(c=>c.product_brand_id !== productBrandId);
  updateCartUI();
}
function updateCartQty(productBrandId, qty){
  const item = STATE.cart.find(c=>c.product_brand_id === productBrandId);
  if(item){ item.qty = Math.max(1, qty); }
  updateCartUI();
}
function cartTotal(){
  return STATE.cart.reduce((sum,c)=> sum + (c.qty * c.unit_price), 0);
}
function renderCartItemsHtml(){
  if(STATE.cart.length===0) return `<div class="empty-state" style="padding:30px 10px;">${ICONS.cart}<p>Cart is empty. Tap a brand chip to add.</p></div>`;
  return STATE.cart.map(c=>`
    <div class="cart-item">
      <div class="cart-item-info">
        <div class="cart-item-name">${escapeHtml(c.product_name)}</div>
        <div class="cart-item-brand">${escapeHtml(c.brand_name)} • ${peso(c.unit_price)} ${c.available_stock!==undefined ? `• stock: ${c.available_stock}` : ''}</div>
      </div>
      <div class="qty-stepper">
        <button onclick="updateCartQty('${c.product_brand_id}', ${c.qty-1})">−</button>
        <input type="number" value="${c.qty}" onchange="updateCartQty('${c.product_brand_id}', parseFloat(this.value)||1)">
        <button onclick="updateCartQty('${c.product_brand_id}', ${c.qty+1})">+</button>
      </div>
      <button class="icon-btn" style="width:26px;height:26px;" onclick="removeFromCart('${c.product_brand_id}')">${ICONS.x}</button>
    </div>
  `).join('');
}
function updateCartUI(){
  const list = document.getElementById('cart-items-list');
  if(list) list.innerHTML = renderCartItemsHtml();
  const total = document.getElementById('cart-total');
  if(total) total.textContent = peso(cartTotal());
  const countBadge = document.getElementById('cart-count-badge');
  if(countBadge) countBadge.textContent = `${STATE.cart.length} items`;
  const submitBtn = document.getElementById('cart-submit-btn');
  if(submitBtn) submitBtn.disabled = STATE.cart.length===0;
  const pdfBtn = document.getElementById('cart-pdf-btn');
  if(pdfBtn) pdfBtn.disabled = STATE.cart.length===0;

  const navBadge = document.getElementById('cart-badge');
  if(navBadge){
    navBadge.style.display = STATE.cart.length>0 ? 'inline-flex' : 'none';
    navBadge.textContent = STATE.cart.length;
  }
}

async function submitInquiry(){
  if(STATE.cart.length===0) return;
  const customerId = document.getElementById('cart-customer').value;

  if(customerId === '__new__'){
    toast('Please finish adding the new customer first (or pick an existing one).', 'error');
    return;
  }

  const btn = document.getElementById('cart-submit-btn');
  btn.disabled = true; btn.textContent = 'Submitting...';

  const { data: inqNumber } = await sb.rpc('generate_inquiry_number');

  const { data: inquiry, error: inqErr } = await sb.from('inquiries').insert({
    inquiry_number: inqNumber, customer_id: customerId, branch_id: STATE.currentBranch,
    sales_agent_id: STATE.profile.id, status: 'submitted',
    valid_until: new Date(Date.now() + 7*86400000).toISOString().slice(0,10)
  }).select().single();

  if(inqErr){ toast('Failed to create inquiry: ' + inqErr.message, 'error'); btn.disabled=false; btn.textContent='Submit Inquiry'; return; }

  const items = STATE.cart.map(c => ({
    inquiry_id: inquiry.id, product_brand_id: c.product_brand_id, qty: c.qty, unit_price: c.unit_price
  }));
  const { error: itemsErr } = await sb.from('inquiry_items').insert(items);

  if(itemsErr){ toast('Inquiry created but items failed: ' + itemsErr.message, 'error'); }
  else { toast(`Inquiry ${inqNumber} submitted successfully.`, 'success'); }

  STATE.cart = [];
  updateCartUI();
  btn.disabled = false; btn.textContent = 'Submit Inquiry';
  INQ_STATE.tab = 'list';
  renderInquiry();
}

// ============ QUOTATION PDF ============
async function generateQuotationPDF(){
  if(STATE.cart.length===0){ toast('Cart is empty.', 'error'); return; }
  const customerSelect = document.getElementById('cart-customer');
  if(customerSelect && customerSelect.value === '__new__'){
    toast('Please finish adding the new customer first (or pick an existing one).', 'error');
    return;
  }
  const customerName = customerSelect ? customerSelect.options[customerSelect.selectedIndex].text : 'Walk-in Customer';
  const customerId = customerSelect ? customerSelect.value : null;

  let customerAddress = null;
  if(customerId){
    const { data: customerRow } = await sb.from('customers').select('address').eq('id', customerId).maybeSingle();
    customerAddress = customerRow?.address || null;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const quoteNo = 'QT-' + Date.now().toString().slice(-8);

  doc.setFontSize(18); doc.setFont(undefined,'bold');
  doc.setTextColor(15,27,45);
  doc.text('HUNYO 24 TRADING', 14, 20);
  doc.setFontSize(9); doc.setFont(undefined,'normal'); doc.setTextColor(100,100,100);
  doc.text('Hardware & Construction Supplies — Taytay, Rizal, Philippines', 14, 26);

  doc.setDrawColor(232,89,12); doc.setLineWidth(0.8);
  doc.line(14, 30, 196, 30);

  doc.setFontSize(13); doc.setTextColor(15,27,45); doc.setFont(undefined,'bold');
  doc.text('QUOTATION', 14, 40);
  doc.setFontSize(9); doc.setFont(undefined,'normal');
  doc.text(`Quote No: ${quoteNo}`, 14, 47);
  doc.text(`Date: ${new Date().toLocaleDateString('en-PH')}`, 14, 52);
  doc.text(`Customer: ${customerName}`, 14, 57);
  doc.text(`Prepared by: ${STATE.profile.full_name}`, 14, 62);
  doc.text(`Valid until: ${new Date(Date.now()+7*86400000).toLocaleDateString('en-PH')}`, 120, 47);

  // Delivery address (optional) — wraps to multiple lines if long, and the
  // rest of the layout shifts down dynamically so nothing overlaps.
  let addressLines = [];
  let tableStartY = 74;
  if(customerAddress){
    addressLines = doc.splitTextToSize(`Delivery Address: ${customerAddress}`, 182);
    doc.text(addressLines, 14, 67);
    tableStartY = 67 + (addressLines.length * 5) + 8;
  }

  let y = tableStartY;
  doc.setFillColor(15,27,45); doc.rect(14, y-6, 182, 8, 'F');
  doc.setTextColor(255,255,255); doc.setFontSize(9); doc.setFont(undefined,'bold');
  doc.text('PRODUCT', 16, y); doc.text('BRAND', 95, y); doc.text('QTY', 130, y); doc.text('UNIT PRICE', 148, y); doc.text('TOTAL', 178, y);
  y += 8;

  doc.setTextColor(40,40,40); doc.setFont(undefined,'normal'); doc.setFontSize(9);
  STATE.cart.forEach((item, idx) => {
    if(idx % 2 === 1){ doc.setFillColor(247,245,241); doc.rect(14, y-5, 182, 7, 'F'); }
    doc.text(String(item.product_name).slice(0,38), 16, y);
    doc.text(String(item.brand_name).slice(0,18), 95, y);
    doc.text(String(item.qty), 130, y);
    doc.text(peso(item.unit_price).replace('₱','P'), 148, y);
    doc.text(peso(item.qty*item.unit_price).replace('₱','P'), 178, y);
    y += 7;
  });

  y += 4;
  doc.setDrawColor(200,200,200); doc.line(14, y, 196, y);
  y += 8;
  doc.setFont(undefined,'bold'); doc.setFontSize(11); doc.setTextColor(232,89,12);
  doc.text(`TOTAL: ${peso(cartTotal()).replace('₱','P')}`, 148, y);

  y += 20;
  doc.setFontSize(8); doc.setTextColor(130,130,130); doc.setFont(undefined,'normal');
  doc.text('This quotation is valid for 7 days from the date of issue. Prices subject to change without prior notice.', 14, y);
  doc.text('Thank you for choosing Hunyo 24 Trading.', 14, y+5);

  doc.save(`Quotation-${quoteNo}.pdf`);
  toast('Quotation PDF generated.', 'success');
}

async function refreshInquiryList(){
  const wrap = document.getElementById('inq-table-wrap');
  if(!wrap) return;

  let query = sb.from('inquiries').select('*, customers(full_name), users!inquiries_sales_agent_id_fkey(full_name)', {count:'exact'}).eq('branch_id', STATE.currentBranch);
  if(INQ_STATE.search) query = query.ilike('inquiry_number', `%${INQ_STATE.search}%`);
  if(INQ_STATE.statusFilter) query = query.eq('status', INQ_STATE.statusFilter);

  const from = (INQ_STATE.listPage-1)*INQ_STATE.listPageSize;
  const to = from + INQ_STATE.listPageSize - 1;
  query = query.order('created_at',{ascending:false}).range(from,to);

  const { data, count, error } = await query;
  if(error){ wrap.innerHTML = `<div class="empty-state"><p>Error: ${escapeHtml(error.message)}</p></div>`; return; }
  if(!data || data.length===0){ wrap.innerHTML = `<div class="empty-state">${ICONS.empty}<p>No inquiries found.</p></div>`; document.getElementById('inq-pagination').innerHTML=''; return; }

  const statusColors = { draft:'slate', submitted:'blue', forwarded_to_prep:'amber', preparing:'amber', ready:'green', converted:'green', cancelled:'red' };

  wrap.innerHTML = `<table>
    <thead><tr><th>Inquiry #</th><th>Customer</th><th>Agent</th><th>Total</th><th>Status</th><th>Date</th><th></th></tr></thead>
    <tbody>
      ${data.map(i=>`<tr>
        <td class="mono" style="font-weight:600;">${escapeHtml(i.inquiry_number)}</td>
        <td>${escapeHtml(i.customers?.full_name || 'Walk-in')}</td>
        <td>${escapeHtml(i.users?.full_name || '—')}</td>
        <td class="mono">${peso(i.total_amount)}</td>
        <td><span class="badge badge-${statusColors[i.status]||'slate'}">${i.status.replace(/_/g,' ')}</span></td>

async function viewInquiryDetail(inquiryId){

  openModal(`

        </div>
        <div>
          <div style="color:var(--slate-500);">Sales Agent</div>
          <div style="font-weight:600;color:var(--navy-900);">${escapeHtml(inquiry.users?.full_name || '—')}</div>
        </div>
        <div>
          <div style="color:var(--slate-500);">Status</div>
          <div style="font-weight:600;color:var(--navy-900);text-transform:capitalize;">${inquiry.status.replace(/_/g,' ')}</div>
        </div>
      </div>
      ${canEditItems ? `<div style="background:var(--blue-100);color:var(--blue-600);padding:9px 12px;border-radius:8px;font-size:12px;font-weight:500;margin-bottom:12px;">This inquiry hasn't been converted yet — you can still adjust quantities or remove items below.</div>` : ''}
      <table>

        <tbody id="inq-detail-items-body">
          ${(items||[]).map(it=>`<tr data-item-id="${it.id}">
            <td>${escapeHtml(it.product_brands?.products?.name||'—')}</td>
            <td>${escapeHtml(it.product_brands?.brands?.name||'—')}</td>
            <td class="mono">
              ${canEditItems
                ? `<input type="number" min="0.01" step="0.01" value="${it.qty}" data-item-id="${it.id}" class="inq-item-qty-input" style="width:70px;padding:5px 7px;border:1.5px solid var(--slate-200);border-radius:5px;font-family:var(--font-mono);font-size:12.5px;">`
                : Number(it.qty).toLocaleString()
              }
            </td>
            <td class="mono">${peso(it.unit_price)}</td>
            <td class="mono">${peso(it.line_total)}</td>
            ${canEditItems ? `<td><button class="icon-btn" style="width:26px;height:26px;" onclick="removeInquiryItem('${inquiry.id}','${it.id}')">${ICONS.x}</button></td>` : ''}
          </tr>`).join('')}
        </tbody>
      </table>
      <div style="text-align:right;margin-top:14px;font-size:15px;font-weight:700;color:var(--navy-900);">Total: <span id="inq-detail-total">${peso(inquiry.total_amount)}</span></div>
    </div>
    <div class="modal-footer">
      ${canEditItems ? `<button class="btn btn-secondary" id="inq-save-qty-btn" onclick="saveInquiryItemQuantities('${inquiry.id}')">Save Quantity Changes</button>` : ''}
      ${canConvert ? `<button class="btn btn-primary" onclick="convertInquiryToPurchase('${inquiry.id}', this)">Convert to Purchase (Deduct Stock)</button>` : ''}

async function removeInquiryItem(inquiryId, itemId){
  const ok = await confirmDialog('Remove this item from the inquiry?', {danger:true, okLabel:'Remove'});
  if(!ok) return;
  const { error } = await sb.from('inquiry_items').delete().eq('id', itemId);
  if(error){ toast('Failed to remove item: ' + error.message, 'error'); return; }
  toast('Item removed.', 'success');
  viewInquiryDetail(inquiryId);
}

async function saveInquiryItemQuantities(inquiryId){
  const inputs = document.querySelectorAll('.inq-item-qty-input');
  const btn = document.getElementById('inq-save-qty-btn');
  btn.disabled = true; btn.textContent = 'Saving...';

  let hadError = false;
  for(const input of inputs){
    const qty = parseFloat(input.value);
    if(!qty || qty <= 0){
      toast('All quantities must be greater than zero.', 'error');
      hadError = true;
      break;
    }
    const { error } = await sb.from('inquiry_items').update({ qty }).eq('id', input.dataset.itemId);
    if(error){ toast('Failed to update an item: ' + error.message, 'error'); hadError = true; break; }
  }

  btn.disabled = false; btn.textContent = 'Save Quantity Changes';

  if(!hadError){
    toast('Quantities updated.', 'success');
    viewInquiryDetail(inquiryId);
    refreshInquiryList();
  }
}

async function convertInquiryToPurchase(inquiryId, btn){
  const originalLabel = btn ? btn.textContent : null;
  if(btn){ btn.disabled = true; btn.textContent = 'Checking stock...'; }

  const { data: availability, error: checkErr } = await sb.rpc('check_inquiry_stock_availability', { p_inquiry_id: inquiryId });

  if(btn){ btn.disabled = false; btn.textContent = originalLabel; }

  if(checkErr){ toast('Could not check stock availability: ' + checkErr.message, 'error'); return; }

  const allSufficient = (availability||[]).every(a => a.is_sufficient);

  if(allSufficient){
    // Everything's available — go straight to the usual confirmation.
    const ok = await confirmDialog('Convert this inquiry to a purchase? This will deduct stock using FIFO and cannot be undone.', {okLabel:'Convert to Purchase'});
    if(!ok) return;
    await doConvertInquiry(inquiryId);
    return;
  }

  // Some items are short — show exactly what's available vs requested,
  // and let the sales agent decide (fix quantities, talk to the customer,
  // or cancel) rather than silently partial-converting or failing midway.
  openModal(`
    <div class="modal-header"><h3>${ICONS.alert} Stock Check Before Converting</h3><button class="icon-btn" onclick="closeModal()">${ICONS.x}</button></div>
    <div class="modal-body">
      <div style="background:var(--red-100);color:var(--red-600);padding:12px 14px;border-radius:8px;font-size:12.5px;font-weight:500;margin-bottom:16px;">
        One or more items no longer have enough stock to fulfill this inquiry as-is. This can happen if stock was sold to someone else since this inquiry was created. Adjust the quantities on the inquiry, or check with the customer, before converting.
      </div>
      <table>
        <thead><tr><th>Product</th><th>Brand</th><th>Requested</th><th>Available Now</th><th>Status</th></tr></thead>
        <tbody>
          ${(availability||[]).map(a=>`<tr ${!a.is_sufficient?'style="background:var(--red-100);"':''}>
            <td>${escapeHtml(a.product_name)}</td>
            <td>${escapeHtml(a.brand_name)}</td>
            <td class="mono">${Number(a.requested_qty).toLocaleString()}</td>
            <td class="mono" style="font-weight:700;${!a.is_sufficient?'color:var(--red-600);':''}">${Number(a.available_qty).toLocaleString()}</td>
            <td>${a.is_sufficient ? `<span class="badge badge-green">OK</span>` : `<span class="badge badge-red">Short by ${(a.requested_qty - a.available_qty).toLocaleString()}</span>`}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Close & Adjust Inquiry</button>
    </div>
  `, {large:true});
}

async function doConvertInquiry(inquiryId){
  const { error } = await sb.rpc('convert_inquiry_to_purchase', { p_inquiry_id: inquiryId });
  if(error){ toast('Conversion failed: ' + error.message, 'error'); return; }
  toast('Inquiry converted to purchase. Stock deducted via FIFO.', 'success');
  closeModal();
  refreshInquiryList();
}

async function cancelInquiry(inquiryId){
  const ok = await confirmDialog('Cancel this inquiry?', {danger:true, okLabel:'Cancel Inquiry'});
  if(!ok) return;
  const { error } = await sb.from('inquiries').update({ status:'cancelled' }).eq('id', inquiryId);
  if(error){ toast('Failed: '+error.message,'error'); return; }
  toast('Inquiry cancelled.', 'info');
  closeModal();
  refreshInquiryList();
}

async function submitNewPO(){
  if(NEW_PO_ITEMS.length===0){ toast('Add at least one item.', 'error'); return; }
  const supplierId = document.getElementById('po-supplier').value;
  const expectedDate = document.getElementById('po-expected-date').value || null;
  const btn = document.getElementById('po-submit');
  btn.disabled = true; btn.textContent = 'Creating...';

  const { data: poNumber } = await sb.rpc('generate_po_number');

  const { data: po, error: poErr } = await sb.from('purchase_orders').insert({
    po_number: poNumber, supplier_id: supplierId, branch_id: STATE.currentBranch,
    status: 'submitted', expected_delivery_date: expectedDate, created_by: STATE.profile.id
  }).select().single();

  if(poErr){ toast('Failed: '+poErr.message,'error'); btn.disabled=false; btn.textContent='Create Purchase Order'; return; }

  const items = NEW_PO_ITEMS.map(it => ({ purchase_order_id: po.id, product_brand_id: it.product_brand_id, qty_ordered: it.qty, unit_cost: it.unit_cost }));
  const { error: itemsErr } = await sb.from('purchase_order_items').insert(items);

  if(itemsErr){ toast('PO created but items failed: '+itemsErr.message, 'error'); }
  else { toast(`Purchase order ${poNumber} created.`, 'success'); }

  closeModal();
  refreshPOList();
}

async function viewPODetail(poId){
  const { data: po } = await sb.from('purchase_orders').select('*, suppliers(*)').eq('id', poId).single();
  const { data: items } = await sb.from('purchase_order_items').select('*, product_brands(*, products(name,sku), brands(name))').eq('purchase_order_id', poId);

  const canApprove = can(['admin','inventory_manager','supplier_manager']) && po.status==='submitted';
  const canReceive = can(['admin','inventory_manager']) && ['approved','partially_received'].includes(po.status);

  openModal(`
    <div class="modal-header"><h3>${escapeHtml(po.po_number)}</h3><button class="icon-btn" onclick="closeModal()">${ICONS.x}</button></div>
    <div class="modal-body">
      <div style="font-size:13px;margin-bottom:14px;color:var(--slate-500);">Supplier: <strong style="color:var(--navy-900);">${escapeHtml(po.suppliers?.company_name)}</strong> • Status: <strong style="text-transform:capitalize;color:var(--navy-900);">${po.status.replace(/_/g,' ')}</strong></div>
      <table>
        <thead><tr><th>Product</th><th>Brand</th><th>Ordered</th><th>Received</th><th>Unit Cost</th><th>Subtotal</th>${canReceive?'<th></th>':''}</tr></thead>
        <tbody>
          ${(items||[]).map(it=>{
            const pending = it.qty_ordered - it.qty_received;
            return `<tr>
              <td>${escapeHtml(it.product_brands?.products?.name||'—')}</td>
              <td>${escapeHtml(it.product_brands?.brands?.name||'—')}</td>
              <td class="mono">${Number(it.qty_ordered).toLocaleString()}</td>
              <td class="mono">${Number(it.qty_received).toLocaleString()}</td>
              <td class="mono">${peso(it.unit_cost)}</td>
              <td class="mono">${peso(it.line_total)}</td>
              ${canReceive ? `<td>${pending>0 ? `<button class="btn btn-secondary btn-sm" onclick="receivePOItemPrompt('${it.id}', ${pending})">Receive</button>` : `<span class="badge badge-green">Done</span>`}</td>` : ''}
            </tr>`;
          }).join('')}
        </tbody>
      </table>
      <div style="text-align:right;margin-top:14px;font-size:15px;font-weight:700;color:var(--navy-900);">Total: ${peso(po.total_amount)}</div>
    </div>
    <div class="modal-footer">
      ${canApprove ? `<button class="btn btn-primary" onclick="approvePO('${po.id}')">Approve PO</button>` : ''}
      ${can(['admin']) && po.status!=='received' && po.status!=='cancelled' ? `<button class="btn btn-danger" onclick="cancelPO('${po.id}')">Cancel PO</button>` : ''}
    </div>
  `, {large:true});
}

async function approvePO(poId){
  const { error } = await sb.from('purchase_orders').update({ status:'approved', approved_by: STATE.profile.id, approved_at: new Date().toISOString() }).eq('id', poId);
  if(error){ toast('Failed: '+error.message,'error'); return; }
  toast('Purchase order approved.', 'success');
  closeModal(); refreshPOList();
}
async function cancelPO(poId){
  const ok = await confirmDialog('Cancel this purchase order?', {danger:true, okLabel:'Cancel PO'});
  if(!ok) return;
  const { error } = await sb.from('purchase_orders').update({ status:'cancelled' }).eq('id', poId);
  if(error){ toast('Failed: '+error.message,'error'); return; }
  toast('Purchase order cancelled.', 'info');
  closeModal(); refreshPOList();
}
async function receivePOItemPrompt(poItemId, maxQty){
  const qty = await promptDialog(`Enter quantity received (maximum ${maxQty}).`, {
    type: 'number',
    defaultValue: maxQty,
    min: 0,
    max: maxQty,
    okLabel: 'Receive',
    validate: (val)=>{
      if(val==='') return 'Please enter a quantity.';
      const n = parseFloat(val);
      if(isNaN(n) || n<=0) return 'Enter a quantity greater than zero.';
      if(n>maxQty) return `Cannot exceed ${maxQty} (the pending quantity).`;
      return null;
    }
  });
  if(qty===null) return;
  receivePOItem(poItemId, parseFloat(qty));
}
async function receivePOItem(poItemId, qty){
  const { error } = await sb.rpc('receive_po_item', { p_po_item_id: poItemId, p_qty_received: qty });
  if(error){ toast('Failed: '+error.message,'error'); return; }
  toast('Stock received and FIFO batch created.', 'success');
  closeModal();
  refreshPOList();
}
