<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TDMH Queuing System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
<style>
/* ── RESET & BASE ─────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#0ea5e9;--brand-dark:#0369a1;--brand-light:#e0f2fe;
  --sidebar:#0f172a;--bg:#f1f5f9;--surface:#fff;
  --border:#e2e8f0;--text:#1e293b;--muted:#64748b;--subtle:#94a3b8;
  --success:#10b981;--warning:#f59e0b;--danger:#ef4444;--purple:#8b5cf6;
  --radius:10px;--radius-lg:14px;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 12px rgba(0,0,0,.1);--shadow-lg:0 10px 30px rgba(0,0,0,.15);
  --sidebar-w:232px;
}
html,body,#root{height:100%}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}

/* ── LAYOUT ───────────────────────────────────────────── */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--sidebar);display:flex;flex-direction:column;overflow:hidden}
.main{flex:1;overflow-y:auto;overflow-x:hidden}

/* ── SIDEBAR ──────────────────────────────────────────── */
.sidebar-logo{padding:16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:var(--brand);border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:15px;flex-shrink:0}
.logo-title{color:#fff;font-weight:700;font-size:13px;line-height:1.3}
.logo-sub{color:#475569;font-size:11px}
.sidebar-nav{flex:1;padding:10px 8px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:#94a3b8;font-size:13px;font-weight:500;transition:all .15s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{color:#fff;background:rgba(255,255,255,.08)}
.nav-item.active{color:#fff;background:var(--brand)}
.nav-item svg{width:16px;height:16px;flex-shrink:0}
.nav-section{padding:10px 12px 4px;font-size:10px;font-weight:700;color:#334155;text-transform:uppercase;letter-spacing:.08em}
.nav-sub{margin-left:16px;padding-left:12px;border-left:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;gap:2px}
.nav-sub .nav-item{font-size:12px;padding:7px 10px}
.sidebar-user{padding:10px 8px;border-top:1px solid rgba(255,255,255,.08)}
.user-card{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;background:rgba(255,255,255,.05)}
.user-avatar{width:30px;height:30px;border-radius:50%;background:var(--brand-dark);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:11px;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{color:#fff;font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{color:#64748b;font-size:11px;text-transform:capitalize}
.user-logout{color:#475569;cursor:pointer;padding:4px;border-radius:5px;transition:color .15s;background:none;border:none;display:flex}
.user-logout:hover{color:#fff}

/* ── PAGE HEADER ─────────────────────────────────────── */
.page-header{padding:20px 24px 0}
.page-title{font-size:18px;font-weight:800;color:var(--text)}
.page-sub{color:var(--muted);font-size:13px;margin-top:2px}

/* ── CARD ────────────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow)}
.card-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:700;color:var(--text)}

/* ── BUTTONS ─────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;border:none;white-space:nowrap}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn:active:not(:disabled){transform:scale(.97)}
.btn-primary{background:var(--brand);color:#fff}
.btn-primary:hover:not(:disabled){background:var(--brand-dark)}
.btn-secondary{background:#fff;color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover:not(:disabled){background:#f8fafc}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover:not(:disabled){background:#059669}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover:not(:disabled){background:#dc2626}
.btn-ghost{background:transparent;color:var(--muted);padding:5px 8px}
.btn-ghost:hover{background:#f1f5f9;color:var(--text)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{padding:6px;border-radius:7px}
.btn-full{width:100%}

/* ── FORM ────────────────────────────────────────────── */
.input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;color:var(--text);background:#fff;transition:border .15s,box-shadow .15s;outline:none}
.input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(14,165,233,.12)}
.input::placeholder{color:var(--subtle)}
.label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.form-group{display:flex;flex-direction:column;gap:0}
select.input{cursor:pointer}
textarea.input{resize:none}

/* ── BADGES ──────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-waiting{background:#fef3c7;color:#92400e;border:1px solid #fde68a}
.badge-serving{background:#d1fae5;color:#065f46;border:1px solid #a7f3d0}
.badge-completed{background:#f1f5f9;color:#475569;border:1px solid var(--border)}
.badge-held{background:#ede9fe;color:#5b21b6;border:1px solid #ddd6fe}
.badge-removed{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
.badge-role-admin{background:#ede9fe;color:#6d28d9}
.badge-role-manager{background:#dbeafe;color:#1e40af}
.badge-role-staff{background:#f1f5f9;color:#475569}

/* ── QUEUE NUMBER ────────────────────────────────────── */
.qnum{font-family:'JetBrains Mono',monospace;font-weight:700;letter-spacing:.03em}

/* ── TOGGLE ──────────────────────────────────────────── */
.toggle{position:relative;width:40px;height:22px;border-radius:11px;background:#e2e8f0;border:none;cursor:pointer;transition:background .2s;flex-shrink:0;padding:0}
.toggle.on{background:var(--brand)}
.toggle-thumb{position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:left .2s}
.toggle.on .toggle-thumb{left:21px}

/* ── MODAL ───────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;animation:fadeIn .15s}
.modal{background:#fff;border-radius:18px;box-shadow:var(--shadow-lg);width:100%;max-width:480px;max-height:90vh;overflow-y:auto;animation:slideUp .2s}
.modal-header{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1;border-radius:18px 18px 0 0}
.modal-title{font-size:16px;font-weight:800}
.modal-sub{font-size:12px;color:var(--muted);margin-top:2px}
.modal-body{padding:20px}
.modal-footer{display:flex;gap:8px;padding-top:16px;border-top:1px solid var(--border);margin-top:16px}

/* ── WORKSPACE ───────────────────────────────────────── */
.workspace{display:flex;height:100vh;overflow:hidden}
.ws-left{width:300px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;background:#fff}
.ws-right{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#f8fafc}
.ws-header{padding:10px 12px;border-bottom:1px solid var(--border)}
.ws-tabs{display:flex;background:#f1f5f9;border-radius:8px;padding:3px;gap:2px}
.ws-tab{flex:1;padding:6px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;border:none;background:none;display:flex;align-items:center;justify-content:center;gap:5px;color:var(--muted)}
.ws-tab.active{background:#fff;color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.tab-count{padding:1px 6px;border-radius:10px;font-size:11px;font-weight:700}
.ws-tab.active .tab-count{background:var(--brand);color:#fff}
.ws-tab:not(.active) .tab-count{background:#e2e8f0;color:var(--muted)}
.ws-list{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px}
.ws-footer{padding:10px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
.queue-card{padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s;position:relative;background:#fff}
.queue-card:hover{border-color:#94a3b8;box-shadow:var(--shadow)}
.queue-card.selected{border-color:var(--brand);background:#f0f9ff;box-shadow:0 0 0 3px rgba(14,165,233,.1)}
.queue-card.priority{border-color:#f59e0b}
.queue-card.held{background:#faf5ff}
.qc-top{display:flex;align-items:flex-start;justify-content:space-between}
.qc-num{font-size:14px}
.qc-service{font-size:11px;font-weight:600}
.qc-name{font-size:12px;color:var(--muted);margin-top:2px}
.qc-time{font-size:11px;color:var(--subtle);margin-top:1px}
.qc-menu-btn{padding:4px;border-radius:5px;cursor:pointer;color:var(--subtle);background:none;border:none;transition:all .15s}
.qc-menu-btn:hover{background:#f1f5f9;color:var(--text)}
.dropdown{position:absolute;right:8px;top:34px;background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow-md);z-index:50;min-width:180px;padding:4px;overflow:hidden}
.dropdown-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text);border:none;background:none;width:100%;text-align:left;transition:background .12s}
.dropdown-item:hover{background:#f8fafc}
.dropdown-item.danger{color:var(--danger)}
.dropdown-item.danger:hover{background:#fff5f5}
.dropdown-divider{height:1px;background:var(--border);margin:3px 0}
/* Detail panel */
.detail-panel{display:flex;flex:1;overflow:hidden}
.detail-main{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px}
.detail-sidebar{width:220px;border-left:1px solid var(--border);overflow-y:auto;background:#fff}
.detail-actions{padding:12px;background:#fff;border-top:1px solid var(--border);display:flex;gap:6px}
.big-qnum{font-family:'JetBrains Mono',monospace;font-size:56px;font-weight:900;letter-spacing:.02em;line-height:1;text-align:center}
.timeline-dot{width:8px;height:8px;border-radius:50%;background:var(--brand);flex-shrink:0;margin-top:4px}
.step-circle{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
/* Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;color:var(--muted)}
.empty-icon{width:48px;height:48px;border-radius:50%;background:#f1f5f9;display:flex;align-items:center;justify-content:center;margin-bottom:12px}

/* ── WINDOW SELECT ───────────────────────────────────── */
.window-select{display:flex;align-items:center;justify-content:center;height:100vh;padding:24px}
.window-card{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:12px 16px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:space-between;gap:12px}
.window-card:hover{border-color:var(--brand);background:#f0f9ff}

/* ── DASHBOARD ───────────────────────────────────────── */
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:16px 24px 0}
.kpi-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;display:flex;align-items:flex-start;justify-content:space-between}
.kpi-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.kpi-value{font-size:30px;font-weight:800;color:var(--text);line-height:1}
.kpi-sub{font-size:11px;color:var(--subtle);margin-top:4px}
.kpi-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── TV DISPLAY ──────────────────────────────────────── */
.tv{min-height:100vh;background:#0f172a;color:#fff;display:flex;flex-direction:column}
.tv-header{background:#1e293b;border-bottom:1px solid rgba(255,255,255,.08);padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
.tv-body{flex:1;display:flex;overflow:hidden}
.tv-main{flex:1;padding:28px;overflow-y:auto}
.tv-sidebar{width:260px;border-left:1px solid rgba(255,255,255,.08);padding:20px;overflow-y:auto}
.tv-qcard{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:20px;text-align:center;transition:all .3s}
.tv-qcard.new-item{animation:tvPop .4s ease}
.tv-qnum{font-family:'JetBrains Mono',monospace;font-size:60px;font-weight:900;line-height:1}
.tv-footer{background:var(--brand);padding:10px 32px;display:flex;align-items:center;gap:12px}

/* ── MONITORING ──────────────────────────────────────── */
.monitor-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 24px}
.monitor-tab{padding:10px 14px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none}
.monitor-tab.active{color:var(--brand);border-bottom-color:var(--brand)}
.bar-wrap{height:14px;background:#f1f5f9;border-radius:7px;overflow:hidden;flex:1}
.bar-fill{height:100%;border-radius:7px;background:var(--brand);transition:width .4s ease}

/* ── TABLE ───────────────────────────────────────────── */
.table{width:100%;border-collapse:collapse}
.table th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;background:#f8fafc;border-bottom:1px solid var(--border)}
.table td{padding:10px 14px;border-bottom:1px solid #f8fafc;font-size:13px;color:var(--text)}
.table tr:last-child td{border-bottom:none}
.table tr:hover td{background:#f8fafc}

/* ── SETTINGS ────────────────────────────────────────── */
.settings-layout{display:flex;height:100vh;overflow:hidden}
.settings-list{width:240px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:#fff}
.settings-detail{flex:1;overflow-y:auto;padding:24px}
.settings-item{padding:10px 14px;cursor:pointer;font-size:13px;font-weight:500;transition:all .12s;display:flex;align-items:center;justify-content:space-between;border-left:3px solid transparent}
.settings-item:hover{background:#f8fafc}
.settings-item.active{background:#f0f9ff;color:var(--brand);border-left-color:var(--brand);font-weight:600}
.settings-item-sub{font-size:11px;color:var(--subtle);margin-top:1px}

/* ── ALERTS / TOASTS ─────────────────────────────────── */
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--sidebar);color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);animation:slideUp .2s ease;pointer-events:all;max-width:300px;display:flex;align-items:center;gap:8px}
.toast.success{background:#064e3b;border-left:3px solid var(--success)}
.toast.error{background:#7f1d1d;border-left:3px solid var(--danger)}
.toast.info{background:#0c4a6e;border-left:3px solid var(--brand)}

/* ── REALTIME PULSE ──────────────────────────────────── */
.rt-dot{width:8px;height:8px;border-radius:50%;background:var(--success);position:relative}
.rt-dot::after{content:'';position:absolute;inset:-3px;border-radius:50%;background:var(--success);opacity:.3;animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.3}50%{transform:scale(1.5);opacity:0}}

/* ── ANIMATIONS ──────────────────────────────────────── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes tvPop{0%{transform:scale(.92);opacity:0}60%{transform:scale(1.03)}100%{transform:scale(1);opacity:1}}
@keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:slideUp .18s ease forwards}

/* ── KIOSK ───────────────────────────────────────────── */
.kiosk{min-height:100vh;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0f172a 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;color:#fff;position:relative;overflow:hidden}
.kiosk-bg{position:absolute;inset:0;background-image:radial-gradient(circle at 2px 2px,rgba(255,255,255,.03) 1px,transparent 0);background-size:32px 32px}
.kiosk-logo{width:72px;height:72px;background:var(--brand);border-radius:18px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:32px;margin-bottom:16px;box-shadow:0 8px 32px rgba(14,165,233,.4)}
.kiosk-title{font-size:28px;font-weight:900;text-align:center;margin-bottom:6px}
.kiosk-sub{color:#64748b;font-size:14px;text-align:center;margin-bottom:40px}
.kiosk-services{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;width:100%;max-width:900px;margin-bottom:32px}
.kiosk-svc-btn{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:16px;padding:24px 16px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:10px;color:#fff}
.kiosk-svc-btn:hover{background:rgba(14,165,233,.15);border-color:var(--brand);transform:translateY(-3px);box-shadow:0 8px 24px rgba(14,165,233,.2)}
.kiosk-svc-btn:active{transform:scale(.97)}
.kiosk-svc-dot{width:14px;height:14px;border-radius:50%}
.kiosk-svc-name{font-size:14px;font-weight:700;text-align:center;line-height:1.3}
.kiosk-ticket{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:100;animation:fadeIn .2s}
.kiosk-ticket-card{background:#fff;border-radius:24px;padding:48px 40px;text-align:center;max-width:360px;width:100%;animation:tvPop .35s ease}
.kiosk-ticket-num{font-family:'JetBrains Mono',monospace;font-size:72px;font-weight:900;line-height:1;margin:12px 0}
.kiosk-ticket-dismiss{background:var(--brand);color:#fff;border:none;padding:14px 40px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:24px;transition:all .15s}
.kiosk-ticket-dismiss:hover{background:var(--brand-dark)}

/* ── MISC ────────────────────────────────────────────── */
.divider{height:1px;background:var(--border);margin:12px 0}
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-2{gap:8px}.gap-3{gap:12px}.flex-1{flex:1}.min-w-0{min-width:0}
.text-xs{font-size:11px}.text-sm{font-size:13px}.font-bold{font-weight:700}.font-semibold{font-weight:600}
.text-muted{color:var(--muted)}.text-subtle{color:var(--subtle)}.text-brand{color:var(--brand)}.text-success{color:var(--success)}.text-danger{color:var(--danger)}
.truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.space-y-2>*+*{margin-top:8px}.space-y-3>*+*{margin-top:12px}.space-y-4>*+*{margin-top:16px}
.p-4{padding:16px}.p-5{padding:20px}.p-6{padding:24px}.px-4{padding-left:16px;padding-right:16px}
.mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.rounded-full{border-radius:999px}

const today = () => new Date().toISOString().slice(0,10)
const fmt = (dt, f='short') => {
  if (!dt) return '—'
  const d = new Date(dt)
  if (f === 'time') return d.toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit',hour12:true})
  if (f === 'datetime') return d.toLocaleDateString('en-PH',{month:'2-digit',day:'2-digit',year:'numeric'}) + ' - ' + d.toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit',hour12:true})
  if (f === 'short') {
    const mins = Math.floor((Date.now()-d)/60000)
    if (mins < 1) return 'just now'
    if (mins < 60) return `${mins}m ago`
    return `${Math.floor(mins/60)}h ${mins%60}m ago`
  }
  if (f === 'mins') {
    const mins = Math.floor((Date.now()-d)/60000)
    return `${Math.floor(mins/60).toString().padStart(2,'0')}:${(mins%60).toString().padStart(2,'0')}:00`
  }
}
const waitMins = (start, end) => {
  if (!start) return '—'
  const ms = (end ? new Date(end) : new Date()) - new Date(start)
  const m = Math.floor(ms/60000)
  return m < 60 ? `${m} minute${m!==1?'s':''}` : `${Math.floor(m/60)}h ${m%60}m`
}

// ─────────────────────────────────────────────────────────────
// TOAST CONTEXT
// ─────────────────────────────────────────────────────────────
const ToastCtx = React.createContext(null)
function ToastProvider({children}) {
  const [toasts, setToasts] = React.useState([])
  const add = React.useCallback((msg, type='info') => {
    const id = Date.now()
    setToasts(t => [...t, {id,msg,type}])
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3000)
  }, [])
  return (
    <ToastCtx.Provider value={add}>
      {children}
      <div className="toast-wrap">
        {toasts.map(t => (
          <div key={t.id} className={`toast ${t.type}`}>
            {t.type==='success' && <Icon n="check" s={14}/>}
            {t.type==='error' && <Icon n="x" s={14}/>}
            {t.type==='info' && <Icon n="bell" s={14}/>}
            {t.msg}
          </div>
        ))}
      </div>
    </ToastCtx.Provider>
  )
}
const useToast = () => React.useContext(ToastCtx)

function useAuth() {
  const [user, setUser] = React.useState(null)
  const [profile, setProfile] = React.useState(null)
  const [loading, setLoading] = React.useState(true)

  const fetchProfile = async (u) => {
    const {data} = await sb.from('profiles').select('*').eq('id', u.id).single()
    setProfile(data); setUser(u)
  }
  React.useEffect(() => {
    sb.auth.getSession().then(({data:{session}}) => {
      if (session?.user) fetchProfile(session.user).finally(() => setLoading(false))
      else setLoading(false)
    })
    const {data:{subscription}} = sb.auth.onAuthStateChange((e,s) => {
      if (e==='SIGNED_IN' && s?.user) fetchProfile(s.user)
      else if (e==='SIGNED_OUT') { setUser(null); setProfile(null) }
    })
    return () => subscription.unsubscribe()
  }, [])

  const login = (email, password) => sb.auth.signInWithPassword({email,password})
  const logout = async () => {
    if (user) await sb.from('staff_sessions').update({is_online:false}).eq('user_id',user.id)
    await sb.auth.signOut()
  }
  const isAdmin = () => ['admin','manager'].includes(profile?.role)
  return {user, profile, loading, login, logout, isAdmin}
}

// DASHBOARD
// ─────────────────────────────────────────────────────────────
function Dashboard({profile}) {
  const [stats,setStats] = React.useState({ongoing:0,serving:0,total:0,completed:0,removed:0,avgWait:null})
  const [services,setServices] = React.useState([])
  const [activeWindows,setActiveWindows] = React.useState([])

  React.useEffect(()=>{ load(); const t=setInterval(load,30000); return()=>clearInterval(t) },[])

  const load = async () => {
    const [{data:queues},{data:sessions}] = await Promise.all([
      sb.from('queues').select('status,service_id,waiting_start,serving_start,completed_at,services(name,color)').eq('date',today()),
      sb.from('staff_sessions').select('*,profiles(first_name,last_name),windows(name)').eq('is_online',true)
    ])
    if (queues) {
      const waiting=queues.filter(q=>q.status==='waiting').length
      const serving=queues.filter(q=>q.status==='serving').length
      const completed=queues.filter(q=>q.status==='completed').length
      const removed=queues.filter(q=>q.status==='removed').length
      const withWait=queues.filter(q=>q.serving_start&&q.waiting_start)
      const avgWait=withWait.length ? Math.round(withWait.reduce((s,q)=>s+(new Date(q.serving_start)-new Date(q.waiting_start)),0)/withWait.length/60000) : null
      setStats({ongoing:waiting,serving,total:queues.length,completed,removed,avgWait})
      const sm={}
      queues.forEach(q=>{
        const n=q.services?.name||'?'; const c=q.services?.color||'#0ea5e9'
        if(!sm[n]) sm[n]={name:n,color:c,ongoing:0,serving:0,served:0}
        if(q.status==='waiting') sm[n].ongoing++
        if(q.status==='serving') sm[n].serving++
        if(q.status==='completed') sm[n].served++
      })
      setServices(Object.values(sm).filter(s=>s.ongoing+s.serving+s.served>0).sort((a,b)=>(b.ongoing+b.serving+b.served)-(a.ongoing+a.serving+a.served)))
    }
    setActiveWindows(sessions||[])
  }

  const greet = () => { const h=new Date().getHours(); return h<12?'Good morning':h<18?'Good afternoon':'Good evening' }
  const now = new Date()

  return (
    <div>
      <div className="page-header" style={{paddingBottom:'0'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <h1 className="page-title">{greet()}, {profile?.first_name}! 👋</h1>
            <p className="page-sub">{now.toLocaleDateString('en-PH',{weekday:'long',year:'numeric',month:'long',day:'numeric'})} · {now.toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit',hour12:true})}</p>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:'6px',background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:'20px',padding:'5px 12px'}}>
            <div className="rt-dot"/>
            <span style={{fontSize:'12px',fontWeight:600,color:'#15803d'}}>Live</span>
          </div>
        </div>
      </div>

      <div className="kpi-grid" style={{marginTop:'16px'}}>
        {[
          {label:'Ongoing',val:stats.ongoing,sub:stats.avgWait!=null?`Avg. wait: ${stats.avgWait} min`:'Avg. wait: —',ic:'clock',bg:'#fef3c7',c:'#d97706'},
          {label:'Currently Serving',val:stats.serving,sub:'Active right now',ic:'workspace',bg:'#e0f2fe',c:'var(--brand)'},
          {label:'Total Served',val:stats.total,sub:`${stats.completed} completed`,ic:'users',bg:'#d1fae5',c:'var(--success)'},
        ].map(k=>(
          <div key={k.label} className="kpi-card">
            <div>
              <div className="kpi-label">{k.label}</div>
              <div className="kpi-value">{k.val}</div>
              <div className="kpi-sub">{k.sub}</div>
            </div>
            <div className="kpi-icon" style={{background:k.bg,color:k.c}}><Icon n={k.ic} s={18}/></div>
          </div>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'8px',padding:'8px 24px 0'}}>
        {[['Completed',stats.completed,'success'],['Removed',stats.removed,'danger'],['Cancelled',0,'subtle']].map(([l,v,c])=>(
          <div key={l} className="card" style={{padding:'12px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <span style={{fontSize:'13px',fontWeight:600,color:`var(--${c})`}}>{l}</span>
            <span style={{fontSize:'22px',fontWeight:800}}>{v}</span>
          </div>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',padding:'12px 24px 24px'}}>
        <div className="card">
          <div className="card-header">
            <span className="card-title">Occupied Windows</span>
            <span style={{fontSize:'11px',color:'var(--success)',fontWeight:600}}>{activeWindows.length} Online</span>
          </div>
          <div style={{padding:'8px',maxHeight:'260px',overflowY:'auto'}}>
            {activeWindows.length===0 && <div className="empty-state" style={{padding:'20px'}}><p style={{fontSize:'13px'}}>No active windows</p></div>}
            {activeWindows.map(s=>(
              <div key={s.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'9px 10px',borderRadius:'8px',marginBottom:'2px',background:'#f8fafc'}}>
                <div>
                  <div style={{fontWeight:600,fontSize:'13px'}}>{s.windows?.name||'—'}</div>
                  <div style={{fontSize:'11px',color:'var(--muted)',marginTop:'1px'}}>{s.profiles?.first_name} {s.profiles?.last_name}</div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
                  <div className="online-dot"/>
                  <span style={{fontSize:'11px',color:'var(--success)',fontWeight:600}}>Online</span>
                </div>
              </div>
            ))}
          </div>
        </div>
        <div className="card">
          <div className="card-header"><span className="card-title">Services Today</span></div>
          <div style={{overflowY:'auto',maxHeight:'260px'}}>
            {services.length===0 && <div className="empty-state" style={{padding:'20px'}}><p>No queues today yet</p></div>}
            {services.length>0 && (
              <div style={{display:'grid',gridTemplateColumns:'1fr repeat(3,60px)',gap:'0',padding:'8px 14px 4px',fontSize:'10px',fontWeight:700,color:'var(--subtle)',textTransform:'uppercase',letterSpacing:'.05em'}}>
                <span>Service</span><span style={{textAlign:'center'}}>Wait</span><span style={{textAlign:'center'}}>Svc</span><span style={{textAlign:'center'}}>Done</span>
              </div>
            )}
            {services.map(s=>(
              <div key={s.name} style={{display:'grid',gridTemplateColumns:'1fr repeat(3,60px)',alignItems:'center',padding:'6px 14px',borderBottom:'1px solid #f8fafc'}}>
                <div style={{display:'flex',alignItems:'center',gap:'7px',minWidth:0}}>
                  <div className="color-dot" style={{background:s.color}}/>
                  <span style={{fontSize:'12px',fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.name}</span>
                </div>
                <span style={{textAlign:'center',fontSize:'12px',fontWeight:700,color:'#d97706'}}>{s.ongoing||'—'}</span>
                <span style={{textAlign:'center',fontSize:'12px',fontWeight:700,color:'var(--brand)'}}>{s.serving||'—'}</span>
                <span style={{textAlign:'center',fontSize:'12px',color:'var(--muted)'}}>{s.served||'—'}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  )
}

// ─────────────────────────────────────────────────────────────
// QUEUE WORKSPACE
// ─────────────────────────────────────────────────────────────
function QueueWorkspace({user, profile}) {
  const toast = useToast()
  const [windows, setWindows] = React.useState([])
  const [selWin, setSelWin] = React.useState(null)
  const [started, setStarted] = React.useState(false)
  const [ongoing, setOngoing] = React.useState([])
  const [serving, setServing] = React.useState([])
  const [selQ, setSelQ] = React.useState(null)
  const [tab, setTab] = React.useState('ongoing')
  const [search, setSearch] = React.useState('')
  const [filterMe, setFilterMe] = React.useState(false)
  const [showAdd, setShowAdd] = React.useState(false)
  const [showTransfer, setShowTransfer] = React.useState(null) // {type:'service'|'window'}
  const [dropMenu, setDropMenu] = React.useState(null)
  const channelRef = React.useRef(null)

  React.useEffect(()=>{ loadWindows() },[])

  // ── REALTIME: surgical updates, no full refetch ────────────
  React.useEffect(()=>{
    if (!selWin) return
    channelRef.current?.unsubscribe()

    const svcIds = selWin.window_services?.map(ws=>ws.service_id)||[]

    const ch = sb.channel(`qs-win-${selWin.id}`)
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'queues'},payload=>{
        const q = payload.new
        if (!svcIds.includes(q.service_id)) return
        if (q.date !== today()) return
        // Fetch full record with joins
        sb.from('queues').select('*,services(name,prefix,color),windows(name),profiles(first_name,last_name)').eq('id',q.id).single().then(({data})=>{
          if (!data) return
          if (data.status==='waiting'||data.status==='held') setOngoing(p=>[...p,data])
          if (data.status==='serving') setServing(p=>[...p,data])
        })
      })
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'queues'},payload=>{
        const q = payload.new
        if (!svcIds.includes(q.service_id) && q.date!==today()) return
        // Fetch full record then surgically update state
        sb.from('queues').select('*,services(name,prefix,color),windows(name),profiles(first_name,last_name)').eq('id',q.id).single().then(({data})=>{
          if (!data) return
          const active=['waiting','held']
          setOngoing(p=>{
            const exists = p.find(x=>x.id===q.id)
            if (active.includes(data.status)) {
              return exists ? p.map(x=>x.id===q.id?data:x) : [...p,data]
            }
            return p.filter(x=>x.id!==q.id)
          })
          setServing(p=>{
            const exists = p.find(x=>x.id===q.id)
            if (data.status==='serving') {
              return exists ? p.map(x=>x.id===q.id?data:x) : [...p,data]
            }
            return p.filter(x=>x.id!==q.id)
          })
          // Update selected queue if it's the one that changed
          setSelQ(prev=>prev?.id===q.id ? data : prev)
        })
      })
      .subscribe()

    channelRef.current = ch
    loadQueues()

    return () => ch.unsubscribe()
  },[selWin?.id])

  // Close dropdown when clicking outside
  React.useEffect(()=>{
    const close = ()=>setDropMenu(null)
    window.addEventListener('click',close)
    return ()=>window.removeEventListener('click',close)
  },[])

  const loadWindows = async () => {
    if (['admin','manager'].includes(profile?.role)) {
      const {data} = await sb.from('windows').select('*,window_services(service_id)').eq('is_active',true).order('name')
      setWindows(data||[])
    } else {
      const {data} = await sb.from('window_staff').select('windows(*,window_services(service_id))').eq('user_id',user.id)
      setWindows(data?.map(d=>d.windows).filter(Boolean)||[])
    }
  }

  const loadQueues = async () => {
    if (!selWin) return
    const svcIds = selWin.window_services?.map(ws=>ws.service_id)||[]
    if (!svcIds.length) return
    const {data} = await sb.from('queues')
      .select('*,services(name,prefix,color),windows(name),profiles(first_name,last_name)')
      .eq('date',today())
      .in('service_id',svcIds)
      .in('status',['waiting','serving','held'])
      .order('created_at')
    setOngoing((data||[]).filter(q=>q.status==='waiting'||q.status==='held'))
    setServing((data||[]).filter(q=>q.status==='serving'))
  }

  const selectWindow = async w => {
    setSelWin(w); setStarted(true)
    await sb.from('staff_sessions').upsert({user_id:user.id,window_id:w.id,is_online:true,last_heartbeat:new Date().toISOString()},{onConflict:'user_id'})
    // Heartbeat every 2 mins
    const hb = setInterval(async ()=> {
      await sb.from('staff_sessions').upsert({user_id:user.id,window_id:w.id,is_online:true,last_heartbeat:new Date().toISOString()},{onConflict:'user_id'})
    },120000)
    window._hb = hb
  }

  const leaveWindow = async () => {
    clearInterval(window._hb)
    await sb.from('staff_sessions').upsert({user_id:user.id,window_id:null,is_online:true,last_heartbeat:new Date().toISOString()},{onConflict:'user_id'})
    setStarted(false); setSelWin(null); setSelQ(null); channelRef.current?.unsubscribe()
  }

  const logTimeline = (qid,action,fromS,toS,extra={}) =>
    sb.from('queue_timeline').insert({queue_id:qid,action,from_status:fromS,to_status:toS,performed_by:user.id,...extra})

  const serveQueue = async q => {
    await sb.from('queues').update({status:'serving',window_id:selWin.id,served_by:user.id,serving_start:new Date().toISOString()}).eq('id',q.id)
    await logTimeline(q.id,'serve',q.status,'serving')
    setTab('serving'); toast('Queue served!','success')
  }

  const completeQueue = async q => {
    await sb.from('queues').update({status:'completed',completed_at:new Date().toISOString()}).eq('id',q.id)
    await logTimeline(q.id,'complete','serving','completed')
    setSelQ(null); toast('Queue completed!','success')
  }

  const removeQueue = async (q,reason='') => {
    await sb.from('queues').update({status:'removed'}).eq('id',q.id)
    await logTimeline(q.id,'remove',q.status,'removed',{reason})
    if (selQ?.id===q.id) setSelQ(null); toast('Queue removed','info')
  }

  const holdQueue = async q => {
    await sb.from('queues').update({status:'held'}).eq('id',q.id)
    await logTimeline(q.id,'hold',q.status,'held')
    if (selQ?.id===q.id) setSelQ(null); toast('Queue put on hold','info')
  }

  const skipQueue = async q => {
    await sb.from('queues').update({status:'waiting',created_at:new Date().toISOString()}).eq('id',q.id)
    await logTimeline(q.id,'skip',q.status,'waiting')
    if (selQ?.id===q.id) setSelQ(null); toast('Queue skipped','info')
  }

  const notifyQueue = async q => {
    // Get window name
    const winName = selWin?.name || q.windows?.name || 'your window'
    const svcName = q.services?.name || ''

    // 1. Insert notify_event — TV will pick this up via realtime and announce
    await sb.from('notify_events').insert({
      queue_id: q.id,
      queue_number: q.queue_number,
      window_name: winName,
      service_name: svcName,
      visitor_name: q.visitor_name || null,
    })

    // 2. Also announce locally via Web Speech API (for the staff's screen)
    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel()
      const msg = new SpeechSynthesisUtterance()
      msg.text = `Queue number ${q.queue_number.split('').join(' ')}, please proceed to ${winName}.`
      msg.lang = 'en-PH'
      msg.rate = 0.9
      msg.pitch = 1
      msg.volume = 1
      window.speechSynthesis.speak(msg)
    }

    await logTimeline(q.id,'notify',q.status,q.status)
    toast(`Notified: ${q.queue_number} → ${winName}`,'success')
  }

  const filtered = (list) => list.filter(q=>{
    if (filterMe && q.served_by && q.served_by!==user.id) return false
    const s=search.toLowerCase()
    return !s || q.queue_number.toLowerCase().includes(s) || q.visitor_name?.toLowerCase().includes(s)
  })

  // ── WINDOW SELECT SCREEN ───────────────────────────────────
  if (!started) {
    const h=new Date().getHours()
    return (
      <div className="window-select">
        <div style={{maxWidth:'480px',width:'100%'}}>
          <div style={{textAlign:'center',marginBottom:'28px'}}>
            <h1 style={{fontSize:'22px',fontWeight:800}}>{h<12?'Good morning':h<18?'Good afternoon':'Good evening'}, {profile?.first_name}! 😎</h1>
            <p style={{color:'var(--muted)',marginTop:'6px',fontSize:'13px'}}>Please select a window where you want to serve queues</p>
          </div>
          <div className="card" style={{padding:'4px',maxHeight:'380px',overflowY:'auto'}}>
            {windows.length===0 && <div className="empty-state" style={{padding:'24px'}}><p>No windows assigned</p></div>}
            {windows.map(w=>(
              <div key={w.id} className="window-card" style={{margin:'4px'}} onClick={()=>selectWindow(w)}>
                <div>
                  <div style={{fontWeight:600,fontSize:'14px'}}>{w.name}</div>
                  <div style={{fontSize:'11px',color:'var(--muted)',marginTop:'2px'}}>{w.window_services?.length||0} service{w.window_services?.length!==1?'s':''}</div>
                </div>
                <Icon n="chev_right" s={16} c="text-muted"/>
              </div>
            ))}
          </div>
          <button className="btn btn-primary btn-full" style={{marginTop:'12px',padding:'11px'}}
            onClick={()=>{setStarted(true);setSelWin(null)}}>
            Okay, let's go! 🚀
          </button>
        </div>
      </div>
    )
  }

  const dispQ = tab==='ongoing' ? filtered(ongoing) : filtered(serving)

  return (
    <div className="workspace">
      {/* ── LEFT PANEL ── */}
      <div className="ws-left">
        <div className="ws-header" style={{paddingBottom:'8px'}}>
          <div style={{display:'flex',alignItems:'center',gap:'6px',marginBottom:'8px'}}>
            <span style={{fontSize:'11px',fontWeight:700,color:'var(--muted)'}}>FROM</span>
            <span style={{background:'var(--sidebar)',color:'#fff',padding:'3px 9px',borderRadius:'6px',fontSize:'12px',fontWeight:700}}>{selWin?.name||'All Services'}</span>
          </div>
          <div className="ws-tabs">
            {[['ongoing','Ongoing',ongoing.length],['serving','Serving',serving.length]].map(([id,lbl,cnt])=>(
              <button key={id} className={`ws-tab ${tab===id?'active':''}`} onClick={()=>setTab(id)}>
                {lbl}{cnt>0&&<span className="tab-count">{cnt}</span>}
              </button>
            ))}
          </div>
          <div style={{display:'flex',gap:'6px',marginTop:'8px'}}>
            <div style={{position:'relative',flex:1}}>
              <Icon n="search" s={12} c="text-subtle" style={{position:'absolute',left:'9px',top:'50%',transform:'translateY(-50%)'}}/>
              <input className="input" style={{paddingLeft:'28px',paddingTop:'6px',paddingBottom:'6px',fontSize:'12px'}}
                value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search..."/>
            </div>
            <button className={`btn btn-sm ${filterMe?'btn-primary':'btn-secondary'}`}
              onClick={()=>setFilterMe(f=>!f)} style={{padding:'5px 10px',fontSize:'11px'}}>Me</button>
          </div>
        </div>

        <div className="ws-list">
          {dispQ.length===0 && (
            <div className="empty-state">
              <div className="empty-icon"><Icon n="clock" s={20}/></div>
              <p style={{fontWeight:600,fontSize:'13px'}}>No {tab} queues</p>
              <p style={{fontSize:'12px',marginTop:'3px'}}>Add a queue to get started</p>
            </div>
          )}
          {dispQ.map(q=>(
            <div key={q.id}
              className={`queue-card ${selQ?.id===q.id?'selected':''} ${q.priority?'priority':''} ${q.status==='held'?'held':''}`}
              onClick={()=>setSelQ(q)}>
              <div className="qc-top">
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:'7px',flexWrap:'wrap'}}>
                    <span className="qnum qc-num">{q.queue_number}</span>
                    <span className="qc-service" style={{color:q.services?.color||'var(--brand)'}}>{q.services?.name}</span>
                    {q.priority && <span style={{background:'#fef3c7',color:'#92400e',fontSize:'10px',padding:'1px 6px',borderRadius:'4px',fontWeight:700}}>PRIORITY</span>}
                  </div>
                  {q.visitor_name && <div className="qc-name">{q.visitor_name}</div>}
                  <div className="qc-time">{fmt(q.created_at,'short')} · {selWin?.name||q.windows?.name||'—'}</div>
                  {q.tags?.length>0 && <div style={{display:'flex',gap:'4px',marginTop:'4px',flexWrap:'wrap'}}>{q.tags.map(t=><span key={t} className="tag">{t}</span>)}</div>}
                  {q.status==='held' && <span className="badge badge-held" style={{marginTop:'5px',display:'inline-flex'}}>On Hold</span>}
                </div>
                <div style={{position:'relative'}} onClick={e=>e.stopPropagation()}>
                  <button className="qc-menu-btn" onClick={e=>{e.stopPropagation();setDropMenu(dropMenu===q.id?null:q.id)}}>
                    <Icon n="more" s={14}/>
                  </button>
                  {dropMenu===q.id && (
                    <div className="dropdown" onClick={e=>e.stopPropagation()}>
                      {q.status==='waiting'&&<button className="dropdown-item" onClick={()=>{serveQueue(q);setDropMenu(null)}}><Icon n="arrow" s={13}/>Serve Queue</button>}
                      <button className="dropdown-item" onClick={()=>{holdQueue(q);setDropMenu(null)}}><Icon n="clock" s={13}/>Hold Queue</button>
                      <button className="dropdown-item" onClick={()=>{skipQueue(q);setDropMenu(null)}}><Icon n="arrow" s={13}/>Skip Queue</button>
                      <button className="dropdown-item" onClick={()=>{setSelQ(q);setShowTransfer({type:'service'});setDropMenu(null)}}><Icon n="arrow" s={13}/>Transfer to Service</button>
                      <button className="dropdown-item" onClick={()=>{setSelQ(q);setShowTransfer({type:'window'});setDropMenu(null)}}><Icon n="arrow" s={13}/>Transfer to Window</button>
                      <div className="dropdown-divider"/>
                      <button className="dropdown-item danger" onClick={()=>{removeQueue(q);setDropMenu(null)}}><Icon n="trash" s={13}/>Remove Queue</button>
                    </div>
                  )}
                </div>
              </div>
            </div>
          ))}
        </div>

        <div className="ws-footer">
          <button className="btn btn-primary btn-full" onClick={()=>setShowAdd(true)}>
            <Icon n="plus" s={15}/>Add Queue
          </button>
          <div style={{display:'flex',gap:'6px'}}>
            <button className="btn btn-secondary" style={{flex:1,fontSize:'12px'}} onClick={()=>toast('Queue History — coming soon','info')}>
              <Icon n="history" s={14}/>History
            </button>
            <button className="btn btn-secondary" style={{flex:1,fontSize:'12px',color:'var(--danger)'}} onClick={leaveWindow}>
              <Icon n="logout" s={14}/>Leave
            </button>
          </div>
        </div>
      </div>

      {/* ── RIGHT PANEL ── */}
      <div className="ws-right">
        <div style={{background:'#fff',borderBottom:'1px solid var(--border)',padding:'11px 20px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <h2 style={{fontWeight:800,fontSize:'15px'}}>{selWin?.name||'Queue Workspace'}</h2>
          <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
            <div className="rt-dot"/>
            <span style={{fontSize:'12px',color:'var(--success)',fontWeight:600}}>Realtime Active</span>
          </div>
        </div>

        {selQ ? (
          <QueueDetail
            queue={selQ}
            onComplete={()=>completeQueue(selQ)}
            onNotify={()=>notifyQueue(selQ)}
            onServe={()=>serveQueue(selQ)}
            onRemove={()=>removeQueue(selQ)}
            onHold={()=>holdQueue(selQ)}
            onSkip={()=>skipQueue(selQ)}
            onTransferService={()=>setShowTransfer({type:'service'})}
            onTransferWindow={()=>setShowTransfer({type:'window'})}
          />
        ) : (
          <div className="empty-state" style={{height:'100%'}}>
            <div className="empty-icon" style={{width:'60px',height:'60px'}}><Icon n="workspace" s={26}/></div>
            <p style={{fontWeight:700,fontSize:'15px',color:'var(--text)'}}>Select a Queue</p>
            <p style={{marginTop:'4px'}}>Click any queue to view details and take action</p>
          </div>
        )}
      </div>

      {showAdd && <AddQueueModal window={selWin} userId={user.id} onClose={()=>setShowAdd(false)} onAdded={()=>{setShowAdd(false);toast('Queue added!','success')}}/>}
      {showTransfer && selQ && (
        <TransferModal queue={selQ} type={showTransfer.type} currentWindowId={selWin?.id}
          onClose={()=>setShowTransfer(null)}
          onTransferred={()=>{setShowTransfer(null);setSelQ(null);toast('Queue transferred!','success')}}/>
      )}
    </div>
  )
}

// ─────────────────────────────────────────────────────────────
// QUEUE DETAIL PANEL
// ─────────────────────────────────────────────────────────────
function QueueDetail({queue:q, onComplete, onNotify, onServe, onRemove, onHold, onSkip, onTransferService, onTransferWindow}) {
  const [timeline, setTimeline] = React.useState([])
  const [procedure, setProcedure] = React.useState(null)
  const [steps, setSteps] = React.useState([])
  const [menuOpen, setMenuOpen] = React.useState(false)

  React.useEffect(()=>{
    fetchTimeline()
    if (q.procedure_id) fetchProcedure()
    else { setProcedure(null); setSteps([]) }
  },[q.id])

  React.useEffect(()=>{
    const close=()=>setMenuOpen(false)
    window.addEventListener('click',close)
    return()=>window.removeEventListener('click',close)
  },[])

  const fetchTimeline = async () => {
    const {data} = await sb.from('queue_timeline')
      .select('*,profiles(first_name,last_name),windows(name)')
      .eq('queue_id',q.id).order('created_at',{ascending:false})
    setTimeline(data||[])
  }
  const fetchProcedure = async () => {
    const {data} = await sb.from('procedures').select('*,procedure_steps(*,services(name))').eq('id',q.procedure_id).single()
    if (data) { setProcedure(data); setSteps(data.procedure_steps?.sort((a,b)=>a.step_order-b.step_order)||[]) }
  }

  const tlLabel = a => ({serve:'Served Queue',complete:'Completed Queue',remove:'Removed Queue',hold:'Put on Hold',skip:'Skipped Queue',notify:'Notified Visitor',transfer_service:'Transferred to Service',transfer_window:'Transferred to Window',add:'Queue Added'}[a]||a)

  return (
    <div className="detail-panel">
      <div className="detail-main">
        {/* Queue number */}
        <div className="card" style={{padding:'20px',textAlign:'center'}}>
          <p style={{fontSize:'11px',fontWeight:700,color:'var(--subtle)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:'8px'}}>Queue Number</p>
          <div className="big-qnum" style={{color:q.services?.color||'var(--brand)'}}>{q.queue_number}</div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',marginTop:'10px'}}>
            <span style={{fontWeight:600,fontSize:'13px',color:q.services?.color||'var(--brand)'}}>{q.services?.name}</span>
            {statusBadge(q.status)}
          </div>
        </div>

        {/* Details */}
        <div className="card" style={{padding:'16px'}}>
          <div className="grid-2">
            {[
              ['Visitor Name', q.visitor_name||'—'],
              ['Mobile', q.visitor_mobile||'—'],
              ['Waiting Time', waitMins(q.waiting_start, q.serving_start||null)],
              ['Date / Time Queued', fmt(q.created_at,'datetime')],
              q.windows?.name && ['Window', q.windows.name],
              q.profiles && ['Served By', `${q.profiles.first_name} ${q.profiles.last_name}`],
            ].filter(Boolean).map(([lbl,val])=>(
              <div key={lbl}>
                <div style={{fontSize:'11px',color:'var(--subtle)',marginBottom:'2px',fontWeight:600,textTransform:'uppercase',letterSpacing:'.04em'}}>{lbl}</div>
                <div style={{fontSize:'13px',fontWeight:500}}>{val}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Tags */}
        {(q.tags?.length>0) && (
          <div className="card" style={{padding:'12px 16px'}}>
            <div style={{fontSize:'11px',fontWeight:700,color:'var(--subtle)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'8px'}}>Tags</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:'6px'}}>
              {q.tags.map(t=><span key={t} className="tag">{t}</span>)}
            </div>
          </div>
        )}
      </div>

      {/* Right side: procedure + timeline */}
      <div className="detail-sidebar">
        {q.status==='serving' && (
          <div style={{padding:'10px 14px',background:'#f0fdf4',borderBottom:'1px solid #bbf7d0'}}>
            <div style={{fontSize:'10px',fontWeight:700,color:'var(--success)',textTransform:'uppercase',letterSpacing:'.06em'}}>Serving Time</div>
            <div style={{fontFamily:'JetBrains Mono',fontSize:'16px',fontWeight:700,color:'var(--success)',marginTop:'2px'}}>{fmt(q.serving_start,'mins')}</div>
          </div>
        )}

        {procedure && steps.length>0 && (
          <div style={{padding:'12px 14px',borderBottom:'1px solid var(--border)'}}>
            <div className="section-label">Procedures List</div>
            <div style={{fontWeight:700,fontSize:'13px',marginBottom:'3px'}}>{procedure.name}</div>
            <div style={{fontSize:'11px',color:'var(--brand)',fontWeight:600,marginBottom:'12px'}}>Step-by-Step | {steps.length} steps</div>
            <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
              {steps.map((step,i)=>{
                const n=i+1, done=n<(q.current_step||1), curr=n===(q.current_step||1)
                return (
                  <div key={step.id} style={{display:'flex',alignItems:'flex-start',gap:'8px'}}>
                    <div className="step-circle" style={{background:done?'var(--success)':curr?'var(--brand)':'#e2e8f0',color:done||curr?'#fff':'var(--muted)'}}>
                      {done?'✓':n}
                    </div>
                    <div>
                      <div style={{fontSize:'11px',fontWeight:600,color:'var(--muted)'}}>Step {n}</div>
                      <div style={{fontSize:'12px',fontWeight:600}}>{step.services?.name}</div>
                      <div style={{fontSize:'11px',fontWeight:600,color:done?'var(--success)':curr?'var(--brand)':'var(--subtle)',marginTop:'2px'}}>
                        {done?'Completed':curr?'Current Serving':'Pending'}
                      </div>
                    </div>
                  </div>
                )
              })}
            </div>
          </div>
        )}

        <div style={{padding:'12px 14px',flex:1,overflowY:'auto'}}>
          <div className="section-label">Timeline</div>
          {timeline.length===0 && <p style={{fontSize:'12px',color:'var(--subtle)'}}>No activity yet</p>}
          <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
            {timeline.map((t,i)=>(
              <div key={t.id} style={{display:'flex',gap:'8px',position:'relative'}}>
                {i<timeline.length-1 && <div style={{position:'absolute',left:'3px',top:'12px',bottom:'-10px',width:'1px',background:'var(--border)'}}/>}
                <div className="timeline-dot"/>
                <div style={{flex:1}}>
                  <div style={{fontSize:'12px',fontWeight:600}}>{tlLabel(t.action)}</div>
                  <div style={{fontSize:'11px',color:'var(--muted)',marginTop:'1px'}}>{fmt(t.created_at,'datetime')}</div>
                  {t.profiles && <div style={{fontSize:'11px',color:'var(--subtle)'}}>by {t.profiles.first_name} {t.profiles.last_name}</div>}
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Actions */}
      <div className="detail-actions">
        <div style={{position:'relative'}} onClick={e=>e.stopPropagation()}>
          <button className="btn btn-secondary btn-icon" onClick={()=>setMenuOpen(o=>!o)}><Icon n="more" s={15}/></button>
          {menuOpen && (
            <div className="dropdown" style={{bottom:'44px',left:0,top:'auto'}}>
              <button className="dropdown-item" onClick={()=>{onHold();setMenuOpen(false)}}><Icon n="clock" s={13}/>Hold Queue</button>
              {q.status==='serving'&&<button className="dropdown-item" onClick={()=>{onSkip();setMenuOpen(false)}}><Icon n="arrow" s={13}/>Skip Queue</button>}
              <button className="dropdown-item" onClick={()=>{onTransferService();setMenuOpen(false)}}><Icon n="arrow" s={13}/>Transfer to Service</button>
              <button className="dropdown-item" onClick={()=>{onTransferWindow();setMenuOpen(false)}}><Icon n="arrow" s={13}/>Transfer to Window</button>
              <div className="dropdown-divider"/>
              <button className="dropdown-item danger" onClick={()=>{onRemove();setMenuOpen(false)}}><Icon n="trash" s={13}/>Remove Queue</button>
            </div>
          )}
        </div>
        <button className="btn btn-secondary" style={{flex:1}} onClick={onNotify}><Icon n="bell" s={14}/>Notify</button>
        {q.status==='waiting'
          ? <button className="btn btn-primary" style={{flex:1}} onClick={onServe}><Icon n="check" s={14}/>Serve Queue</button>
          : <button className="btn btn-success" style={{flex:1}} onClick={onComplete}><Icon n="check" s={14}/>Complete Queue</button>
        }
      </div>
    </div>
  )
}

// ADD QUEUE MODAL
// ─────────────────────────────────────────────────────────────
function AddQueueModal({window:win, userId, onClose, onAdded}) {
  const [services, setServices] = React.useState([])
  const [svcId, setSvcId] = React.useState('')
  const [name, setName] = React.useState('')
  const [mobile, setMobile] = React.useState('')
  const [tags, setTags] = React.useState([])
  const [tagIn, setTagIn] = React.useState('')
  const [priority, setPriority] = React.useState(false)
  const [loading, setLoading] = React.useState(false)
  const [err, setErr] = React.useState('')

  React.useEffect(()=>{
    const ids = win?.window_services?.map(ws=>ws.service_id)||[]
    sb.from('services').select('id,name,prefix,color').eq('is_active',true)
      .in('id', ids.length ? ids : ['00000000-0000-0000-0000-000000000000'])
      .order('name').then(({data})=>setServices(data||[]))
  },[])

  const addTag = () => {
    const t = tagIn.trim().toUpperCase()
    if (t && !tags.includes(t)) setTags(p=>[...p,t])
    setTagIn('')
  }

  const submit = async e => {
    e.preventDefault(); if (!svcId) { setErr('Select a service'); return }
    setLoading(true); setErr('')
    try {
      const {data:qnum} = await sb.rpc('get_next_queue_number',{p_service_id:svcId})
      const {data:q, error:qe} = await sb.from('queues').insert({
        queue_number:qnum, service_id:svcId,
        visitor_name:name||null, visitor_mobile:mobile||null,
        tags, priority, status:'waiting',
        date:today(), waiting_start:new Date().toISOString()
      }).select().single()
      if (qe) throw qe
      await sb.from('queue_timeline').insert({queue_id:q.id,action:'add',from_status:null,to_status:'waiting',performed_by:userId})
      onAdded(q)
    } catch(e) { setErr(e.message) }
    finally { setLoading(false) }
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal animate-in" onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <div><div className="modal-title">Add Queue</div><div className="modal-sub">Enter visitor info. Fields optional unless stated.</div></div>
          <button className="btn btn-ghost btn-icon" onClick={onClose}><Icon n="x" s={16}/></button>
        </div>
        <form onSubmit={submit} className="modal-body">
          <div className="space-y-3">
            <div>
              <label className="label">Add Queue On *</label>
              <select className="input" value={svcId} onChange={e=>setSvcId(e.target.value)} required>
                <option value="">Please Select Service</option>
                {services.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
            </div>
            <div style={{paddingTop:'4px'}}>
              <div className="label" style={{marginBottom:'8px'}}>Visitor Details</div>
              <div className="space-y-2">
                <div>
                  <label className="label" style={{textTransform:'none',letterSpacing:0,fontSize:'12px',fontWeight:500,color:'var(--muted)'}}>Full Name (Optional)</label>
                  <input className="input" value={name} onChange={e=>setName(e.target.value)} placeholder="Enter full name"/>
                </div>
                <div>
                  <label className="label" style={{textTransform:'none',letterSpacing:0,fontSize:'12px',fontWeight:500,color:'var(--muted)'}}>Mobile Number (Optional)</label>
                  <div style={{display:'flex',gap:'6px'}}>
                    <span style={{padding:'8px 10px',background:'#f8fafc',border:'1px solid var(--border)',borderRadius:'8px',fontSize:'13px',color:'var(--muted)',whiteSpace:'nowrap'}}>+63</span>
                    <input className="input" style={{flex:1}} value={mobile} onChange={e=>setMobile(e.target.value)} placeholder="9XX-XXX-XXXX" type="tel"/>
                  </div>
                  <p style={{fontSize:'11px',color:'var(--subtle)',marginTop:'3px'}}>SMS will be sent if number provided</p>
                </div>
              </div>
            </div>
            <label style={{display:'flex',alignItems:'center',gap:'8px',cursor:'pointer'}}>
              <input type="checkbox" checked={priority} onChange={e=>setPriority(e.target.checked)} style={{width:'15px',height:'15px',accentColor:'var(--brand)'}}/>
              <span style={{fontSize:'13px',fontWeight:500}}>Mark as Priority</span>
            </label>
            <div>
              <label className="label">Tags</label>
              <div style={{display:'flex',gap:'6px'}}>
                <input className="input" style={{flex:1}} value={tagIn} onChange={e=>setTagIn(e.target.value)}
                  onKeyDown={e=>e.key==='Enter'&&(e.preventDefault(),addTag())} placeholder="Enter a tag and press Enter"/>
                <button type="button" className="btn btn-secondary btn-icon" onClick={addTag}><Icon n="plus" s={14}/></button>
              </div>
              {tags.length>0 && <div style={{display:'flex',flexWrap:'wrap',gap:'5px',marginTop:'7px'}}>{tags.map(t=><span key={t} className="tag" style={{cursor:'pointer'}} onClick={()=>setTags(p=>p.filter(x=>x!==t))}>{t} ×</span>)}</div>}
            </div>
            {err && <div className="error-box">{err}</div>}
          </div>
          <div className="modal-footer">
            <button type="button" className="btn btn-secondary" style={{flex:1}} onClick={onClose}>Cancel</button>
            <button type="submit" disabled={loading} className="btn btn-primary" style={{flex:1}}>
              {loading?<div className="spinner"/>:'Confirm'}
            </button>
          </div>
        </form>
      </div>
    </div>
  )
}

// TRANSFER MODAL
// ─────────────────────────────────────────────────────────────
function TransferModal({queue:q, type, currentWindowId, onClose, onTransferred}) {
  const [items, setItems] = React.useState([])
  const [sel, setSel] = React.useState(null)
  const [reason, setReason] = React.useState('')
  const [loading, setLoading] = React.useState(false)

  React.useEffect(()=>{
    if (type==='service') sb.from('services').select('id,name,color').eq('is_active',true).neq('id',q.service_id).order('name').then(({data})=>setItems(data||[]))
    else sb.from('windows').select('id,name').eq('is_active',true).neq('id',currentWindowId||'x').order('name').then(({data})=>setItems(data||[]))
  },[])

  const doTransfer = async () => {
    if (!sel) return; setLoading(true)
    const updates = type==='service'
      ? {service_id:sel.id,status:'waiting',window_id:null,served_by:null,serving_start:null}
      : {window_id:sel.id,status:'waiting'}
    await sb.from('queues').update(updates).eq('id',q.id)
    await sb.from('queue_timeline').insert({queue_id:q.id,action:`transfer_${type}`,from_status:q.status,to_status:'waiting',
      from_window_id:currentWindowId,to_window_id:type==='window'?sel.id:null,
      from_service_id:q.service_id,to_service_id:type==='service'?sel.id:null,performed_by:null,reason})
    setLoading(false); onTransferred()
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal animate-in" style={{maxWidth:'400px'}} onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <div>
            <div className="modal-title">Transfer to {type==='service'?'Service':'Window'}</div>
            <div className="modal-sub">Queue <strong>{q.queue_number}</strong></div>
          </div>
          <button className="btn btn-ghost btn-icon" onClick={onClose}><Icon n="x" s={16}/></button>
        </div>
        <div className="modal-body">
          <div style={{maxHeight:'220px',overflowY:'auto',display:'flex',flexDirection:'column',gap:'4px',marginBottom:'12px'}}>
            {items.map(item=>(
              <div key={item.id} onClick={()=>setSel(item)}
                style={{display:'flex',alignItems:'center',gap:'10px',padding:'10px 12px',border:`1.5px solid ${sel?.id===item.id?'var(--brand)':'var(--border)'}`,
                  borderRadius:'9px',cursor:'pointer',background:sel?.id===item.id?'#f0f9ff':'#fff',transition:'all .12s'}}>
                <div style={{width:'18px',height:'18px',border:`2px solid ${sel?.id===item.id?'var(--brand)':'#cbd5e1'}`,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',flex:'shrink-0'}}>
                  {sel?.id===item.id&&<div style={{width:'8px',height:'8px',borderRadius:'50%',background:'var(--brand)'}}/>}
                </div>
                {item.color&&<div className="color-dot" style={{background:item.color}}/>}
                <span style={{fontSize:'13px',fontWeight:500}}>{item.name}</span>
              </div>
            ))}
          </div>
          <div style={{marginBottom:'12px'}}>
            <label className="label">Reason (Optional)</label>
            <input className="input" value={reason} onChange={e=>setReason(e.target.value)} placeholder="Enter reason..."/>
          </div>
          <p style={{fontSize:'11px',color:'var(--subtle)',marginBottom:'14px'}}>Note: Please advise the visitor regarding this transfer.</p>
          <div style={{display:'flex',gap:'8px'}}>
            <button className="btn btn-secondary" style={{flex:1}} onClick={onClose}>Back</button>
            <button className="btn btn-primary" style={{flex:1}} disabled={!sel||loading} onClick={doTransfer}>
              {loading?<div className="spinner"/>:'Confirm'}
            </button>
          </div>
        </div>
      </div>
    </div>
  )
}

// ─────────────────────────────────────────────────────────────
// TV DISPLAY  (standalone, no sidebar)
// ─────────────────────────────────────────────────────────────
function TVDisplay({slug}) {
  const [template, setTemplate] = React.useState(null)   // TV template config
  const [allowedWinIds, setAllowedWinIds] = React.useState(null) // null = all
  const [serving, setServing] = React.useState([])
  const [recent, setRecent] = React.useState([])
  const [now, setNow] = React.useState(new Date())
  const [flashId, setFlashId] = React.useState(null)
  const [announcement, setAnnouncement] = React.useState(null)
  const [audioReady, setAudioReady] = React.useState(false)
  const loadedRef = React.useRef(false)

  const unlockAudio = () => {
    if (!audioReady) {
      const u = new SpeechSynthesisUtterance(''); u.volume=0
      window.speechSynthesis?.speak(u)
      setAudioReady(true)
    }
  }

  const announce = (qnum, winName) => {
    if (!('speechSynthesis' in window)) return
    window.speechSynthesis.cancel()
    const msg = new SpeechSynthesisUtterance()
    msg.text = `Queue number ${qnum.split('').join(' ')}. Please proceed to ${winName}.`
    msg.lang = 'en-US'; msg.rate = 0.85; msg.pitch = 1; msg.volume = 1
    window.speechSynthesis.speak(msg)
    setAnnouncement({qnum, winName})
    setTimeout(()=>setAnnouncement(null), 7000)
  }

  // Filter serving list by allowed windows
  const filterByWindow = (list, winIds) => {
    if (!winIds) return list // null = show all
    return list.filter(q => winIds.includes(q.window_id))
  }

  const loadTemplate = async () => {
    if (!slug || slug === '1') {
      // ?tv=1 means main (show all)
      setTemplate({name:'Main Display', show_all_windows:true})
      setAllowedWinIds(null)
      return
    }
    const {data:tmpl} = await sb.from('tv_templates')
      .select('*,tv_template_windows(window_id)')
      .eq('slug', slug).single()
    if (!tmpl) {
      setTemplate({name:'TV Display', show_all_windows:true})
      setAllowedWinIds(null)
      return
    }
    setTemplate(tmpl)
    if (tmpl.show_all_windows) {
      setAllowedWinIds(null)
    } else {
      setAllowedWinIds(tmpl.tv_template_windows?.map(r=>r.window_id)||[])
    }
  }

  const loadQueues = async (winIds) => {
    let q = sb.from('queues')
      .select('*,services(name,color),windows(name)')
      .eq('date', today())
      .in('status', ['serving','completed'])
      .order('serving_start', {ascending:false})
      .limit(40)
    // Filter by window if template has specific windows
    if (winIds && winIds.length > 0) {
      q = q.in('window_id', winIds)
    }
    const {data} = await q
    const s = (data||[]).filter(x=>x.status==='serving')
    const r = (data||[]).filter(x=>x.status==='completed').slice(0,12)
    setServing(s)
    setRecent(r)
  }

  React.useEffect(()=>{
    // TV Display needs an auth session for Realtime postgres_changes to work
    // Sign in anonymously so realtime subscriptions work without staff login
    sb.auth.getSession().then(({data:{session}})=>{
      if (!session) {
        sb.auth.signInAnonymously().catch(()=>{
          // Fallback: if anon auth not enabled, realtime still works for
          // broadcast channels — we use a polling fallback
        })
      }
    })
    loadTemplate()
  },[slug])

  // Start realtime AFTER we know the allowedWinIds
  React.useEffect(()=>{
    if (template === null) return // still loading
    loadQueues(allowedWinIds)
    const ti = setInterval(()=>setNow(new Date()), 1000)

    // ── Approach: Poll every 3 seconds + realtime if auth available ──
    // TV Display may not have auth session, so we use polling as primary
    // and realtime as enhancement when available
    let pollTimer = setInterval(()=>loadQueues(allowedWinIds), 3000)

    // ── Try realtime (works if user has session or anon auth enabled) ──
    const ch = sb.channel(`tv-q-${slug||'main'}`)
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'queues'},payload=>{
        const q = payload.new
        if (allowedWinIds && q.window_id && !allowedWinIds.includes(q.window_id)) return
        clearInterval(pollTimer)
        pollTimer = null // realtime is working, no need to poll

        sb.from('queues').select('*,services(name,color),windows(name)').eq('id',q.id).single()
          .then(({data:full})=>{
            if (!full) return
            if (q.status==='serving') {
              setServing(p=>{
                const exists = p.find(x=>x.id===q.id)
                return exists ? p.map(x=>x.id===q.id?full:x) : [full,...p]
              })
              setFlashId(q.id)
              setTimeout(()=>setFlashId(null), 4000)
            } else if (q.status==='completed'||q.status==='removed') {
              setTimeout(()=>{
                setServing(p=>p.filter(x=>x.id!==q.id))
                if (q.status==='completed') setRecent(p=>[full,...p].slice(0,12))
              }, 30000)
            }
          })
      })
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'queues'},payload=>{
        const q = payload.new
        if (q.status!=='serving') return
        if (allowedWinIds && q.window_id && !allowedWinIds.includes(q.window_id)) return
        sb.from('queues').select('*,services(name,color),windows(name)').eq('id',q.id).single()
          .then(({data:full})=>{
            if (!full) return
            setServing(p=>[full,...p])
            setFlashId(q.id)
            setTimeout(()=>setFlashId(null),4000)
          })
      })
      .subscribe()

    // ── Realtime: notify_events (Bell button) ───────────
    const chNotify = sb.channel(`tv-notify-${slug||'main'}`)
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'notify_events'},payload=>{
        const ev = payload.new
        sb.from('queues')
          .select('*,services(name,color),windows(name)')
          .eq('id', ev.queue_id)
          .single()
          .then(({data:full})=>{
            if (!full) return
            if (allowedWinIds && full.window_id && !allowedWinIds.includes(full.window_id)) return
            // Add to serving list if not there yet
            setServing(p=>{
              const exists = p.find(x=>x.id===full.id)
              return exists ? p : [full, ...p]
            })
            setFlashId(full.id)
            setTimeout(()=>setFlashId(null), 6000)
            announce(ev.queue_number, ev.window_name || full.windows?.name || 'your window')
          })
      })
      .subscribe()

    return()=>{
      clearInterval(ti)
      if (pollTimer) clearInterval(pollTimer)
      ch.unsubscribe()
      chNotify.unsubscribe()
    }
  },[template, allowedWinIds])

  if (!template) return (
    <div style={{minHeight:'100vh',background:'#0f172a',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div className="spinner" style={{width:'40px',height:'40px',borderWidth:'3px'}}/>
    </div>
  )

  return (
    <div className="tv" onClick={unlockAudio}>
      {/* Audio unlock hint */}
      {!audioReady && (
        <div style={{position:'fixed',bottom:'20px',left:'50%',transform:'translateX(-50%)',background:'rgba(14,165,233,.95)',color:'#fff',padding:'12px 24px',borderRadius:'12px',fontSize:'13px',fontWeight:600,zIndex:999,boxShadow:'0 4px 20px rgba(14,165,233,.4)',whiteSpace:'nowrap'}}>
          🔊 Tap anywhere to enable voice announcements
        </div>
      )}

      {/* Announcement banner — slides down on notify */}
      {announcement && (
        <div style={{position:'fixed',top:0,left:0,right:0,zIndex:998,background:'linear-gradient(90deg,#0369a1,#0ea5e9)',padding:'18px 40px',display:'flex',alignItems:'center',justifyContent:'center',gap:'24px',animation:'slideDown .3s ease',boxShadow:'0 8px 32px rgba(14,165,233,.5)'}}>
          <div style={{fontFamily:'JetBrains Mono',fontSize:'40px',fontWeight:900,color:'#fff',letterSpacing:'.05em'}}>{announcement.qnum}</div>
          <div style={{width:'2px',height:'40px',background:'rgba(255,255,255,.3)'}}/>
          <div style={{color:'#fff',fontSize:'18px',fontWeight:600}}>Please proceed to <strong style={{color:'#bae6fd'}}>{announcement.winName}</strong></div>
        </div>
      )}

      <div className="tv-header">
        <div style={{display:'flex',alignItems:'center',gap:'14px'}}>
          <div style={{width:'50px',height:'50px',background:'var(--brand)',borderRadius:'12px',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:'24px',color:'#fff'}}>T</div>
          <div>
            <div style={{fontWeight:800,fontSize:'18px'}}>Taytay Doctors Multispecialty Hospital</div>
            <div style={{color:'#64748b',fontSize:'12px',marginTop:'2px',display:'flex',alignItems:'center',gap:'8px'}}>
              <span>Queue Management System</span>
              {template.name && template.name!=='Main Display' && (
                <span style={{background:'rgba(14,165,233,.2)',color:'var(--brand)',padding:'1px 8px',borderRadius:'4px',fontSize:'11px',fontWeight:700}}>{template.name}</span>
              )}
            </div>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'16px'}}>
          <div style={{display:'flex',alignItems:'center',gap:'6px',background:'rgba(16,185,129,.1)',border:'1px solid rgba(16,185,129,.25)',borderRadius:'20px',padding:'5px 14px'}}>
            <div className="rt-dot"/>
            <span style={{fontSize:'12px',fontWeight:600,color:'#10b981'}}>Live</span>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontFamily:'JetBrains Mono',fontSize:'28px',fontWeight:700,color:'var(--brand)'}}>
              {now.toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true})}
            </div>
            <div style={{color:'#64748b',fontSize:'12px',marginTop:'2px'}}>
              {now.toLocaleDateString('en-PH',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}
            </div>
          </div>
        </div>
      </div>
