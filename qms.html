// MONITORING
// ─────────────────────────────────────────────────────────────
function Monitoring() {
  const [tab,setTab]=React.useState('branch')
  const [kpis,setKpis]=React.useState({total:0,avgWait:0,avgServe:0,waiting:0})
  const [hourly,setHourly]=React.useState([])
  const [peak,setPeak]=React.useState('—')
  const [topSvc,setTopSvc]=React.useState('—')
  const [topStaff,setTopStaff]=React.useState('—')
  const [svcStats,setSvcStats]=React.useState([])

  React.useEffect(()=>{load()},[])
  const load = async () => {
    const {data:queues} = await sb.from('queues').select('*,services(name),profiles(first_name,last_name)').eq('date',today())
    if (!queues?.length) return
    const completed=queues.filter(q=>q.status==='completed')
    const waiting=queues.filter(q=>q.status==='waiting').length
    const withWait=completed.filter(q=>q.serving_start&&q.waiting_start)
    const withServe=completed.filter(q=>q.completed_at&&q.serving_start)
    const avgWait=withWait.length?Math.round(withWait.reduce((s,q)=>s+(new Date(q.serving_start)-new Date(q.waiting_start)),0)/withWait.length/60000):0
    const avgServe=withServe.length?Math.round(withServe.reduce((s,q)=>s+(new Date(q.completed_at)-new Date(q.serving_start)),0)/withServe.length/60000):0
    setKpis({total:queues.length,avgWait,avgServe,waiting})
    // Hourly
    const hm={}; for(let h=7;h<=21;h++) hm[h]={h,label:`${h%12||12}${h<12?'am':'pm'}`,count:0}
    queues.forEach(q=>{ const h=new Date(q.created_at).getHours(); if(hm[h]) hm[h].count++ })
    const ho=Object.values(hm)
    setHourly(ho)
    const pk=ho.reduce((m,h)=>h.count>m.count?h:m,{count:0,label:'—'})
    setPeak(pk.label)
    // Top service
    const sm={}; queues.forEach(q=>{ const n=q.services?.name||'?'; sm[n]=(sm[n]||0)+1 })
    const ts=Object.entries(sm).sort((a,b)=>b[1]-a[1])[0]
    if(ts) setTopSvc(`${ts[0]} (${ts[1]})`)
    // Top staff
    const stm={}; completed.forEach(q=>{ if(q.profiles){ const n=`${q.profiles.first_name} ${q.profiles.last_name}`; stm[n]=(stm[n]||0)+1 }})
    const tst=Object.entries(stm).sort((a,b)=>b[1]-a[1])[0]
    if(tst) setTopStaff(`${tst[0]} (${tst[1]})`)
    // Service stats
    const stats={}; queues.forEach(q=>{ const n=q.services?.name||'?'; if(!stats[n]) stats[n]={name:n,total:0,completed:0,removed:0}; stats[n].total++; if(q.status==='completed') stats[n].completed++; if(q.status==='removed') stats[n].removed++ })
    setSvcStats(Object.values(stats).sort((a,b)=>b.total-a.total))
  }
  const maxCount=Math.max(...hourly.map(h=>h.count),1)

  return (
    <div>
      <div className="page-header"><h1 className="page-title">Monitoring</h1><p className="page-sub">See how the branch is performing today</p></div>
      <div className="monitor-tabs" style={{marginTop:'16px'}}>
        {[['branch','Branch Performance'],['visitors','Visitor Volumes'],['team','Team Performance']].map(([id,lbl])=>(
          <button key={id} className={`monitor-tab ${tab===id?'active':''}`} onClick={()=>setTab(id)}>{lbl}</button>
        ))}
      </div>
      <div style={{padding:'20px 24px',display:'flex',flexDirection:'column',gap:'16px'}}>
        <div className="grid-3">
          {[['Total Queues',kpis.total,'Today'],['Avg. Waiting Time',`${kpis.avgWait} mins`,'Today'],['Avg. Serving Time',`${kpis.avgServe} mins`,'Today']].map(([lbl,val,sub])=>(
            <div key={lbl} className="card" style={{padding:'16px'}}>
              <div style={{fontSize:'11px',color:'var(--muted)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'6px'}}>{lbl}</div>
              <div style={{fontSize:'28px',fontWeight:800}}>{val}</div>
              <div style={{fontSize:'11px',color:'var(--subtle)',marginTop:'3px'}}>{sub}</div>
            </div>
          ))}
        </div>
        {/* Bar chart */}
        <div className="card" style={{padding:'16px'}}>
          <div style={{fontWeight:700,fontSize:'13px',marginBottom:'4px'}}>Total Queues — Today 🔥</div>
          <div style={{fontSize:'12px',color:'var(--muted)',marginBottom:'14px'}}>See what time your branch is busiest</div>
          <div style={{display:'flex',alignItems:'flex-end',gap:'4px',height:'120px'}}>
            {hourly.map(h=>(
              <div key={h.h} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:'4px',height:'100%',justifyContent:'flex-end'}}>
                <div style={{width:'100%',background:'var(--brand)',borderRadius:'3px 3px 0 0',height:`${(h.count/maxCount)*100}%`,minHeight:h.count>0?'4px':'0',transition:'height .3s',opacity:h.count>0?1:.15}}/>
                <div style={{fontSize:'9px',color:'var(--subtle)',writing:'vertical-lr',transform:'rotate(-45deg)',whiteSpace:'nowrap'}}>{h.label}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
          {/* Highlights */}
          <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
            {[['Queue Length',kpis.waiting,'Waiting right now'],['Peak Hour',peak,'Based on today'],['Most Queued',topSvc,'Service'],['Top Staff',topStaff,'Most completed']].map(([lbl,val,sub])=>(
              <div key={lbl} className="card" style={{padding:'12px 14px'}}>
                <div style={{fontSize:'10px',color:'var(--subtle)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'4px'}}>{lbl}</div>
                <div style={{fontSize:'16px',fontWeight:800,lineHeight:1.2}}>{val}</div>
                <div style={{fontSize:'11px',color:'var(--muted)',marginTop:'2px'}}>{sub}</div>
              </div>
            ))}
          </div>
          {/* Service table */}
          <div className="card" style={{overflow:'hidden'}}>
            <div className="card-header"><span className="card-title">Services Today</span></div>
            <div style={{overflowY:'auto',maxHeight:'260px'}}>
              <table className="table">
                <thead><tr><th>Service</th><th>Total</th><th>Done</th></tr></thead>
                <tbody>
                  {svcStats.map(s=>(
                    <tr key={s.name}>
                      <td style={{maxWidth:'120px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.name}</td>
                      <td style={{fontWeight:700}}>{s.total}</td>
                      <td style={{color:'var(--success)',fontWeight:600}}>{s.completed}</td>
                    </tr>
                  ))}
                  {svcStats.length===0&&<tr><td colSpan="3" style={{color:'var(--muted)',textAlign:'center',padding:'20px'}}>No data</td></tr>}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  )
}

// ─────────────────────────────────────────────────────────────
function Reports() {
  const TYPES=[
    {id:'queue_history',label:'Queue History',desc:'List of previous queues or transactions'},
    {id:'queue_count',label:'Queue Count Report',desc:'Count of served, removed and cancelled'},
    {id:'avg_wait',label:'Average Waiting Time',desc:'Average waiting time per service'},
    {id:'avg_serve',label:'Average Serving Time',desc:'Average serving time per service'},
  ]
  const [active,setActive]=React.useState(null)
  const [from,setFrom]=React.useState(new Date(Date.now()-7*86400000).toISOString().slice(0,10))
  const [to,setTo]=React.useState(new Date().toISOString().slice(0,10))
  const [data,setData]=React.useState([])
  const [loading,setLoading]=React.useState(false)
  const [done,setDone]=React.useState(false)

  const generate = async () => {
    setLoading(true); setDone(false)
    const f=new Date(from+'T00:00:00').toISOString(), t=new Date(to+'T23:59:59').toISOString()
    try {
      if (active==='queue_history') {
        const {data:rows}=await sb.from('queues').select('queue_number,status,visitor_name,visitor_mobile,services(name),windows(name),created_at,completed_at').gte('created_at',f).lte('created_at',t).order('created_at',{ascending:false}).limit(500)
        setData((rows||[]).map(r=>({Queue:r.queue_number,Service:r.services?.name,Status:r.status,Visitor:r.visitor_name||'—',Window:r.windows?.name||'—',Queued:fmt(r.created_at,'datetime'),Completed:fmt(r.completed_at,'datetime')})))
      } else if (active==='queue_count') {
        const {data:rows}=await sb.from('queues').select('status,services(name)').gte('created_at',f).lte('created_at',t)
        const sm={}; (rows||[]).forEach(q=>{ const n=q.services?.name||'?'; if(!sm[n]) sm[n]={Service:n,Total:0,Completed:0,Removed:0}; sm[n].Total++; if(q.status==='completed') sm[n].Completed++; if(q.status==='removed') sm[n].Removed++ })
        setData(Object.values(sm))
      } else {
        const {data:rows}=await sb.from('queues').select('status,services(name),waiting_start,serving_start,completed_at').eq('status','completed').gte('created_at',f).lte('created_at',t)
        const sm={}; (rows||[]).forEach(q=>{ const n=q.services?.name||'?'; if(!sm[n]) sm[n]={Service:n,waitMs:[],serveMs:[]}; if(q.serving_start&&q.waiting_start) sm[n].waitMs.push(new Date(q.serving_start)-new Date(q.waiting_start)); if(q.completed_at&&q.serving_start) sm[n].serveMs.push(new Date(q.completed_at)-new Date(q.serving_start)) })
        setData(Object.values(sm).map(s=>({Service:s.Service,'Avg Wait':s.waitMs.length?`${Math.round(s.waitMs.reduce((a,b)=>a+b,0)/s.waitMs.length/60000)} min`:'—','Avg Serve':s.serveMs.length?`${Math.round(s.serveMs.reduce((a,b)=>a+b,0)/s.serveMs.length/60000)} min`:'—',Count:s.waitMs.length})))
      }
      setDone(true)
    } finally { setLoading(false) }
  }

  const exportCSV = () => {
    if (!data.length) return
    const h=Object.keys(data[0])
    const csv=[h.join(','),...data.map(r=>h.map(k=>String(r[k]??'')).join(','))].join('\n')
    const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}))
    a.download=`${active}_${from}_${to}.csv`; a.click()
  }

  return (
    <div style={{padding:'20px 24px',display:'flex',flexDirection:'column',gap:'16px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div><h1 className="page-title">Reports</h1><p className="page-sub">Generate and export business reports</p></div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'10px'}}>
        {TYPES.map(rt=>(
          <div key={rt.id} className="card" onClick={()=>{setActive(rt.id);setDone(false);setData([])}}
            style={{padding:'14px 16px',cursor:'pointer',border:`1.5px solid ${active===rt.id?'var(--brand)':'var(--border)'}`,background:active===rt.id?'#f0f9ff':'#fff',transition:'all .15s'}}>
            <div style={{fontWeight:700,fontSize:'13px',marginBottom:'3px'}}>{rt.label}</div>
            <div style={{fontSize:'12px',color:'var(--muted)'}}>{rt.desc}</div>
          </div>
        ))}
      </div>
      {active && (
        <div className="card" style={{padding:'14px 16px',display:'flex',alignItems:'flex-end',gap:'10px',flexWrap:'wrap'}}>
          <div><label className="label">Date From</label><input type="date" className="input" style={{width:'160px'}} value={from} onChange={e=>setFrom(e.target.value)}/></div>
          <div><label className="label">Date To</label><input type="date" className="input" style={{width:'160px'}} value={to} onChange={e=>setTo(e.target.value)}/></div>
          <button className="btn btn-primary" onClick={generate} disabled={loading}>{loading?<div className="spinner"/>:<><Icon n="report" s={14}/>Generate</>}</button>
          {done&&data.length>0&&<button className="btn btn-secondary" onClick={exportCSV}><Icon n="download" s={14}/>Export CSV</button>}
        </div>
      )}
      {done && (
        <div className="card" style={{overflow:'hidden'}}>
          <div className="card-header"><span className="card-title">{TYPES.find(r=>r.id===active)?.label} — {data.length} records</span></div>
          <div style={{overflowX:'auto',maxHeight:'400px',overflowY:'auto'}}>
            {data.length===0
              ? <div style={{padding:'30px',textAlign:'center',color:'var(--muted)'}}>No data for this period</div>
              : <table className="table">
                  <thead><tr>{Object.keys(data[0]).map(h=><th key={h}>{h}</th>)}</tr></thead>
                  <tbody>{data.map((r,i)=><tr key={i}>{Object.values(r).map((v,j)=><td key={j}>{String(v??'—')}</td>)}</tr>)}</tbody>
                </table>
            }
          </div>
        </div>
      )}
    </div>
  )
}

              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'10px'}}>

                <button className="btn btn-ghost btn-sm" style={{color:'var(--brand)',fontSize:'12px'}} onClick={async()=>{if(confirm('Reset to 001?')){await sb.from('services').update({current_number:0}).eq('id',sel.id);await load();toast('Reset!','success')}}}>
                  ↺ Reset Queue Number
                </button>
              </div>
              <div className="grid-2">
                <div style={{background:'#f8fafc',borderRadius:'8px',padding:'10px 12px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontSize:'12px',color:'var(--muted)'}}>Current Number</span>
                  <span style={{fontFamily:'JetBrains Mono',fontWeight:700}}>{val('prefix')}{String((sel.current_number||0)+1).padStart(3,'0')}</span>
                </div>
                <div style={{background:'#f8fafc',borderRadius:'8px',padding:'10px 12px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontSize:'12px',color:'var(--muted)'}}>Prefix</span>
                  <span style={{fontFamily:'JetBrains Mono',fontWeight:700}}>{val('prefix')||'A'}</span>
                </div>
              </div>
            </div>

            {hasChanges && (
              <div style={{display:'flex',gap:'8px',position:'sticky',bottom:'16px'}}>
                <button className="btn btn-secondary" style={{flex:1}} onClick={()=>setEdit({})}>Cancel</button>
                <button className="btn btn-primary" style={{flex:1}} onClick={save}><Icon n="check" s={14}/>Save Changes</button>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  )
}

function WindowsSettings() {
  const toast=useToast()
  const [windows,setWindows]=React.useState([])
  const [sel,setSel]=React.useState(null)
  const [allSvcs,setAllSvcs]=React.useState([])
  const [allStaff,setAllStaff]=React.useState([])
  const [asgSvcs,setAsgSvcs]=React.useState([])
  const [asgStaff,setAsgStaff]=React.useState([])
  const [sessions,setSessions]=React.useState({})
  const [showAdd,setShowAdd]=React.useState(false)
  const [newName,setNewName]=React.useState('')
  const [editName,setEditName]=React.useState(false)
  const [nameVal,setNameVal]=React.useState('')

  React.useEffect(()=>{ loadAll() },[])
  React.useEffect(()=>{ if(sel) loadDetail(sel.id) },[sel?.id])

  const loadAll=async()=>{
    const [{data:wins},{data:svcs},{data:staff},{data:sess}]=await Promise.all([
      sb.from('windows').select('*').order('name'),
      sb.from('services').select('id,name,color').eq('is_active',true).order('name'),
      sb.from('profiles').select('id,first_name,last_name').eq('is_active',true).order('first_name'),
      sb.from('staff_sessions').select('user_id,is_online'),
    ])
    setWindows(wins||[]); setAllSvcs(svcs||[]); setAllStaff(staff||[])
    const sm={}; (sess||[]).forEach(s=>{ sm[s.user_id]=s.is_online }); setSessions(sm)
    if(wins?.length&&!sel) setSel(wins[0])
  }
  const loadDetail=async(wid)=>{
    const [{data:ws},{data:wst}]=await Promise.all([
      sb.from('window_services').select('service_id').eq('window_id',wid),
      sb.from('window_staff').select('user_id').eq('window_id',wid),
    ])
    setAsgSvcs(ws?.map(r=>r.service_id)||[])
    setAsgStaff(wst?.map(r=>r.user_id)||[])
  }
  const addWin=async(e)=>{e.preventDefault();if(!newName.trim())return;const {data}=await sb.from('windows').insert({name:newName.trim()}).select().single();if(data){await loadAll();setSel(data);setNewName('');setShowAdd(false)}}
  const saveName=async()=>{if(!nameVal.trim())return;const {data}=await sb.from('windows').update({name:nameVal.trim()}).eq('id',sel.id).select().single();if(data){setSel(data);await loadAll();setEditName(false);toast('Saved!','success')}}
  const toggleSvc=async(id)=>{ const has=asgSvcs.includes(id); if(has){await sb.from('window_services').delete().eq('window_id',sel.id).eq('service_id',id);setAsgSvcs(p=>p.filter(x=>x!==id))}else{await sb.from('window_services').insert({window_id:sel.id,service_id:id});setAsgSvcs(p=>[...p,id])} }
  const toggleStaff=async(id)=>{ const has=asgStaff.includes(id); if(has){await sb.from('window_staff').delete().eq('window_id',sel.id).eq('user_id',id);setAsgStaff(p=>p.filter(x=>x!==id))}else{await sb.from('window_staff').insert({window_id:sel.id,user_id:id});setAsgStaff(p=>[...p,id])} }

  return (
    <div className="settings-layout">
      <div className="settings-list">
        <div style={{padding:'14px 16px',borderBottom:'1px solid var(--border)'}}><div style={{fontWeight:800,fontSize:'14px'}}>Windows</div><div style={{fontSize:'11px',color:'var(--muted)'}}>Manage counters/windows</div></div>
        <div style={{flex:1,overflowY:'auto'}}>
          {windows.map(w=>(
            <div key={w.id} className={`settings-item ${sel?.id===w.id?'active':''}`} onClick={()=>setSel(w)}>
              <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{w.name}</span>
              {!w.is_active&&<span style={{fontSize:'10px',color:'var(--subtle)'}}>Off</span>}
            </div>
          ))}
        </div>
        <div style={{padding:'10px'}}>
          {showAdd
            ? <form onSubmit={addWin} style={{display:'flex',flexDirection:'column',gap:'6px'}}>
                <input autoFocus className="input" style={{fontSize:'12px'}} value={newName} onChange={e=>setNewName(e.target.value)} placeholder="Window name"/>
                <div style={{display:'flex',gap:'5px'}}><button type="submit" className="btn btn-primary btn-sm" style={{flex:1}}>Add</button><button type="button" className="btn btn-secondary btn-icon btn-sm" onClick={()=>setShowAdd(false)}><Icon n="x" s={13}/></button></div>
              </form>
            : <button className="btn btn-primary btn-full btn-sm" onClick={()=>setShowAdd(true)}><Icon n="plus" s={13}/>Add Window</button>
          }
        </div>
      </div>
      <div className="settings-detail">
        {!sel ? <div style={{padding:'40px',color:'var(--muted)',textAlign:'center'}}>Select a window</div> : (
          <div style={{maxWidth:'640px',display:'flex',flexDirection:'column',gap:'14px'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div><h2 style={{fontWeight:800,fontSize:'16px'}}>Window Details — {sel.name}</h2><p style={{fontSize:'12px',color:'var(--muted)'}}>Update this window's info or settings</p></div>
              <div style={{display:'flex',gap:'6px'}}>
                <button className="btn btn-secondary btn-sm" style={{color:'var(--danger)'}} onClick={async()=>{if(confirm(`Delete "${sel.name}"?`)){await sb.from('windows').delete().eq('id',sel.id);setSel(null);await loadAll()}}}>Delete</button>
                <button className="btn btn-secondary btn-sm" onClick={async()=>{const {data}=await sb.from('windows').update({is_active:!sel.is_active}).eq('id',sel.id).select().single();if(data){setSel(data);await loadAll()}}}>{sel.is_active?'Disable':'Enable'}</button>
              </div>
            </div>
            <div className="card" style={{padding:'14px 16px'}}>
              <label className="label">Window Name</label>
              {editName
                ? <div style={{display:'flex',gap:'6px'}}><input autoFocus className="input" style={{flex:1}} value={nameVal} onChange={e=>setNameVal(e.target.value)}/><button className="btn btn-primary btn-icon" onClick={saveName}><Icon n="check" s={14}/></button><button className="btn btn-secondary btn-icon" onClick={()=>setEditName(false)}><Icon n="x" s={14}/></button></div>
                : <div style={{display:'flex',alignItems:'center',gap:'8px'}}><span style={{fontWeight:500}}>{sel.name}</span><button className="btn btn-ghost btn-icon btn-sm" onClick={()=>{setNameVal(sel.name);setEditName(true)}}><Icon n="edit" s={13}/></button></div>
              }
            </div>
            <div className="card" style={{padding:'14px 16px'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'10px'}}>
                <div style={{fontSize:'11px',fontWeight:700,color:'#f59e0b',textTransform:'uppercase',letterSpacing:'.06em'}}>Assigned Staff</div>
              </div>
              <div style={{maxHeight:'200px',overflowY:'auto',display:'flex',flexDirection:'column',gap:'1px'}}>
                {allStaff.map(s=>(
                  <label key={s.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'7px 8px',borderRadius:'7px',cursor:'pointer',transition:'background .12s'}}>
                    <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                      <div style={{width:'26px',height:'26px',borderRadius:'50%',background:'#e2e8f0',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'10px',fontWeight:700,color:'var(--muted)'}}>{initials(s.first_name,s.last_name)}</div>
                      <span style={{fontSize:'13px',fontWeight:500}}>{s.first_name} {s.last_name}</span>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                      <div className={sessions[s.id]?'online-dot':'offline-dot'}/>
                      <span style={{fontSize:'11px',color:sessions[s.id]?'var(--success)':'var(--subtle)'}}>{sessions[s.id]?'Online':'Offline'}</span>
                      <input type="checkbox" checked={asgStaff.includes(s.id)} onChange={()=>toggleStaff(s.id)} style={{width:'14px',height:'14px',accentColor:'var(--brand)',cursor:'pointer'}}/>
                    </div>
                  </label>
                ))}
              </div>
            </div>
            <div className="card" style={{padding:'14px 16px'}}>
              <div style={{fontSize:'11px',fontWeight:700,color:'#f59e0b',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'10px'}}>Assigned Services</div>
              <div style={{maxHeight:'200px',overflowY:'auto',display:'flex',flexDirection:'column',gap:'1px'}}>
                {allSvcs.map(s=>(
                  <label key={s.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'7px 8px',borderRadius:'7px',cursor:'pointer'}}>
                    <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                      <div className="color-dot" style={{background:s.color||'var(--brand)'}}/>
                      <span style={{fontSize:'13px',fontWeight:500}}>{s.name}</span>
                    </div>
                    <input type="checkbox" checked={asgSvcs.includes(s.id)} onChange={()=>toggleSvc(s.id)} style={{width:'14px',height:'14px',accentColor:'var(--brand)',cursor:'pointer'}}/>
                  </label>
                ))}
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  )
}

function TeamsSettings() {
  const toast=useToast()
  const [staff,setStaff]=React.useState([])
  const [search,setSearch]=React.useState('')
  const [showAdd,setShowAdd]=React.useState(false)
  const [form,setForm]=React.useState({email:'',first_name:'',last_name:'',role:'staff',password:''})
  const [adding,setAdding]=React.useState(false)
  const [err,setErr]=React.useState('')

  React.useEffect(()=>{ load() },[])
  const load=async()=>{ const {data}=await sb.from('profiles').select('*').order('created_at',{ascending:false}); setStaff(data||[]) }

  const addAccount=async(e)=>{
    e.preventDefault(); setAdding(true); setErr('')
    try {
      const {error}=await sb.auth.admin.createUser({email:form.email,password:form.password,email_confirm:true,user_metadata:{first_name:form.first_name,last_name:form.last_name,role:form.role}})
      if(error) throw error
      await load(); setShowAdd(false); setForm({email:'',first_name:'',last_name:'',role:'staff',password:''}); toast('Account created!','success')
    } catch(e){ setErr(e.message) }
    finally{ setAdding(false) }
  }

  const filtered=staff.filter(s=>{ const q=search.toLowerCase(); return !q||`${s.first_name} ${s.last_name}`.toLowerCase().includes(q) })

  return (
    <div style={{padding:'24px',display:'flex',flexDirection:'column',gap:'16px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div><h1 className="page-title">Team</h1><p className="page-sub">Manage your team member accounts · {staff.length} total</p></div>
        <button className="btn btn-primary" onClick={()=>setShowAdd(true)}><Icon n="plus" s={15}/>Add Account</button>
      </div>
      <div style={{display:'flex',gap:'10px',maxWidth:'360px'}}>
        <div style={{position:'relative',flex:1}}>
          <Icon n="search" s={13} style={{position:'absolute',left:'9px',top:'50%',transform:'translateY(-50%)',color:'var(--subtle)'}}/>
          <input className="input" style={{paddingLeft:'28px',fontSize:'12px'}} value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search staff..."/>
        </div>
      </div>
      <div className="card" style={{overflow:'hidden'}}>
        <table className="table">
          <thead><tr><th>Name</th><th>Role</th><th>Status</th><th>Date Added</th></tr></thead>
          <tbody>
            {filtered.map(s=>(
              <tr key={s.id}>
                <td>
                  <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                    <div style={{width:'30px',height:'30px',borderRadius:'50%',background:'#e2e8f0',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',fontWeight:700,color:'var(--muted)',flexShrink:0}}>{initials(s.first_name,s.last_name)}</div>
                    <span style={{fontWeight:600}}>{s.first_name} {s.last_name}</span>
                  </div>
                </td>
                <td><span className={`badge badge-role-${s.role}`} style={{textTransform:'capitalize'}}>{s.role}</span></td>
                <td><span className={`badge ${s.is_active?'badge-serving':'badge-removed'}`}>{s.is_active?'Active':'Inactive'}</span></td>
                <td style={{color:'var(--muted)',fontSize:'12px'}}>{fmt(s.created_at,'datetime')}</td>
              </tr>
            ))}
          </tbody>
        </table>
        <div style={{padding:'8px 14px',fontSize:'11px',color:'var(--subtle)',borderTop:'1px solid var(--border)'}}>Showing {filtered.length} of {staff.length} entries</div>
      </div>
      {showAdd && (
        <div className="modal-overlay" onClick={()=>setShowAdd(false)}>
          <div className="modal animate-in" onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <div><div className="modal-title">Add Account</div><div className="modal-sub">Step 1 — Account Setup</div></div>
              <button className="btn btn-ghost btn-icon" onClick={()=>setShowAdd(false)}><Icon n="x" s={16}/></button>
            </div>
            <form onSubmit={addAccount} className="modal-body">
              <div className="space-y-3">
                <div className="grid-2">
                  <div><label className="label">First Name</label><input className="input" value={form.first_name} onChange={e=>setForm(f=>({...f,first_name:e.target.value}))} required/></div>
                  <div><label className="label">Last Name</label><input className="input" value={form.last_name} onChange={e=>setForm(f=>({...f,last_name:e.target.value}))} required/></div>
                </div>
                <div><label className="label">Email</label><input type="email" className="input" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))} required/></div>
                <div><label className="label">Password</label><input type="password" className="input" value={form.password} onChange={e=>setForm(f=>({...f,password:e.target.value}))} required minLength={6}/></div>
                <div><label className="label">Role</label>
                  <select className="input" value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value}))}>
                    <option value="staff">Staff</option><option value="manager">Branch Manager</option><option value="admin">Admin</option>
                  </select>
                </div>
                {err && <div className="error-box">{err}</div>}
              </div>
              <div className="modal-footer">
                <button type="button" className="btn btn-secondary" style={{flex:1}} onClick={()=>setShowAdd(false)}>Cancel</button>
                <button type="submit" disabled={adding} className="btn btn-primary" style={{flex:1}}>{adding?<div className="spinner"/>:'Confirm'}</button>
              </div>
            </form>
          </div>
        </div>
      )}
    </div>
  )
}

function ProceduresSettings() {
  const toast=useToast()
  const [procs,setProcs]=React.useState([])
  const [svcs,setSvcs]=React.useState([])
  const [showAdd,setShowAdd]=React.useState(false)
  const [form,setForm]=React.useState({name:'',type:'step_by_step',description:'',origin_ids:[]})
  const [steps,setSteps]=React.useState([])
  const [saving,setSaving]=React.useState(false)
  const [err,setErr]=React.useState('')

  React.useEffect(()=>{ load() },[])
  const load=async()=>{
    const [{data:p},{data:s}]=await Promise.all([
      sb.from('procedures').select('*,procedure_steps(*,services(name)),procedure_origins(service_id,services(name))').order('name'),
      sb.from('services').select('id,name,color').eq('is_active',true).order('name'),
    ]); setProcs(p||[]); setSvcs(s||[])
  }
  const toggleOrigin=id=>setForm(f=>({...f,origin_ids:f.origin_ids.includes(id)?f.origin_ids.filter(x=>x!==id):[...f.origin_ids,id]}))
  const save=async(e)=>{
    e.preventDefault(); if(steps.some(s=>!s.service_id)){setErr('All steps need a service');return}
    setSaving(true); setErr('')
    try {
      const {data:proc,error:pe}=await sb.from('procedures').insert({name:form.name,type:form.type,description:form.description||null}).select().single()
      if(pe) throw pe
      if(steps.length) await sb.from('procedure_steps').insert(steps.map((s,i)=>({procedure_id:proc.id,service_id:s.service_id,step_order:i+1,is_optional:s.is_optional})))
      if(form.origin_ids.length) await sb.from('procedure_origins').insert(form.origin_ids.map(sid=>({procedure_id:proc.id,service_id:sid})))
      await load(); setShowAdd(false); setForm({name:'',type:'step_by_step',description:'',origin_ids:[]}); setSteps([]); toast('Procedure created!','success')
    } catch(e){ setErr(e.message) }
    finally{ setSaving(false) }
  }

  return (
    <div style={{padding:'24px',display:'flex',flexDirection:'column',gap:'16px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div><h1 className="page-title">Service Procedures</h1><p className="page-sub">List of all available procedures</p></div>
        <button className="btn btn-primary" onClick={()=>setShowAdd(true)}><Icon n="plus" s={15}/>New Procedure</button>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
        {procs.length===0&&<div className="card" style={{padding:'32px',textAlign:'center',color:'var(--muted)'}}>No procedures yet</div>}
        {procs.map(p=>{
          const sorted=p.procedure_steps?.sort((a,b)=>a.step_order-b.step_order)||[]
          const origins=p.procedure_origins||[]
          return (
            <div key={p.id} className="card" style={{padding:'18px'}}>
              <div style={{display:'flex',alignItems:'flex-start',gap:'16px'}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:800,fontSize:'15px',marginBottom:'12px'}}>{p.name}</div>
                  {sorted.length>0&&(
                    <div style={{display:'flex',alignItems:'center',gap:'0',flexWrap:'wrap',marginBottom:'12px'}}>
                      {sorted.map((step,i)=>(
                        <div key={step.id} style={{display:'flex',alignItems:'center',gap:'0'}}>
                          <div style={{display:'flex',flexDirection:'column',alignItems:'center',minWidth:'80px'}}>
                            <div style={{width:'28px',height:'28px',borderRadius:'50%',background:'#e2e8f0',border:'2px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',fontWeight:700,color:'var(--muted)'}}>{i+1}</div>
                            <div style={{fontSize:'10px',color:'var(--muted)',marginTop:'4px',fontWeight:600,textAlign:'center'}}>Step {i+1}</div>
                            <div style={{fontSize:'11px',fontWeight:700,textAlign:'center',maxWidth:'80px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{step.services?.name}</div>
                          </div>
                          {i<sorted.length-1&&<div style={{width:'32px',height:'2px',background:'#e2e8f0',marginBottom:'24px'}}/>}
                        </div>
                      ))}
                    </div>
                  )}
                  {origins.length>0&&(
                    <div>
                      <div style={{fontSize:'10px',fontWeight:700,color:'var(--subtle)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'5px'}}>Origin</div>
                      <div style={{display:'flex',flexWrap:'wrap',gap:'5px'}}>{origins.map(o=><span key={o.service_id} className="tag">{o.services?.name}</span>)}</div>
                    </div>
                  )}
                </div>
                <div style={{minWidth:'160px',display:'flex',flexDirection:'column',gap:'10px',alignItems:'flex-end'}}>
                  <div style={{fontSize:'12px',color:'var(--muted)',display:'flex',flexDirection:'column',gap:'3px',textAlign:'right'}}>
                    <div>Type: <strong>Step-by-Step</strong></div>
                    <div>Total Steps: <strong>{sorted.length}</strong></div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
                    <span style={{fontSize:'11px',color:'var(--muted)'}}>Active</span>
                    <button className={`toggle ${p.is_active?'on':''}`} onClick={async()=>{await sb.from('procedures').update({is_active:!p.is_active}).eq('id',p.id);await load()}}>
                      <div className="toggle-thumb"/>
                    </button>
                  </div>
                  <button className="btn btn-secondary btn-sm" style={{color:'var(--danger)'}} onClick={async()=>{if(confirm('Delete?')){await sb.from('procedures').delete().eq('id',p.id);await load()}}}>
                    <Icon n="trash" s={12}/>Delete
                  </button>
                </div>
              </div>
            </div>
          )
        })}
      </div>

      {showAdd && (
        <div className="modal-overlay" onClick={()=>setShowAdd(false)}>
          <div className="modal animate-in" style={{maxWidth:'560px',maxHeight:'90vh'}} onClick={e=>e.stopPropagation()}>
            <div className="modal-header" style={{position:'sticky',top:0}}>
              <div><div className="modal-title">New Procedure</div><div className="modal-sub">All fields are required</div></div>
              <button className="btn btn-ghost btn-icon" onClick={()=>setShowAdd(false)}><Icon n="x" s={16}/></button>
            </div>
            <form onSubmit={save} className="modal-body">
              <div className="space-y-4">
                <div><label className="label">Template Name</label><input className="input" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="e.g., HMO OB Ultrasound" required/></div>
                <div><label className="label">Procedure Type</label><select className="input" value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}><option value="step_by_step">Step-by-Step</option><option value="flexible">Flexible</option></select></div>
                <div>
                  <label className="label">Select Origin (services that trigger this procedure)</label>
                  <div style={{border:'1px solid var(--border)',borderRadius:'8px',padding:'8px',maxHeight:'120px',overflowY:'auto',display:'flex',flexDirection:'column',gap:'2px'}}>
                    {svcs.map(s=>(
                      <label key={s.id} style={{display:'flex',alignItems:'center',gap:'8px',padding:'5px 6px',borderRadius:'6px',cursor:'pointer'}}>
                        <input type="checkbox" checked={form.origin_ids.includes(s.id)} onChange={()=>toggleOrigin(s.id)} style={{accentColor:'var(--brand)',width:'14px',height:'14px'}}/>
                        <div className="color-dot" style={{background:s.color}}/><span style={{fontSize:'13px'}}>{s.name}</span>
                      </label>
                    ))}
                  </div>
                </div>
                <div>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'6px'}}>
                    <label className="label" style={{marginBottom:0}}>Procedure Steps</label>
                    <button type="button" className="btn btn-secondary btn-sm" onClick={()=>setSteps(p=>[...p,{service_id:'',is_optional:false}])}><Icon n="plus" s={12}/>Add Step</button>
                  </div>
                  <div style={{display:'flex',flexDirection:'column',gap:'5px'}}>
                    {steps.length===0&&<div style={{textAlign:'center',padding:'12px',border:'1px dashed var(--border)',borderRadius:'8px',fontSize:'12px',color:'var(--muted)'}}>Click "Add Step" to add procedure steps</div>}
                    {steps.map((step,i)=>(
                      <div key={i} style={{display:'flex',alignItems:'center',gap:'8px',padding:'8px 10px',background:'#f8fafc',borderRadius:'8px',border:'1px solid var(--border)'}}>
                        <Icon n="grip" s={14} c="text-muted"/>
                        <div style={{width:'22px',height:'22px',borderRadius:'50%',background:'var(--brand)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',fontWeight:700,flexShrink:0}}>{i+1}</div>
                        <select className="input" style={{flex:1,fontSize:'12px'}} value={step.service_id} onChange={e=>setSteps(p=>p.map((s,idx)=>idx===i?{...s,service_id:e.target.value}:s))} required>
                          <option value="">Select Service</option>
                          {svcs.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
                        </select>
                        <label style={{display:'flex',alignItems:'center',gap:'4px',fontSize:'11px',color:'var(--muted)',whiteSpace:'nowrap',cursor:'pointer'}}>
                          <input type="checkbox" checked={step.is_optional} onChange={e=>setSteps(p=>p.map((s,idx)=>idx===i?{...s,is_optional:e.target.checked}:s))} style={{accentColor:'var(--brand)'}}/>Optional
                        </label>
                        <button type="button" className="btn btn-ghost btn-icon btn-sm" style={{color:'var(--danger)'}} onClick={()=>setSteps(p=>p.filter((_,idx)=>idx!==i))}><Icon n="x" s={13}/></button>
                      </div>
                    ))}
                  </div>
                </div>
                {err&&<div className="error-box">{err}</div>}
              </div>
              <div className="modal-footer">
                <button type="button" className="btn btn-secondary" style={{flex:1}} onClick={()=>setShowAdd(false)}>Cancel</button>
                <button type="submit" disabled={saving} className="btn btn-primary" style={{flex:1}}>{saving?<div className="spinner"/>:<><Icon n="check" s={14}/>Proceed</>}</button>
              </div>
            </form>
          </div>
        </div>
      )}
    </div>
  )
}

// ─────────────────────────────────────────────────────────────
// KIOSK MODE — customer self-service ticket dispenser
// ─────────────────────────────────────────────────────────────
function KioskMode() {
  const [services, setServices] = React.useState([])
  const [ticket, setTicket] = React.useState(null) // {number, service, color}
  const [loading, setLoading] = React.useState(false)
  const [now, setNow] = React.useState(new Date())

  React.useEffect(()=>{
    loadServices()
    const ti = setInterval(()=>setNow(new Date()), 1000)
    return ()=>clearInterval(ti)
  },[])

  const loadServices = async () => {
    const {data} = await sb.from('services')
      .select('id,name,prefix,color')
      .eq('is_active', true)
      .eq('is_hidden_on_kiosk', false)
      .order('name')
    setServices(data||[])
  }

  const getTicket = async (svc) => {
    setLoading(true)
    try {
      const {data:qnum} = await sb.rpc('get_next_queue_number',{p_service_id:svc.id})
      const {data:q} = await sb.from('queues').insert({
        queue_number: qnum,
        service_id: svc.id,
        status: 'waiting',
        date: today(),
        waiting_start: new Date().toISOString(),
      }).select().single()

      // Announce via TTS
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel()
        const msg = new SpeechSynthesisUtterance()
        msg.text = `Your queue number is ${qnum.split('').join(' ')}. Please wait for your turn.`
        msg.lang = 'en-US'
        msg.rate = 0.85
        window.speechSynthesis.speak(msg)
      }

      setTicket({ number: qnum, service: svc.name, color: svc.color })

      // Auto-dismiss after 12 seconds
      setTimeout(()=> setTicket(null), 12000)
    } catch(e) {
      alert('Error getting ticket. Please try again.')
    } finally {
      setLoading(false)
    }
  }

  return (
    <div className="kiosk" onClick={()=>{ if(!ticket) window.speechSynthesis?.speak(new SpeechSynthesisUtterance('')) }}>
      <div className="kiosk-bg"/>
      <div className="kiosk-logo">T</div>
      <h1 className="kiosk-title">Taytay Doctors Multispecialty Hospital</h1>
      <p className="kiosk-sub">
        {now.toLocaleDateString('en-PH',{weekday:'long',month:'long',day:'numeric',year:'numeric'})} &nbsp;·&nbsp;
        {now.toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit',hour12:true})}
      </p>

      <div style={{color:'rgba(255,255,255,.5)',fontSize:'13px',fontWeight:600,textTransform:'uppercase',letterSpacing:'.1em',marginBottom:'16px'}}>
        Select a Service
      </div>

      <div className="kiosk-services">
        {services.map(svc=>(
          <button
            key={svc.id}
            className="kiosk-svc-btn"
            onClick={()=>!loading && getTicket(svc)}
            disabled={loading}
            style={{borderColor: loading ? 'rgba(255,255,255,.05)' : 'rgba(255,255,255,.1)'}}
          >
            <div className="kiosk-svc-dot" style={{background:svc.color||'var(--brand)'}}/>
            <div className="kiosk-svc-name">{svc.name}</div>
            <div style={{fontFamily:'JetBrains Mono',fontSize:'11px',color:'rgba(255,255,255,.3)',fontWeight:600}}>{svc.prefix}###</div>
          </button>
        ))}
        {services.length===0 && (
          <div style={{gridColumn:'1/-1',textAlign:'center',color:'rgba(255,255,255,.3)',padding:'40px'}}>
            No services available
          </div>
        )}
      </div>

      <p style={{color:'rgba(255,255,255,.2)',fontSize:'12px',marginTop:'8px'}}>Tap a service to get your queue number</p>

      {/* Ticket modal */}
      {ticket && (
        <div className="kiosk-ticket" onClick={()=>setTicket(null)}>
          <div className="kiosk-ticket-card" onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:'13px',fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.08em'}}>
              Taytay Doctors Multispecialty Hospital
            </div>
            <div style={{fontSize:'13px',color:'var(--muted)',marginTop:'4px'}}>Queue Ticket</div>
            <div style={{width:'40px',height:'3px',borderRadius:'2px',margin:'14px auto',background:ticket.color||'var(--brand)'}}/>
            <div style={{fontSize:'13px',fontWeight:600,color:'var(--muted)',marginBottom:'4px'}}>Service</div>
            <div style={{fontSize:'16px',fontWeight:700,color:'var(--text)',marginBottom:'8px'}}>{ticket.service}</div>
            <div style={{fontSize:'13px',fontWeight:600,color:'var(--muted)',marginBottom:'0'}}>Your Number</div>
            <div className="kiosk-ticket-num" style={{color:ticket.color||'var(--brand)'}}>{ticket.number}</div>
            <div style={{fontSize:'12px',color:'var(--muted)',marginTop:'4px'}}>
              {now.toLocaleString('en-PH',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit',hour12:true})}
            </div>
            <div style={{marginTop:'16px',padding:'10px 16px',background:'#f8fafc',borderRadius:'10px',fontSize:'12px',color:'var(--muted)'}}>
              Please wait for your number to be called on the TV display.
            </div>
            <button className="kiosk-ticket-dismiss" onClick={()=>setTicket(null)}>
              ✓ Got it — Close
            </button>
          </div>
        </div>
      )}
    </div>
  )
}

// ─────────────────────────────────────────────────────────────
// TV TEMPLATES SETTINGS
// ─────────────────────────────────────────────────────────────
function TVTemplatesSettings() {
  const toast = useToast()
  const [templates, setTemplates] = React.useState([])
  const [windows, setWindows] = React.useState([])
  const [sel, setSel] = React.useState(null)
  const [asgWins, setAsgWins] = React.useState([])
  const [showAdd, setShowAdd] = React.useState(false)
  const [form, setForm] = React.useState({name:'',slug:'',description:'',show_all_windows:false})
  const [saving, setSaving] = React.useState(false)

  React.useEffect(()=>{ load() },[])
  React.useEffect(()=>{ if(sel) loadDetail(sel.id) },[sel?.id])

  const load = async () => {
    const [{data:t},{data:w}] = await Promise.all([
      sb.from('tv_templates').select('*').order('name'),
      sb.from('windows').select('id,name').eq('is_active',true).order('name'),
    ])
    setTemplates(t||[]); setWindows(w||[])
    if (t?.length && !sel) setSel(t[0])
  }

  const loadDetail = async (tid) => {
    const {data} = await sb.from('tv_template_windows').select('window_id').eq('template_id',tid)
    setAsgWins(data?.map(r=>r.window_id)||[])
  }

  const addTemplate = async (e) => {
    e.preventDefault(); setSaving(true)
    const {data} = await sb.from('tv_templates').insert({
      name:form.name, slug:form.slug.toLowerCase().replace(/\s+/g,'-'),
      description:form.description||null, show_all_windows:form.show_all_windows
    }).select().single()
    if (data) { await load(); setSel(data); setShowAdd(false); setForm({name:'',slug:'',description:'',show_all_windows:false}); toast('Template created!','success') }
    setSaving(false)
  }

  const toggleWin = async (wid) => {
    const has = asgWins.includes(wid)
    if (has) {
      await sb.from('tv_template_windows').delete().eq('template_id',sel.id).eq('window_id',wid)
      setAsgWins(p=>p.filter(x=>x!==wid))
    } else {
      await sb.from('tv_template_windows').insert({template_id:sel.id,window_id:wid})
      setAsgWins(p=>[...p,wid])
    }
  }

  const toggleShowAll = async () => {
    const {data} = await sb.from('tv_templates').update({show_all_windows:!sel.show_all_windows}).eq('id',sel.id).select().single()
    if (data) { setSel(data); await load() }
  }

  const deleteTemplate = async () => {
    if (!sel || !confirm(`Delete "${sel.name}"?`)) return
    await sb.from('tv_templates').delete().eq('id',sel.id)
    setSel(null); await load()
  }

  const tvUrl = (slug) => `${window.location.pathname}?tv=${slug}`

  return (
    <div className="settings-layout">
      <div className="settings-list">
        <div style={{padding:'14px 16px',borderBottom:'1px solid var(--border)'}}>
          <div style={{fontWeight:800,fontSize:'14px'}}>TV Display Templates</div>
          <div style={{fontSize:'11px',color:'var(--muted)',marginTop:'1px'}}>Per-department TV configs</div>
        </div>
        <div style={{flex:1,overflowY:'auto'}}>
          {templates.map(t=>(
            <div key={t.id} className={`settings-item ${sel?.id===t.id?'active':''}`} onClick={()=>setSel(t)}>
              <div>
                <div style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:'13px'}}>{t.name}</div>
                <div style={{fontSize:'10px',color:'var(--subtle)',marginTop:'1px'}}>?tv={t.slug}</div>
              </div>
              {!t.is_active&&<span style={{fontSize:'10px',color:'var(--subtle)'}}>Off</span>}
            </div>
          ))}
        </div>
        <div style={{padding:'10px'}}>
          {showAdd
            ? <form onSubmit={addTemplate} style={{display:'flex',flexDirection:'column',gap:'6px'}}>
                <input autoFocus className="input" style={{fontSize:'12px'}} value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Template name" required/>
                <input className="input" style={{fontSize:'12px'}} value={form.slug} onChange={e=>setForm(f=>({...f,slug:e.target.value}))} placeholder="URL slug (e.g. lab)" required/>
                <label style={{display:'flex',alignItems:'center',gap:'6px',fontSize:'12px',cursor:'pointer'}}>
                  <input type="checkbox" checked={form.show_all_windows} onChange={e=>setForm(f=>({...f,show_all_windows:e.target.checked}))} style={{accentColor:'var(--brand)'}}/>
                  Show all windows
                </label>
                <div style={{display:'flex',gap:'5px'}}>
                  <button type="submit" disabled={saving} className="btn btn-primary btn-sm" style={{flex:1}}>{saving?'...':'Add'}</button>
                  <button type="button" className="btn btn-secondary btn-icon btn-sm" onClick={()=>setShowAdd(false)}><Icon n="x" s={13}/></button>
                </div>
              </form>
            : <button className="btn btn-primary btn-full btn-sm" onClick={()=>setShowAdd(true)}><Icon n="plus" s={13}/>New Template</button>
          }
        </div>
      </div>

      <div className="settings-detail">
        {!sel ? <div style={{padding:'40px',color:'var(--muted)',textAlign:'center'}}>Select a template</div> : (
          <div style={{maxWidth:'640px',display:'flex',flexDirection:'column',gap:'14px'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div>
                <h2 style={{fontWeight:800,fontSize:'16px'}}>{sel.name}</h2>
                <p style={{fontSize:'12px',color:'var(--muted)',marginTop:'2px'}}>{sel.description||'No description'}</p>
              </div>
              <button className="btn btn-secondary btn-sm" style={{color:'var(--danger)'}} onClick={deleteTemplate}>Delete</button>
            </div>

            {/* URL */}
            <div className="card" style={{padding:'14px 16px'}}>
              <div style={{fontSize:'11px',fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'8px'}}>TV Display URL</div>
              <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                <code style={{flex:1,background:'#f8fafc',border:'1px solid var(--border)',borderRadius:'7px',padding:'8px 12px',fontSize:'13px',color:'var(--brand)',fontWeight:600}}>
                  ?tv={sel.slug}
                </code>
                <button className="btn btn-secondary btn-sm" onClick={()=>window.open(`?tv=${sel.slug}`,'_blank')}>
                  <Icon n="tv" s={13}/>Open
                </button>
              </div>
              <p style={{fontSize:'11px',color:'var(--subtle)',marginTop:'6px'}}>Open this URL on the TV or monitor in the department</p>
            </div>

            {/* Show all toggle */}
            <div className="card" style={{padding:'14px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div>
                <div style={{fontWeight:600,fontSize:'13px'}}>Show All Windows</div>
                <div style={{fontSize:'12px',color:'var(--muted)',marginTop:'2px'}}>If ON, ignores window filter — shows all serving queues</div>
              </div>
              <button className={`toggle ${sel.show_all_windows?'on':''}`} onClick={toggleShowAll}>
                <div className="toggle-thumb"/>
              </button>
            </div>

            {/* Window assignment */}
            {!sel.show_all_windows && (
              <div className="card" style={{padding:'14px 16px'}}>
                <div style={{fontSize:'11px',fontWeight:700,color:'#f59e0b',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'10px'}}>
                  Windows Shown on This TV ({asgWins.length} selected)
                </div>
                <p style={{fontSize:'12px',color:'var(--muted)',marginBottom:'10px'}}>Only queues from selected windows will appear on this TV.</p>
                <div style={{display:'flex',flexDirection:'column',gap:'2px',maxHeight:'320px',overflowY:'auto'}}>
                  {windows.map(w=>(
                    <label key={w.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 10px',borderRadius:'8px',cursor:'pointer',background:asgWins.includes(w.id)?'#f0f9ff':'transparent',transition:'background .12s'}}>
                      <span style={{fontSize:'13px',fontWeight:asgWins.includes(w.id)?600:400}}>{w.name}</span>
                      <input type="checkbox" checked={asgWins.includes(w.id)} onChange={()=>toggleWin(w.id)} style={{width:'15px',height:'15px',accentColor:'var(--brand)',cursor:'pointer'}}/>
                    </label>
                  ))}
                </div>
              </div>
            )}

            {/* All templates list with URLs */}
            <div className="card" style={{padding:'14px 16px'}}>
              <div style={{fontSize:'11px',fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'10px'}}>All Templates</div>
              <div style={{display:'flex',flexDirection:'column',gap:'5px'}}>
                {templates.map(t=>(
                  <div key={t.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'7px 10px',borderRadius:'7px',background:'#f8fafc'}}>
                    <div>
                      <span style={{fontSize:'13px',fontWeight:600}}>{t.name}</span>
                      <code style={{fontSize:'11px',color:'var(--brand)',marginLeft:'8px'}}>?tv={t.slug}</code>
                    </div>
                    <button className="btn btn-ghost btn-sm" onClick={()=>window.open(`?tv=${t.slug}`,'_blank')} style={{fontSize:'11px'}}>
                      Open ↗
                    </button>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  )
}

// ─────────────────────────────────────────────────────────────
// ROOT APP
// ─────────────────────────────────────────────────────────────
function App() {
  const params = new URLSearchParams(window.location.search)
  const tvParam = params.get('tv')
  const isKiosk = params.get('kiosk') === '1'

  // TV mode — ?tv=1 (main) or ?tv=lab, ?tv=cashier, etc.
  if (tvParam !== null) return <TVDisplay slug={tvParam}/>

  // Kiosk mode
  if (isKiosk) return <KioskMode/>

  const {user, profile, loading, login, logout, isAdmin} = useAuth()
  const [page, setPage] = React.useState('dashboard')

  if (loading) return <div className="full-center"><div className="spinner spinner-dark" style={{width:'32px',height:'32px',borderWidth:'3px'}}/></div>
  if (!user) return <LoginPage onLogin={login}/>

  const renderPage = () => {
    if (page==='dashboard') return <Dashboard profile={profile}/>
    if (page==='workspace') return <QueueWorkspace user={user} profile={profile}/>
    if (page==='monitoring') return <Monitoring/>
    if (page==='reports') return <Reports/>
    if (page==='settings-services') return <ServicesSettings/>
    if (page==='settings-windows') return <WindowsSettings/>
    if (page==='settings-teams') return <TeamsSettings/>
    if (page==='settings-procedures') return <ProceduresSettings/>
    if (page==='settings-tv') return <TVTemplatesSettings/>
    return <Dashboard profile={profile}/>
  }

  return (
    <div className="app">
      <Sidebar page={page} setPage={setPage} profile={profile} logout={logout} isAdmin={isAdmin()}/>
      <div className="main">{renderPage()}</div>
    </div>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ToastProvider><App/></ToastProvider>
)
</script>
</body>
